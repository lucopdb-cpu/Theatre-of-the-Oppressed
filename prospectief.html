<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="theme-color" content="#1a6b6b">
<title>TO Archief — Prospectieve Technieken · Rainbow of Desire</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --teal:  #1a6b6b;
  --teal2: #2a8a8a;
  --teal3: #d0ecec;
  --teal4: #e8f5f5;
  --teal5: #0f4a4a;
  --ink:   #1a2020;
  --ink2:  #3a4a4a;
  --ink3:  #7a9090;
  --paper: #f4f8f8;
  --paper2:#edf4f4;
  --paper3:#e0eded;
  --paper4:#c8dede;
  --rule:  #d4e8e8;
  --white: #ffffff;
  --sans:  'Trebuchet MS', 'Gill Sans', 'Helvetica Neue', sans-serif;
  --body:  Georgia, 'Times New Roman', serif;
  --mono:  'Courier New', Courier, monospace;
}

body{
  background: var(--paper);
  color: var(--ink);
  padding: 1.5rem 1rem 3rem;
  min-height: 100vh;
  font-family: var(--body);
}

.wrap{max-width: 560px; margin: 0 auto;}

/* ── HEADER ── */
.header{margin-bottom: 20px;}
.header-banner{
  background: var(--teal5);
  color: #8fd4d4;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-banner strong{color:#fff}
.header-title{
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 700;
  color: var(--teal5);
  letter-spacing: -.01em;
  margin-bottom: 4px;
}
.header-sub{
  font-family: var(--body);
  font-size: 13px;
  font-style: italic;
  color: var(--ink3);
}

/* ── SEARCH / RANDOM ── */
.top-bar{
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
}
.srch-wrap{position:relative; flex:1;}
#srch{
  width: 100%;
  padding: 10px 34px 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--paper4);
  background: #fff;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
#srch:focus{border-color: var(--teal2); box-shadow: 0 0 0 3px var(--teal3);}
#srch::placeholder{color: var(--ink3); font-style: italic;}
.clr{
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--ink3);
  font-size: 18px; display: none; padding: 2px 4px;
}
.clr.show{display:block;}
.rnd-btn{
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--paper4);
  background: #fff;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
  flex-shrink: 0;
}
.rnd-btn:hover{background: var(--paper3);}

/* ── NUMMERPILLEN ── */
.num-pills{
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.npill{
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--paper4);
  background: #fff;
  color: var(--ink3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
  flex-shrink: 0;
}
.npill:hover{background: var(--teal4); color: var(--teal5); border-color: var(--teal3);}
.npill.on{background: var(--teal); color: #fff; border-color: var(--teal);}

/* ── NAV ── */
.nav-bar{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 20px;
}
.nav-btn{
  width: 34px; height: 34px;
  border-radius: 7px;
  border: 1px solid var(--paper4);
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .12s;
}
.nav-btn:hover:not(:disabled){background: var(--paper3);}
.nav-btn:disabled{opacity:.25; cursor:default;}
.nav-dots{
  display: flex; gap: 4px; flex: 1; flex-wrap: wrap; max-height: 18px; overflow: hidden;
}
.ndot{
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--paper4); cursor: pointer; flex-shrink: 0;
  transition: all .2s;
}
.ndot.on{background: var(--teal); transform: scale(1.6);}
.nav-counter{
  font-family: var(--mono); font-size: 11px; color: var(--ink3);
  white-space: nowrap; flex-shrink: 0;
}

/* ── CARD ── */
.card{
  background: #fff;
  border: 1px solid var(--paper4);
  border-radius: 16px;
  overflow: hidden;
  animation: enter .2s ease;
  box-shadow: 0 1px 2px rgba(10,40,40,.06), 0 3px 12px rgba(10,40,40,.05);
}
@keyframes enter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card head */
.card-head{
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--paper3);
  position: relative;
  padding-left: 32px;
}
.cat-stripe{
  position: absolute; top: 0; left: 0;
  width: 7px; height: 100%;
  background: var(--teal);
}
.card-num{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--teal2);
  letter-spacing: .06em;
  margin-bottom: 6px;
}
.card-name{
  font-family: var(--sans);
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 8px;
}
.card-nl{
  font-family: var(--body);
  font-size: 13px;
  font-style: italic;
  color: var(--ink3);
  margin-bottom: 10px;
}
.card-meta{
  display: flex; gap: 8px; flex-wrap: wrap;
}
.meta-pill{
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  color: var(--teal5);
  background: var(--teal4);
  border: 1px solid var(--teal3);
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: .02em;
}
.meta-pill-page{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 20px;
  padding: 3px 10px;
}

/* Card body */
.card-body{padding: 18px 24px 20px 32px;}

.section-lbl{
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--teal2);
  margin-bottom: 6px;
  display: block;
}

.goal-txt{
  font-family: var(--body);
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink2);
  margin-bottom: 18px;
}

/* ── WEERGAVE TOGGLE ── */
.view-toggle{
  display: flex;
  gap: 0;
  margin-bottom: 14px;
  border: 1px solid var(--paper4);
  border-radius: 8px;
  overflow: hidden;
  background: var(--paper2);
}
.vtab{
  flex: 1;
  padding: 8px 10px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--ink3);
  transition: all .15s;
  border-right: 1px solid var(--paper4);
}
.vtab:last-child{border-right: none;}
.vtab:hover{background: var(--paper3); color: var(--ink2);}
.vtab.on{background: var(--teal5); color: #fff;}

/* ── PER-STAP WEERGAVE ── */
.stage-nav{
  display: none;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 18px;
}
.stage-nav.show{display:flex;}
.stage-progress{
  display: flex;
  align-items: center;
  gap: 8px;
}
.stage-dot{
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--paper4);
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
}
.stage-dot.on{background: var(--teal); transform: scale(1.4);}
.stage-label{
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  color: var(--teal5);
  letter-spacing: .04em;
  flex: 1;
}
.stage-counter{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
}
.stage-content{
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 10px;
  overflow: hidden;
}
.stage-content-head{
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--teal5);
  padding: 8px 14px;
  background: var(--teal4);
  border-bottom: 1px solid var(--teal3);
  letter-spacing: .03em;
}
.stage-content-steps{
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.stage-nav-btns{
  display: flex;
  gap: 8px;
  justify-content: space-between;
}
.stage-btn{
  padding: 8px 16px;
  border-radius: 7px;
  border: 1px solid var(--paper4);
  background: #fff;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--teal);
  cursor: pointer;
  transition: all .12s;
}
.stage-btn:hover:not(:disabled){background: var(--teal4);}
.stage-btn:disabled{opacity:.25; cursor:default;}
.stage-btn.primary{background: var(--teal); color: #fff; border-color: var(--teal);}
.stage-btn.primary:hover:not(:disabled){background: var(--teal5);}

/* ── ALLE STAPPEN WEERGAVE ── */
.all-stages{
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}
.all-stages.show{display: flex;}

.stage-block{
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 10px;
  overflow: hidden;
}
.stage-head{
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--teal5);
  padding: 8px 14px;
  background: var(--teal4);
  border-bottom: 1px solid var(--teal3);
  letter-spacing: .03em;
}
.stage-steps{
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.step-row{
  display: flex; gap: 10px; align-items: flex-start;
}
.step-nr{
  min-width: 20px; height: 20px;
  background: var(--teal);
  color: #fff;
  border-radius: 50%;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-txt{
  font-family: var(--body);
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.55;
}

/* Power koppeling */
.power-block{
  margin-bottom: 14px;
}
.power-pills{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.power-pill{
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 11px;
  border-radius: 20px;
  border: 1px solid;
}
.power-over{background:#fdeee8;color:#5c2a10;border-color:#e8bca8;}
.power-to{background:#e8f0e4;color:#1e4a18;border-color:#b4d4aa;}
.power-with{background:#e8eef8;color:#1a2e5c;border-color:#aabce8;}

/* Tip block */
.tip-block{
  background: var(--teal4);
  border-left: 3px solid var(--teal2);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  margin-bottom: 14px;
}
.tip-lbl{
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 4px;
  display: block;
}
.tip-txt{
  font-family: var(--body);
  font-size: 12px;
  font-weight: normal;
  font-style: italic;
  line-height: 1.65;
  color: var(--ink2);
}

/* Source */
.bron-badge{
  display: inline-block;
  font-family: var(--sans);
  font-size: 10px;
  color: var(--ink3);
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 4px;
  padding: 2px 10px;
}

/* Empty */
.empty{
  text-align: center;
  padding: 4rem 1rem;
  font-family: var(--body);
  font-style: italic;
  color: var(--ink3);
}

/* Kbd hint */
.kbd-row{
  text-align: center;
  margin-top: 14px;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink3);
  line-height: 2;
}
kbd{
  font-family: var(--mono);
  font-size: 10px;
  background: var(--paper2);
  border: 1px solid var(--paper4);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--ink2);
}
</style>
</head>

<script>
const DATA = [
  {
    num: 1,
    en: "The Image of the Images",
    nl: "Het beeld van de beelden",
    page: "p. 77",
    power: ["power-with","power-to"],
    dur: "60–90 min",
    grp: "10–30 p.",
    doel: "Een collectief beeld vormen uit individuele beelden van onderdrukking — en de gemeenschappelijke kern blootleggen. Geschikt als opening met een nieuwe groep of als periodieke evaluatie.",
    stages: [
      {
        head: "Fase 1 — Individuele beelden",
        steps: [
          "Vormen groepen van 4–5. Elk lid sculpteert een beeld van een actuele of terugkerende onderdrukking.",
          "De protagonist sculpteert het beeld in stilte: via spiegelbeelden (zelf voordoen) of via boetseren (anderen met handen vormen).",
          "De protagonist neemt zelf ook een plek in het beeld in — als de onderdrukte. Anderen vervullen rollen als onderdrukker of bondgenoot.",
          "Elk lid van de subgroep bouwt zijn/haar eigen beeld, terwijl de al-geboetseerde anderen stil blijven."
        ]
      },
      {
        head: "Fase 2 — Parade van de beelden",
        steps: [
          "De grote groep komt samen. Elke subgroep toont zijn beelden in de esthetische ruimte.",
          "De joker vraagt objectieve observaties: 'Ik zie…' — geen interpretaties.",
          "Gemeenschappelijke elementen (houding, gebaar, positie) worden benoemd en verbonden."
        ]
      },
      {
        head: "Fase 3 — Het beeld van de beelden",
        steps: [
          "De groep vormt één synthetisch beeld dat de essentie van alle beelden bevat.",
          "Deelnemers bieden om beurten hun lichaam aan als beeld van de hoofdonderdrukte.",
          "De meest representatieve versie wordt gekozen — niet de mooiste, maar de meest consensuele.",
          "Rond het centrale beeld worden aanvullende beelden gebouwd."
        ]
      },
      {
        head: "Fase 4 — Dynamiseringen",
        steps: [
          "Interne monoloog (3 min): alle acteurs in het beeld spreken ononderbroken de gedachten van hun personage.",
          "Dialoog (3 min): acteurs, nog altijd bewegingloos, voeren dialoog met de hen omringende personages.",
          "Verlangen in actie: in slowmotion, zonder woorden, tonen acteurs het verlangen van hun personage via beweging."
        ]
      }
    ],
    tip: "Verbied woorden in de beeldfase — polysemie is de kracht van beeld. Zodra woordelijk vertaald is, is de rijkdom van meerduidigheid vernietigd. Houd de joker alert op het verschil tussen 'ik zie' (objectief) en 'het lijkt mij' (subjectief).",
    bron: "Rainbow of Desire, p. 77–85"
  },
  {
    num: 2,
    en: "The Image of the Word",
    nl: "Het beeld van het woord",
    page: "p. 87",
    power: ["power-to","power-with"],
    dur: "20–30 min",
    grp: "8–30 p.",
    doel: "Een woord dat betekenisvol is voor de groep vertalen naar lichaamsbeelden — en ontdekken welke veelheid van associaties en gevoelens er in één woord schuilgaat.",
    stages: [
      {
        head: "Stappen",
        steps: [
          "De joker kiest een woord dat relevant is voor de groep: een landnaam, politieke partij, beroep, begrip, historisch figuur.",
          "De groep staat in een kring. Op teken toont iedereen tegelijk zijn/haar beeld van dat woord — met het eigen lichaam.",
          "De groep hergroepeert in 'families': beelden die op elkaar lijken komen bij elkaar.",
          "Elke familie vocaliseert de woorden en associaties die het beeld oproept.",
          "Herhaling met andere woorden of met variaties op het eerste woord."
        ]
      }
    ],
    tip: "Kies het woord zorgvuldig op basis van wat er in de groep leeft. Een woord als 'veiligheid' of 'thuis' of 'werk' werkt krachtiger dan een abstract begrip. De 'familieclassificatie' onthult hoe divers de gevoelswereld van de groep is rond hetzelfde woord.",
    bron: "Rainbow of Desire, p. 87"
  },
  {
    num: 3,
    en: "Image and Counter-Image",
    nl: "Beeld en tegenbeeld",
    page: "p. 87",
    power: ["power-over","power-to"],
    dur: "45–70 min",
    grp: "8–25 p.",
    doel: "Een individueel verhaal van onderdrukking vertalen naar twee simultane beelden — het ene gemaakt door de protagonist, het andere door de co-piloot — om zo te zien hoe anderen onze situatie ervaren.",
    stages: [
      {
        head: "Fase 1 — De verhalen",
        steps: [
          "De groep splitst in koppels: de pilot (protagonist) en de co-pilot. Beiden sluiten de ogen.",
          "De pilot vertelt in stilte zijn/haar verhaal aan de co-pilot. De co-pilot luistert en mag vragen stellen: 'Wanneer? Hoe? Wat kleurde de kamer?'",
          "De co-pilot stelt geen oordelende vragen — alleen zintuiglijke en ruimtelijke."

      },
      {

          "Beiden nemen zelf hun positie in het beeld in — de pilot als zichzelf, de co-pilot als de protagonist."

      },
      {
        head: "Fase 3 — Observaties",

          "Het originele verhaal mag niet worden verteld — alleen de beelden spreken."
        ]
      },
      {
        head: "Fase 4 — Dynamiseringen",
        steps: [
          "Drie-wensen-modus: de protagonist en co-pilot mogen elk het beeld drie keer aanpassen naar wat zij echt willen.",
          "Verificatie van verlangen: in slowmotion herhalen ze de drie-wensen-bewegingen en kijken of anderen hen steunen of belemmeren.",
          "Piloten wisselen: protagonist neemt de plek van co-pilot in. Wat verandert er als de co-pilot's beeld het 'ware' beeld is?"
        ]

// ── STATE ──
let filtered = DATA.slice();
let idx = 0;
let stageIdx = 0;      // welke fase is actief in per-stap modus
let viewMode = 'step'; // 'step' | 'all'

// power labels
const POWER_LABELS = {
  'power-over': 'power over',
  'power-to':   'power to',
  'power-with': 'power with'
};

// ── RENDER CARD ──
function render(){
  const card = filtered[idx];
  const area = document.getElementById('card-area');
  if(!card){
    area.innerHTML='<div class="empty">Geen technieken gevonden.</div>';
    renderNav(); renderPills(); return;
  }

  // Clamp stageIdx
  const nStages = card.stages ? card.stages.length : 0;
  if(stageIdx >= nStages) stageIdx = Math.max(0, nStages-1);

  // ── Power pills ──
  const powerHTML = card.power && card.power.length
    ? `<div class="power-block">
        <span class="section-lbl">Power-koppeling</span>
        <div class="power-pills">
          ${card.power.map(p=>`<span class="power-pill ${p}">${POWER_LABELS[p]||p}</span>`).join('')}
        </div>
       </div>`
    : '';

  // ── Fasen/stappen HTML ──
  let stagesHTML = '';
  if(nStages > 0){
    if(viewMode === 'step'){
      const st = card.stages[stageIdx];
      const dots = card.stages.map((_,i)=>
        `<div class="stage-dot${i===stageIdx?' on':''}" onclick="goStage(${i})"></div>`).join('');
      stagesHTML = `
        <div class="view-toggle">
          <button class="vtab on" onclick="setView('step')">▶ Per fase</button>
          <button class="vtab" onclick="setView('all')">☰ Alle stappen</button>
        </div>
        <div class="stage-nav show">
          <div class="stage-progress">
            ${dots}
            <span class="stage-label">${st.head}</span>
            <span class="stage-counter">${stageIdx+1} / ${nStages}</span>
          </div>
          <div class="stage-content">
            ${st.head !== 'Stappen' ? `<div class="stage-content-head">${st.head}</div>` : ''}
            <div class="stage-content-steps">
              ${st.steps.map((s,i)=>`
                <div class="step-row">
                  <div class="step-nr">${i+1}</div>
                  <div class="step-txt">${s}</div>
                </div>`).join('')}
            </div>
          </div>
          <div class="stage-nav-btns">
            <button class="stage-btn" onclick="prevStage()" ${stageIdx===0?'disabled':''}>← Vorige fase</button>
            <button class="stage-btn primary" onclick="nextStage()" ${stageIdx>=nStages-1?'disabled':''}>Volgende fase →</button>
          </div>
        </div>`;
    } else {
      // all-stages view
      stagesHTML = `
        <div class="view-toggle">
          <button class="vtab" onclick="setView('step')">▶ Per fase</button>
          <button class="vtab on" onclick="setView('all')">☰ Alle stappen</button>
        </div>
        <div class="all-stages show">
          ${card.stages.map(st=>`
            <div class="stage-block">
              ${st.head !== 'Stappen' ? `<div class="stage-head">${st.head}</div>` : ''}
              <div class="stage-steps">
                ${st.steps.map((s,i)=>`
                  <div class="step-row">
                    <div class="step-nr">${i+1}</div>
                    <div class="step-txt">${s}</div>
                  </div>`).join('')}
              </div>
            </div>`).join('')}
        </div>`;
    }
  }

  area.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="cat-stripe"></div>
        <div class="card-num">Techniek ${card.num} van ${filtered.length}</div>
        <div class="card-name">${card.en}</div>
        ${card.nl && card.nl !== card.en ? `<div class="card-nl">${card.nl}</div>` : ''}
        <div class="card-meta">
          <span class="meta-pill">⏱ ${card.dur}</span>
          <span class="meta-pill">👥 ${card.grp}</span>
          ${card.page ? `<span class="meta-pill-page">📖 ${card.page}</span>` : ''}
        </div>
      </div>
      <div class="card-body">
        <span class="section-lbl">Doel</span>
        <div class="goal-txt">${card.doel}</div>
        ${powerHTML}
        ${stagesHTML}
        ${card.tip ? `<div class="tip-block">
          <span class="tip-lbl">◈ Joker-tip</span>
          <div class="tip-txt">${card.tip}</div>
        </div>` : ''}
        <div class="bron-badge">${card.bron}</div>
      </div>
    </div>`;

  renderNav();
  renderPills();
}

function renderNav(){
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  const counter = document.getElementById('nav-counter');
  const dots = document.getElementById('nav-dots');

  prev.disabled = idx === 0;
  next.disabled = idx >= filtered.length - 1;
  counter.textContent = filtered.length ? `${idx+1} / ${filtered.length}` : '0 / 0';

  dots.innerHTML = '';
  filtered.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'ndot' + (i===idx?' on':'');
    d.onclick = ()=>{ goCard(i); };
    dots.appendChild(d);
  });
}

function renderPills(){
  const el = document.getElementById('num-pills');
  el.innerHTML = '';
  // Only show pills when showing full unfiltered set
  if(filtered.length !== DATA.length){ el.style.display='none'; return; }
  el.style.display='flex';
  DATA.forEach((d,i)=>{
    const p = document.createElement('button');
    p.className = 'npill' + (i===idx?' on':'');
    p.textContent = d.num;
    p.title = d.en;
    p.onclick = ()=>{ goCard(i); };
    el.appendChild(p);
  });
}

// ── NAVIGATION ──
function goCard(i){
  idx = i; stageIdx = 0; render();
}
function goStage(i){
  stageIdx = i; render();
}
function prevStage(){
  const card = filtered[idx];
  if(stageIdx > 0){ stageIdx--; render(); }
}
function nextStage(){
  const card = filtered[idx];
  if(card && stageIdx < card.stages.length-1){ stageIdx++; render(); }
}
function setView(mode){
  viewMode = mode; render();
}

// ── SEARCH ──
document.getElementById('srch').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  document.getElementById('clr-btn').classList.toggle('show', q.length>0);
  if(!q){ filtered = DATA.slice(); }
  else {
    filtered = DATA.filter(d =>
      d.en.toLowerCase().includes(q) ||
      d.nl.toLowerCase().includes(q) ||
      d.doel.toLowerCase().includes(q) ||
      (d.tip||'').toLowerCase().includes(q)
    );
  }
  idx = 0; stageIdx = 0; render();
});

document.getElementById('clr-btn').onclick = function(){
  document.getElementById('srch').value = '';
  this.classList.remove('show');
  filtered = DATA.slice(); idx = 0; stageIdx = 0; render();
};

// ── NAV BUTTONS ──
document.getElementById('prev-btn').onclick = ()=>{
  if(idx>0){ idx--; stageIdx=0; render(); }
};
document.getElementById('next-btn').onclick = ()=>{
  if(idx<filtered.length-1){ idx++; stageIdx=0; render(); }
};

// ── RANDOM ──
document.getElementById('rnd-btn').onclick = ()=>{
  if(filtered.length<2) return;
  let ni; do{ ni=Math.floor(Math.random()*filtered.length); }while(ni===idx && filtered.length>1);
  idx=ni; stageIdx=0; render();
};

// ── KEYBOARD ──
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  // Left/Right: wisselen tussen technieken
  if(e.key==='ArrowLeft'){
    if(idx>0){ idx--; stageIdx=0; render(); }
    return;
  }
  if(e.key==='ArrowRight'){
    if(idx<filtered.length-1){ idx++; stageIdx=0; render(); }
    return;
  }
  // Up/Down: stap door fasen
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const card = filtered[idx];
    if(card && stageIdx > 0){ stageIdx--; render(); }
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const card = filtered[idx];
    if(card && stageIdx < card.stages.length-1){ stageIdx++; render(); }
    return;
  }
  // Cijfertoetsen 1–9: direct naar techniek (op basis van originele num)
  if(e.key>='1' && e.key<='9'){
    const num = parseInt(e.key);
    const fi = filtered.findIndex(d=>d.num===num);
    if(fi>=0){ idx=fi; stageIdx=0; render(); }
    return;
  }
  // Space: willekeurig
  if(e.key===' '){ e.preventDefault(); document.getElementById('rnd-btn').click(); }
});

// ── INIT ──
render();
</script>
</body>
</html>
