  {b:"lichaam",n:"De sinaasappel",t:"Icebreaker / contact",d:"10–15 min",g:"8–30 p.",o:"Lichamelijk contact en samenwerking via een belachelijk eenvoudige opdracht.",s:["Cirkel. De eerste persoon krijgt een sinaasappel onder de kin.","Opdracht: geef de sinaasappel door — alleen met kin en hals, geen handen.","Wie de sinaasappel laat vallen, begint opnieuw bij de vorige persoon.","Variatie: twee teams tegen elkaar."],tg:["kennismaking","contact","lichaam","humor"],tip:"Houd een camera bij de hand. De aarzeling vóór het doorgeven is het grappigste moment — en meteen ook het meest veelzeggende.",bron:"Grahame Knox",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"beeld",n:"Wij kijken naar jullie, jullie kijken naar ons",t:"Polariteit / confrontatie",d:"5 min",g:"12–40 p.",o:"De confrontatie tussen twee gepolariseerde groepen fysiek maken — simpel, direct en geladen.",s:["Twee groepen tegenover elkaar met veel ruimte ertussen.","Om de beurt, op steeds nadrukkelijkere toon: 'Wij kijken naar jullie, jullie kijken naar ons'.","Herhaal tien keer — vijf per groep.","Neem de tijd."],tg:["conflict","ensemble","aanwezigheid"],tip:"Zet deze oefening pas in als de twee groepen al gevormd zijn en een polariteit benoemd is. Het is geen warming-up — het is een aankondiging.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"zintuigen",n:"Beeld en geluid van hoe je de ruimte verlaat",t:"Afsluiting / check-out",d:"1 min",g:"Onbeperkt",o:"In één beweging + geluid laten zien hoe je de bijeenkomst verlaat — een snelle gevoelsmeting.",s:["Kring. Om de beurt: een beweging + geluid over hoe je de ruimte verlaat.","De rest herhaalt de beweging en het geluid.","Joker vat kort samen wat opvalt.","Variatie: een getal van 1 tot 10 in plaats van een geluid."],tg:["gevoel","reflectie"],tip:"Kan ook als check-in aan het begin. Als je het beide doet geeft het een meting van wat de bijeenkomst heeft bijgedragen.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Balletje overgooien",t:"Concentratie / coördinatie",d:"10–15 min",g:"8–30 p.",o:"Groepsfocus opbouwen in stilte — zonder woorden één bal doorgeven, dan meerdere tegelijk.",s:["Kring. Joker gooit een tennisbal kriskras door de cirkel — in stilte, geen woorden.","Als dit goed gaat: tweede bal erbij. Twee ballen tegelijk, van twee kanten.","Opbouwen met 3, 4 ballen — concentratie op alle hoeken tegelijk.","Als een bal valt: stilletjes oppakken en doorgaan. Geen commentaar."],tg:["concentratie","stilte","lichaam","ensemble"],tip:"Stilte is niet decoratief — het dwingt iedereen op de bal én op elkaar te letten. Gooi nooit vóór oogcontact.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"De langzaamste",t:"Concentratie / reflectie",d:"10–15 min",g:"6–30 p.",o:"Een wedstrijd wie het langzaamst oversteekt — en ontdekken hoe ons hele leven op snelheid is getraind.",s:["Startlijn en finishlijn op twee meter afstand.","Opdracht: wie steekt het langzaamst over? Je mag niet stilstaan — continue voorwaartse beweging.","Wie als laatste aankomt heeft gewonnen.","Nabespreking: wat maakte het frustrerend? Wat zegt dat over hoe we normaal bewegen?"],tg:["concentratie","reflectie"],tip:"Mensen met een fysieke beperking winnen dit spel soms moeiteloos — voor het eerst in hun leven een voordeel. Benoem dat achteraf.",bron:"Boal",fase:"opwarming",niv:2,eng:"laag"},
  {b:"zintuigen",n:"De sleutelwachter",t:"Concentratie / gehoor",d:"10–15 min",g:"8–30 p.",o:"Blinde bewaker versus stille aanvallers — gehoor als enige zintuig.",s:["Één vrijwilliger, geblinddoekt, staat in het midden met een sleutelbos voor de voeten.","De rest verspreidt zich — op teken proberen ze geluidloos de sleutels te pakken.","Als de wachter een geluid hoort, wijst hij die kant op. Aangewezene begint opnieuw.","Wie de sleutels pakt en terugkrijgt wint — en wordt de nieuwe wachter."],tg:["gehoor","concentratie","stilte","competitie"],tip:"Varieer: de aanvallers mogen maar langzaam kruipen, of alleen via de buitenkant van de cirkel. Verhoog de spanning geleidelijk.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Zip Zap Boink",t:"Concentratie / energie",d:"10–15 min",g:"8–30 p.",o:"Energie en focus combineren via drie steeds complexere commando's — fouten zijn het spel.",s:["Kring. 'Zip': beide handen samengesteld naar links of rechts — doorsturen naar buur.","'Zap': beide handen naar iemand in de kring die niet naast je staat.","'Boink': handen open terugkaatsen naar de aangever — de richting keert terug.","Wie een fout maakt sterft dramatisch, staat op en speelt verder."],tg:["opwarming","concentratie","plezier"],tip:"De theatrale dood is essentieel — het haalt de druk van fouten en maakt het spel groter. Moedig overdrijving aan.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Peruaanse bal",t:"Verbeelding / concentratie",d:"15–20 min",g:"8–30 p.",o:"Een denkbeeldige bal belichamen — en die bal doorgeven aan anderen terwijl het ding verandert.",s:["Iedereen stuit een fictieve bal door de ruimte — met passend geluid.","Na verloop van tijd: ruil je bal met de eerste die je tegenkomt. Loop verder met die bal.","Vier keer ruilen. Daarna: zoek je eigen originele bal terug.","Nabespreking: wie had zijn bal terug? Hoe waren de ballen veranderd?"],tg:["verbeelding","concentratie","lichaam","geheugen"],tip:"De vervormde ballen zijn het mooiste moment. Vraag mensen te beschrijven wat er veranderd was — dat opent een gesprek over overdracht en vertekening.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"geheugen",n:"Bommen en schilden",t:"Reflectie / bewustwording",d:"10–15 min",g:"8–30 p.",o:"Wie is jouw gevaar, wie is jouw bescherming? Een metafoor van angst en veiligheid in beweging.",s:["Iedereen kiest in stilte een 'bom' (persoon A) en een 'schild' (persoon B).","Beweeg door de ruimte: houd zo veel mogelijk afstand tot A, en houd B tussen jou en A.","Na enkele minuten bevriest de Joker de groep. Kijk naar de posities — wat zie je?","Nabespreking: wat zijn bommen en schilden in het echte leven van de deelnemers?"],tg:["reflectie","ensemble"],tip:"De metaforen zijn aanpasbaar: beschermer en bedreiging, thuishaven en gevaar. Kies woorden die aansluiten op de context van de groep.",bron:"Boal",fase:"verdieping",niv:2,eng:"laag"},
  {b:"zintuigen",n:"Italiaanse regen",t:"Concentratie / gehoor",d:"10–15 min",g:"8–30 p.",o:"Een geluidsgolf van regen laten groeien en krimpen — alleen door te luisteren naar de buur.",s:["Kring, ogen dicht. Joker begint: pink op handpalm tikken — zacht regen.","Wave gaat rond: buur kopieert, dan zijn buur, totdat de hele cirkel meedoet.","Langzaam opbouwen: twee vingers, drie, vier, vijf, voeten stampen — een stortbui.","Daarna afbouwen naar stilte. Ogen dicht houden gedurende de hele oefening."],tg:["gehoor","concentratie","stilte","ensemble"],tip:"Gebruik dit als publieksopwarming bij een Forumtheatervoorstelling — het stilt de ruimte en maakt het publiek ontvankelijk.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"geheugen",n:"Continuüm",t:"Reflectie / positiebepaling",d:"15–25 min",g:"6–30 p.",o:"Jezelf positioneren op een lijn tussen twee uitersten — zonder te praten, alleen met het lichaam.",s:["Joker plaatst twee uitersten in de ruimte: 'volledig eens' versus 'volledig oneens'.","Deelnemers plaatsen zichzelf op de lijn. Geen twijfelzone — kies een plek.","Joker vraagt enkele mensen waarom ze staan waar ze staan — kort, zonder debat.","Herhaal met andere stellingen. Eindig met een stelling die direct het thema raakt."],tg:["reflectie","positiebepaling","lichaam"],tip:"Het lichaam liegt minder makkelijk dan woorden. Maar wie naast iemand staat voelt de druk van dat gezelschap — benoem dat.",bron:"Boal",fase:"verdieping",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"De knoop",t:"Samenwerking / probleemoplossing",d:"20–30 min",g:"8–20 p.",o:"De groep verwart zichzelf — en moet zichzelf ontwarren zonder handen los te laten.",s:["Kring. Iedereen pakt de handen van twee verschillende mensen — niet de buren.","Opdracht: ontrafel de knoop tot een cirkel — zonder handen los te laten.","Communiceren mag. Soms zijn er twee cirkels als resultaat — ook goed.","Variant: in stilte, of met ogen dicht — vertrouwen op aanraking."],tg:["ensemble","reflectie","lichaam","vertrouwen"],tip:"Drie mogelijke uitkomsten: één cirkel (succes), twee cirkels (ook goed), echt onoplosbaar (vraag dan: welke hand zou je loslaten?). Alle drie zijn bruikbaar.",bron:"Boal",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"lichaam",n:"Wandel als een...",t:"Karakterontwikkeling / acteertraining",d:"15–20 min",g:"8–30 p.",o:"Identiteiten en rollen belichamen via de manier van lopen — hoe draagt een rol jouw lichaam?",s:["Iedereen loopt neutraal door de ruimte.","Joker roept een identiteit: koningin, zwerver, ambtenaar, tiener, politieman.","Deelnemers transformeren onmiddellijk en lopen als die identiteit.","Variatie: ontmoet iemand — hoe reageert jouw rol op die van de ander?"],tg:["personage","lichaam","identiteit"],tip:"Vraag achteraf: was er een rol die aangenaam voelde? Die ongemakkelijk zat? Dat is het begin van een gesprek over sociale positie.",bron:"Boal",fase:"opwarming",niv:1,eng:"middel"},
  {b:"kennismaking",n:"De grote leugen",t:"Warming-up / kennismaking",d:"10–15 min",g:"8–30 p.",o:"Jezelf voorstellen met een absurde leugen — en zo de norm van het 'echte' antwoord doorbreken.",s:["Rondje. Iedereen noemt zijn naam én één groot onwaar feit: 'Ik ben Youssef en ik heb een haai in mijn badkuip.'","Hoe groter de leugen, hoe beter.","Wie niks kan verzinnen krijgt extra tijd — anderen wachten in stilte.","Nabespreking: wat is de relatie tussen leugen en theater?"],tg:["opwarming","verbeelding","kennismaking"],tip:"Gebruik dit als ingang naar 'theater is doen alsof' — het onderscheid tussen waarheid en verbeelding is een cruciaal Boal-concept.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"hoog"},
  {b:"kennismaking",n:"Postkaartenspel",t:"Kennismaking / reflectie",d:"15–20 min",g:"6–25 p.",o:"Een postkaart kiezen als spiegel van je stemming of identiteit — en dat delen zonder uitleg.",s:["Spread een verzameling uiteenlopende postkaarten op de grond.","Iedereen kiest één kaart — hoe je hem kiest is jouw keuze.","In een kring: iedereen toont de kaart en zegt één zin over de keuze — geen uitleg verplicht.","Variatie: kies een kaart die past bij hoe je je vandaag voelt, of bij je droom, of je grootste angst."],tg:["reflectie","kennismaking","gevoel"],tip:"Hoe mensen kiezen (snel/langzaam, eerste impuls/lang nadenken) zegt al iets. De kaart hoeft niet letterlijk iets te betekenen.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"laag"},
  {b:"kennismaking",n:"Namen gooien",t:"Kennismaking / concentratie",d:"10–15 min",g:"8–30 p.",o:"Namen leren door ze letterlijk te gooien — met een denkbeeldige bal die je oogcontact vereist.",s:["Kring. Joker gooit een denkbeeldige bal naar iemand — zegt daarbij de naam van die persoon.","Die persoon vangt, zegt een andere naam, gooit naar die persoon.","Na een ronde: twee ballen tegelijk.","Variatie: gooi met de naam van iemand die je nog niet kent — gebruik de oefening om namen te leren."],tg:["kennismaking","concentratie","oogcontact"],tip:"Oogcontact vóór het gooien is de enige harde regel. Wie gooit zonder te kijken gooit naar zichzelf.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"laag"},
  {b:"lichaam",n:"Schrijf je naam met een lichaamsdeel",t:"Kennismaking / lichaam",d:"5–10 min",g:"6–40 p.",o:"Je naam in de lucht schrijven met een lichaamsdeel naar keuze — hoe onverwachter hoe beter.",s:["Iedereen loopt door de ruimte en schrijft zijn naam in de lucht met de vinger.","Dan met de elleboog.","Dan met de knie, de heup, de neus, het hoofd.","Variatie: schrijf de naam van iemand anders."],tg:["lichaam","kennismaking","opwarming","humor"],tip:"Dit is simpel maar het werkt — mensen beginnen te lachen en ontspannen. De eigenaardigheid van het lichaamsdeel is het punt, niet de kwaliteit van het schrift.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"geheugen",n:"Vloermap",t:"Reflectie / kennismaking",d:"15–25 min",g:"6–30 p.",o:"De groep letterlijk spreiden over een denkbeeldige kaart van de wereld — en verkennen wie er waar vandaan komt.",s:["De vloer is een kaart van Nederland of de wereld — Joker benoemt de oriëntatie.","Vraag: ga staan waar je geboren bent. Kijk om je heen.","Nieuwe vraag: ga staan waar je je beste vriend hebt. Waar je over 5 jaar wil zijn.","Elke vraag geeft een ander landschap van de groep."],tg:["kennismaking","reflectie","identiteit"],tip:"Vragen over 'waar wil je niet meer heen' en 'waar heb je je veiligst gevoeld' zijn het meest veelzeggend. Begin licht, eindig diep.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Ritme door de ruimte",t:"Warming-up / muzikaliteit",d:"10–15 min",g:"8–30 p.",o:"Een gedeeld ritme vinden als groep — en dat ritme omzetten naar beweging door de ruimte.",s:["Joker klapt een vierkwartsmaat — groep klapt mee.","Accentueer één tel: iedereen stopt een stap daarin.","Vier bewegingen bedenken op vier tellen — waarvan minimaal één met stap voorwaarts.","Groep beweegt door de ruimte op dit ritme — tot het uiteenvalt in individueel spel."],tg:["ritme","beweging","opwarming"],tip:"Zodra de groep uiteenvalt en de mensen elkaar als individu ontmoeten in de ruimte — alleen met dit ritme als taal — is de oefening op haar hoogtepunt.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"kennismaking",n:"Krantenmep",t:"Kennismaking / reactie",d:"5–10 min",g:"9–30 p.",o:"Naam + snelheid. De mepster probeert iemand te raken voordat die zijn eigen naam zegt.",s:["Kring op stoelen. Één persoon staat in het midden met een opgerolde krant.","De mepster loopt naar iemand en probeert hem op het hoofd te tikken.","Die persoon moet zijn eigen naam roepen vóór de mep aankomt.","Als het niet lukt: wisselen. Variatie: niet eigen naam maar die van een buur roepen."],tg:["kennismaking","humor","concentratie"],tip:"Varieer het tempo van de mepster — soms snel, soms overdreven langzaam. Dat is het grappigste moment.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"hoog"},
  {b:"geheugen",n:"Innerlijke monoloog",t:"Repetitietechniek / beeldentheater",d:"15–25 min",g:"6–20 p.",o:"De verborgen gedachten van een bevroren personage hardop horen — alle gedachten, ook de tegenstrijdige.",s:["Een compositiebeeld staat stil op de vloer.","Joker geeft opdracht: 'Spreek alle gedachten die in je opkomen hardop uit — censureer niets.'","Alle personages tegelijk — het wordt een kakofonie. Dat is goed.","Variatie: Joker tikt iemand aan — alleen die persoon spreekt. De rest wacht."],tg:["innerlijk","verhaal","image theater","personage"],tip:"De gedachten die iemand wil censureren zijn de interessantste. Benadruk dat alles gezegd mag worden — het is theater, niet therapie.",bron:"Formaat",fase:"repetitie",niv:2,eng:"laag"},
  {b:"beeld",n:"Compositiebeelden",t:"Beeldentheater / analyse",d:"20–40 min",g:"6–20 p.",o:"Meerdere personages samen een situatie laten uitbeelden — en via het beeld de kern van het probleem vinden.",s:["Joker geeft een thema of begrippenpaar: 'vrijheid/onvrijheid', 'thuis/dakloos'.","Groepen van 4–5 bouwen een compositiebeeld met hun lichamen.","Andere groepen kijken: wat zien ze? Geen interpretatie — alleen beschrijving.","Variatie: één groep maakt beeld van de werkelijkheid, de andere van het ideaal."],tg:["image theater","analyse","ensemble"],tip:"Meerdere beelden naast elkaar van hetzelfde thema laten zien hoe divers één begrip kan zijn. Gebruik dat verschil — niet als fout maar als rijkdom.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeldhouwer en klei",t:"Beeldentheater / Image Theater",d:"20–30 min",g:"6–30 p.",o:"Het lichaam van een ander vormen als materiaal — en daarin een emotie of situatie inscrijven.",s:["Tweetallen. A is klei, B is beeldhouwer. A is volledig passief — laat zich vormen.","B vormt A tot een beeld van een bepaalde emotie of situatie — zonder woorden.","B stapt achteruit en bekijkt het beeld.","Wissel rollen. Dan: beide beelden naast elkaar — wat zien we?"],tg:["lichaam","image theater","ensemble"],tip:"De klei mag geen oordeel hebben over het beeld — alleen gevormd worden. Dat is een zeldzame ervaring van volledig loslaten.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Woordenwisseling",t:"Beeldentheater / dynamisering",d:"15–25 min",g:"6–20 p.",o:"Een bevroren beeld laten spreken — één woord of zin per personage, dan improvisatie.",s:["Een compositiebeeld staat stil.","Joker tikt elk personage aan: die zegt het eerste woord of de eerste zin die opkomt.","Daarna: het beeld begint te bewegen en te reageren — korte improvisatie.","Joker stopt: 'Bevries!' — nieuw beeld. Beschrijf wat er veranderd is."],tg:["image theater","taal","improvisatie"],tip:"De eerste zin is het meest eerlijk — wie te lang nadenkt gaat regisseren in plaats van voelen. Snel aantikken helpt.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"forum",n:"Slow motion en fast forward",t:"Repetitietechniek / acteertraining",d:"15–25 min",g:"4–20 p.",o:"Een scène vertragen of versnellen — en ontdekken hoe het tempo de betekenis verandert.",s:["Een scène wordt gespeeld in normaal tempo.","Joker roept 'slow motion' — alles vertraagt naar uiterst langzaam.","Joker roept 'fast forward' — alles versneld, als een old film.","Nabespreking: wat zag je in de slow motion dat je normaal miste?"],tg:["personage","analyse"],tip:"Slow motion onthult wat fast forward verbergt. De scène in slow motion is een analytisch instrument — geen grap.",bron:"Formaat",fase:"repetitie",niv:2,eng:"middel"},
  {b:"geheugen",n:"Verlangen en handeling",t:"Beeldentheater / scèneontwikkeling",d:"20–30 min",g:"4–20 p.",o:"Het verlangen van een personage zichtbaar maken — en de kloof tussen verlangen en handeling onderzoeken.",s:["Een compositiebeeld staat stil. Joker vraagt: 'Wat wil dit personage het allerliefst?'","De groep antwoordt vanuit het beeld — niet vanuit het verhaal.","Het personage articuleert het verlangen in één zin: 'Ik wil...'","Vervolgens: speelt de scène. Komt het verlangen tot uitdrukking? Wat blokkeert het?"],tg:["verlangen","scène","image theater","personage"],tip:"Het verschil tussen wat een personage wil en wat het doet is de kern van elk Forum. Dit is die kern zichtbaar maken.",bron:"Formaat",fase:"repetitie",niv:3,eng:"middel"},
  {b:"geheugen",n:"Continuüm langs de lijn",t:"Reflectie / evaluatie",d:"15–25 min",g:"6–30 p.",o:"Mening en positie laten zien via het lichaam — geen anonimiteit, geen ontkomen.",s:["Een denkbeeldige lijn van 'volledig eens' tot 'volledig oneens' doorloopt de ruimte.","Joker stelt een stelling. Deelnemers plaatsen zichzelf op de lijn.","Joker vraagt op sleutelposities: 'Waarom sta je hier?'","Eindig met een stelling die direct gaat over de situatie van de deelnemers."],tg:["reflectie","positiebepaling"],tip:"Zorg dat de extreme posities ook veilig zijn om in te nemen. Wie alleen staat op het uiterste heeft moed getoond — erken dat.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"laag"},
  {b:"forum",n:"Onzichtbaar theater",t:"Sociale actie / Forum Theater",d:"30–60 min",g:"4–15 p.",o:"Theater spelen op een publieke plek zonder dat het publiek weet dat het theater is — sociale realiteit bevragen.",s:["Bereid een korte scène voor over een herkenbaar sociaal probleem.","Kies een publieke plek: trein, markt, wachtkamer, winkelpand.","Speel de scène — reageer op de werkelijke reacties van het onwetende publiek.","Nabespreking met de spelers: wat gebeurde er? Wat zei het over de sociale werkelijkheid?"],tg:["forum theater"],tip:"Nooit onthullen dat het theater was — het publiek heeft recht op zijn eigen ervaring. Dit is geen truc maar een spiegel.",bron:"Formaat",fase:"forum",niv:3,eng:"middel"},
  {b:"beeld",n:"Getuige zijn",t:"Image Theater / getuigenis",d:"30–45 min",g:"8–25 p.",o:"Leren getuigen zonder te oordelen — het beeld zien en bewaren, niet verklaren.",s:["Groep A speelt een stille scène van twee à drie minuten — een moment uit eigen leven.","Groep B kijkt zonder te praten. Geen commentaar, geen interpretatie.","Na de scène: groep B beschrijft alleen wat ze zagen — geen 'ik denk dat...' maar 'ik zag...'","Groep A luistert. Dan wisselen."],tg:["verhaal","image theater","observatie"],tip:"Het verschil tussen 'ik zag' en 'ik denk dat' is de kern van deze oefening. Houd de groep strikt aan die grens — het is moeilijker dan het lijkt.",bron:"TOPLAB LA",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"forum",n:"De drie wensen",t:"Image Theater / transformatie",d:"20–30 min",g:"6–20 p.",o:"Een protagonistscène transformeren via drie concrete alternatieven — wat zou jij doen?",s:["Een scène of beeld van een geblokkeerde protagonist wordt getoond.","Joker roept drie 'toeschouwer-acteurs' — elk brengt één alternatieve handeling in.","Elke alternatief wordt kort uitgespeeld — max. twee minuten per wens.","Nabespreking: welk alternatief was het meest realistisch? Welk het meest verlangd?"],tg:["transformatie","personage","forum theater"],tip:"De drie wensen zijn geen oplossingen — ze zijn onderzoek. Moedig ook moedige of onwaarschijnlijke wensen aan.",bron:"TOPLAB LA",fase:"forum",niv:3,eng:"middel"},
  {b:"geheugen",n:"De politieagenten in het hoofd",t:"Introspectief / innerlijk werk",d:"30–60 min",g:"4–15 p.",o:"De innerlijke stemmen die handelen blokkeren zichtbaar en bespreekbaar maken.",s:["Een protagonist beschrijft een moment van innerlijke blokkade — niet van buitenaf opgelegd.","Andere spelers belichamen de blokkerende innerlijke stemmen: angst, schaamte, gewoonte, loyaliteit.","De protagonist staat tegenover zijn 'agenten' en stelt vragen — de agenten antwoorden vanuit hun logica.","Wat wil de protagonist écht? Wat houdt hem/haar tegen?"],tg:["innerlijk"],tip:"Dit is emotioneel zwaar werk. Begin alleen als de groep al vertrouwen heeft opgebouwd. De protagonist bepaalt wanneer te stoppen.",bron:"TOPLAB LA",fase:"verdieping",niv:3,eng:"laag"},
  {b:"beeld",n:"Caleidoscopisch beeld",t:"Image Theater / verdieping",d:"30–45 min",g:"8–25 p.",o:"Hetzelfde beeld vanuit steeds verschillende invalshoeken bekijken — als een caleidoscoop van betekenis.",s:["Een compositiebeeld staat stil.","Joker vraagt de toeschouwers te verplaatsen — andere kant, andere hoogte, andere afstand.","Elk nieuw standpunt levert nieuwe beschrijvingen op.","Dan: één personage verandert één klein ding. Wat verandert er in het geheel?"],tg:["image theater","perspectief","analyse"],tip:"Kleine veranderingen in een beeld kunnen de machtsverhouding volledig omdraaien. Dit is letterlijk het inzicht van het Forum.",bron:"TOPLAB LA",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Piloot en copiloot",t:"Beeldentheater / analyse",d:"30–45 min",g:"4–20 p.",o:"Een beeld en zijn tegengestelde naast elkaar zetten — en de spanning daartussen onderzoeken.",s:["Groep A bouwt een beeld van een onderdrukkingssituatie.","Groep B bouwt het tegengestelde beeld — hoe zou het eruitzien als dit opgelost was?","Beide beelden tegelijk: wat is de afstand? Hoe groot is de kloof?","Dynamiseer: kunnen de beelden naar elkaar toe bewegen? Wat is daarvoor nodig?"],tg:["image theater","analyse"],tip:"De kloof tussen de twee beelden is het Forum. Niet het ideale beeld is het doel — de beweging erheen is het onderwerp.",bron:"TOPLAB LA",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"forum",n:"Bliksemforum",t:"Forum Theater / snelheid",d:"15–25 min",g:"8–30 p.",o:"Een Forumscène in supersnelheid spelen — interventies van dertig seconden, maximaal drie per persoon.",s:["Scène wordt getoond — kort, maximaal drie minuten.","Toeschouwers kunnen 'Stop!' roepen — maximaal dertig seconden interventietijd.","De acteurs reageren zo snel als de interventie — geen lange uitleg.","Na vijf à zes interventies: nabespreking. Wat werkte? Wat niet?"],tg:["forum theater","ritme"],tip:"Bliksemforum is niet minder diep — het is anders diep. De snelheid dwingt impulsieve, eerlijkere interventies af. Gebruik het als warm-up voor een langer Forum.",bron:"TOPLAB LA",fase:"forum",niv:3,eng:"hoog"},
  {b:"forum",n:"Open cirkel",t:"Forum Theater / publieksopwarming",d:"15–20 min",g:"10–40 p.",o:"Het publiek letterlijk de scène in trekken — door een gat in de cirkel te laten.",s:["Spelers staan in een cirkel en spelen een herhalende scène van onderdrukking.","Er is één plek open in de cirkel — een uitnodiging aan het publiek.","Wie de open plek inloopt neemt de rol van protagonist over.","De cirkel draait door — nieuwe kansen om in te stappen tot iedereen dood of vrij is."],tg:["forum theater"],tip:"De open cirkel is visueel helder — iedereen ziet de uitnodiging. Geen aankondiging nodig, geen uitleg. Het gat is de vraag.",bron:"TOPLAB LA",fase:"opwarming",niv:3,eng:"hoog"},
  {b:"beeld",n:"Het Museum van het Onbeschrijflijke",t:"Image Theater / politiek",d:"45–60 min",g:"10–30 p.",o:"De dubbele blik van overlevenden en ontkenners fysiek maken — en onderzoeken waar de menselijke kern zit van degene die ontkent.",s:["Groep A verspreidt zich in de ruimte als overlevenden van een genocide te midden van ontkenners — en bevriest in dat beeld.","Groep B betreedt het museum: Joker kondigt plechtig aan. B loopt door de ruimte en deelt observaties hardop — wie is dit beeld, wat is er gebeurd, waar gaat het heen?","Groep B kiest elk een beeld en bevriest als de ontkenner die dit beeld heeft veroorzaakt. Groep A gaat in het publiek zitten en kijkt.","Rollen wisselen: groep A betreedt het museum van ontkenners. Joker kondigt opnieuw aan. A deelt hardop: wie zijn deze mensen, wat willen ze?","Groep A kiest elk een beeld en bevriest als therapeut van deze ontkenner — zoekend naar de menselijke kern. Iedereen schudt uit en geeft de persoon tegenover zich een hand of omhelzing."],tg:["image theater","verhaal","macht"],tip:"De aankondigingen zijn essentieel — spreek ze langzaam en plechtig uit. Het museum-frame beschermt deelnemers: ze spelen een rol in een tentoonstelling, niet zichzelf. Bewaar die fictie zorgvuldig.",bron:"TOPLAB LA",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"lichaam",n:"Persoon tot persoon",t:"Lichaamswerk / contact",d:"10–15 min",g:"6–30 p.",o:"Lichaamsdelen verbinden op commando — een cumulatief contactspel dat het lichaamsbewustzijn opbouwt.",s:["Tweetallen. Joker roept twee lichaamsdelen: 'Hoofd op hoofd!' — partners verbinden die delen.","Het spel is cumulatief: verbinding van de vorige ronde blijft bestaan.","Variatie: bij 'Verander!' zoekt iedereen een nieuw koppel — maar de laatste verbinding moet ook bij het nieuwe koppel worden gecontinueerd.","Opbouwen tot de meest absurde combinaties."],tg:["lichaam","contact","aanraking","opwarming"],tip:"Dit werk snel intimiteit zonder dat iemand daar actief voor kiest — het spel doet het. Goed voor groepen die nog niet gewend zijn aan aanraking.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"De beer van Poitiers",t:"Lichaamswerk / spel",d:"10–15 min",g:"8–30 p.",o:"Houthakkers plagen de beer — en de beer probeert zijn slachtoffers te laten bewegen.",s:["Één deelnemer is de beer. De anderen zijn houthakkers — ze zagen, hakken, rusten.","Op een willekeurig moment brult de beer. Iedereen moet direct stilstaan — absoluut geen beweging.","De beer loopt langs zijn slachtoffers: kietelen, grimassen, grommend naderen.","Wie beweegt wordt de nieuwe beer."],tg:["lichaam","opwarming","concentratie","plezier"],tip:"Zet dit in voor groepen die moeilijk stil kunnen staan. De beloning van stilstand — niemand die de beer is — werkt krachtiger dan een regel.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Haasje over",t:"Lichaamswerk / energie",d:"5–10 min",g:"6–30 p.",o:"Het klassieke kinderspel — als opwarming voor het lichaam én als terugkeer naar speels instinct.",s:["Iemand bukt met handen op knieën. De volgende springt er overheen en bukt dan zelf.","Zo vormt zich een ketting van steeds meer ruggen.","Variatie: cumulatief — de hele groep als ketting die steeds verder rijdt.","Opbouwen: met meer mensen achter elkaar, kleiner maken van de ruggen."],tg:["lichaam","opwarming"],tip:"Eenvoudiger dan het lijkt. Wie aarzelt bij het springen heeft er een oefeningenmoment. Vraag achteraf: wanneer aarzelde je en waarom?",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Opposite of Jackson",t:"De-mechanisatie / lichaam",d:"10–15 min",g:"8–40 p.",o:"De-mechanisatie via omgekeerde instructies — ervaren hoe diep geprogrammeerd reacties zijn, en hoe zwaar het werk van ontleren is.",s:["Iedereen loopt rond op commando 'loop', stopt op 'stop'. Oefen kort.","'Nu wisselen we: loop betekent stop, stop betekent loop.' Oefen.","Voeg nieuwe paren toe — eerst uitleggen wat ze betekenen, dan omdraaien: clap/jump (één klap / één spring), arms/knees (armen omhoog / knieën raken), name/yell (je naam / kort 'Ow!').","Bouw op: alle paren tegelijk. Geef een nieuwe instructie alleen wanneer de groep stil staat — anders raken ze in de war.","Eliminatie-ronde: wie een fout maakt, beoordeelt zichzelf en gaat aan de kant. Joker oordeelt niet. Blijf opvoeren tot er een winnaar is of 2–3 onverslaanbaren overblijven.","Debrief: 'Aan het begin was het makkelijk — wat gebeurde er daarna? Wie heeft ons geleerd wat die woorden betekenen? Zijn we geprogrammeerd als computers? Wat doen we elke dag omdat... iedereen doet? Tegen welk programmeren wil jij in verzet?'"],tg:["de-mechanisatie","lichaam","opwarming","programmering"],tip:"De kracht zit in het debrief — niet in het spel. Koppel het ongemak van de oefening rechtstreeks aan de ervaring van onderdrukking die we willen ontleren.",bron:"Wildcard",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Jana Cabana",t:"De-mechanisatie / samenwerking",d:"10–15 min",g:"9–30 p.",o:"Samenwerking en speelse competitie — en een metafoor voor hoe we omgaan met basisbehoeften en groepsproblematiek.",s:["Drie vrijwilligers demonstreren: twee staan tegenover elkaar en vormen met opgeheven armen een dak (het Huis). De derde zit gebogen tussen hen (de Bewoner).","Leg de drie commando's uit: 'Mensen' — alle Bewoners verlaten hun huis en zoeken een nieuw. 'Huis' — alle Huis-paren breken af en zoeken een nieuwe Bewoner. 'Storm' — iedereen moet een nieuwe rol vinden, huis of bewoner.","Iemand blijft altijd over. Die persoon roept het volgende commando en probeert zelf binnen te komen.","Iedereen speelt. Verduidelijk de instructies gaandeweg. Houd de huizen verspreid als het te druk wordt.","Debrief: 'Wat merkte je van jezelf? Van de groep? Welke strategieën gebruikte je om een nieuwe trio te vinden? Wat is het verband met strategieën om verandering te maken of onderdrukking te overleven?' Zoek naar gesprekken over basisbehoeften en collectieve probleemoplossing."],tg:["de-mechanisatie","samenwerking","opwarming","groep"],tip:"De uitgesloten persoon aan het einde van elke ronde is niet een verliezer — het is de aanleiding voor de volgende ronde. Maak dit expliciet: uitsluiting is tijdelijk en functioneel.",bron:"Wildcard",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Kat en muis",t:"Lichaamswerk / groepsvorming",d:"10–15 min",g:"10–30 p.",o:"Koppels als levend labyrint — de muis ontsnapt door van koppel te wisselen.",s:["Tweetallen staan hand in hand door de ruimte verspreid. Eén persoon is de kat, één is de muis.","De kat achtervolgt de muis. Als de muis aan één kant van een koppel aansluit, valt de andere persoon af en wordt de nieuwe muis.","Variant: de kat mag worden als er een andere kat aansluit bij een koppel.","Joker kan de rollen omwisselen: muis wordt kat."],tg:["lichaam","ensemble","opwarming","concentratie"],tip:"De koppels zijn het labyrint. Wie niet oplet staat ineens alleen. Goed moment om te observeren wie initiatief neemt en wie wacht.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Zakdoekje leggen",t:"Lichaamswerk / snelheid",d:"10–15 min",g:"10–30 p.",o:"Twee rijen tegenover elkaar — wie pakt het zakdoek zonder geraakt te worden?",s:["Twee rijen, genummerd van beide kanten zodat gelijke nummers tegenover elkaar staan.","Joker roept een nummer — die twee sprinten naar het zakdoek in het midden.","Wie het zakdoek pakt moet terug naar zijn rij zonder geraakt te worden.","Variatie: joker roept twee nummers tegelijk."],tg:["ritme","concentratie","opwarming"],tip:"De spanning zit in de aarzeling — wie grijpt als eerste? Dat moment van twijfel is al het theater.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Grootmoeders voetstappen",t:"Lichaamswerk / concentratie",d:"10–15 min",g:"8–25 p.",o:"Beweeg vooruit terwijl je bewaker niet kijkt — bevries zodra ze omkeert.",s:["Persoon A staat met de rug naar de groep. De anderen proberen van achter dichterbij te sluipen.","A draait zich willekeurig om — wie beweegt, moet terug naar de startlijn.","Doel: A aanraken zonder betrapt te worden.","Variatie: A telt in een wisselend tempo vóór ze omkeert."],tg:["concentratie","stilte","lichaam"],tip:"De variatie in tempo is wat het interessant maakt. Wie te geduldig is wint nooit — wie te ongeduldig is verliest altijd. Dat evenwicht is het punt.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Krokodil",t:"Lichaamswerk / energie",d:"10–15 min",g:"8–30 p.",o:"Lopen met de benen gekruist — het lichaam in een vreemde positie dwingen.",s:["Alle deelnemers lopen door de ruimte met de benen gekruist — langzaam eerst.","Joker roept opdrachten: sneller, bochten nemen, stoppen.","Variatie: twee koppels koppelen de benen — vier-benigheid.","Opbouwen naar koppels en grotere groepen."],tg:["lichaam","opwarming","humor"],tip:"Doe dit vroeg — het is hilarisch en haalt de schroom weg. Wie niet valt, valt soms harder.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Goedemorgen",t:"Kennismaking / beweging",d:"5–10 min",g:"10–40 p.",o:"Handen schudden, naam zeggen — maar je mag pas loslaten als je een nieuwe hand hebt gepakt.",s:["Iedereen loopt door de ruimte. Ze pakken de hand van een vreemde en zeggen hun naam.","Ze mogen pas loslaten als ze tegelijkertijd de hand van iemand anders pakken — er mogen geen losse handen zijn.","Variatie: in de tweede ronde moet je de naam van de ander zeggen in plaats van je eigen naam.","Tempo opbouwen."],tg:["kennismaking","contact","beweging"],tip:"De regel dat je niet mag loslaten voordat je een nieuwe hand hebt schept een continue keten van verbinding. Simpel maar elegant.",bron:"Boal",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Cadavre exquis",t:"Verbeelding / samenwerking",d:"15–20 min",g:"4–30 p.",o:"Collectief een tekening of verhaal maken — zonder te weten wat de anderen hebben gemaakt.",s:["Tekenvariatie: ieder tekent iets op een gevouwen blad papier — enkel de belijning is zichtbaar voor de volgende.","Nadat iedereen heeft getekend: ontvouwen. Wat ziet de groep?","Verhaalvariatie: iemand begint een zin, vouwt het papier zodat alleen de laatste woorden zichtbaar zijn, de volgende gaat verder.","Lees het resultaat voor — samen is het altijd verrassend."],tg:["verbeelding","ensemble","verhaal","plezier"],tip:"Het surrealistische resultaat is het punt. Gebruik het als ingang naar 'alles kan een verhaal zijn' — voorbereiding op Image Theater.",bron:"Boal",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Evenwicht met een object",t:"Lichaamswerk / concentratie",d:"10–15 min",g:"6–30 p.",o:"Zo min mogelijk lichaamsoppervlak gebruiken terwijl je een object in evenwicht houdt.",s:["Ieder pakt een object en probeert zo weinig mogelijk van zijn lichaam op de grond te laten rusten.","Tegelijkertijd: het object op zo weinig mogelijk punten houden.","Opbouwen: andere objecten, andere eisen.","Variatie: twee personen delen het balanceren van één object."],tg:["lichaam","evenwicht","concentratie","ruimte"],tip:"Dit traint lichaamsbewustzijn zonder dat iemand het 'oefenen' noemt. Goed voor groepen die weerstand hebben tegen 'theater'.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Ritme-rondje",t:"Ritme / opwarming",d:"10–15 min",g:"8–30 p.",o:"Eén persoon begint met een beweging en klank — de groep kopieert en omarmt hem in de cirkel.",s:["Één acteur gaat naar het midden en maakt een herhalende beweging met klank.","De anderen kopiëren — en lopen geleidelijk dichterbij, nog steeds bewegend.","Als de cirkel dicht is geworden, vervangt de middelste zichzelf door iemand anders — die een nieuwe beweging introduceert.","Zo gaat elke deelnemer door het midden."],tg:["ritme","opwarming","beweging","ensemble"],tip:"Het kopiëren is het sociale contract van de oefening — niemand is beter dan de ander. Dat gelijkheidsprincipe is Boals kern.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Ritme wisselen",t:"Ritme / collectief",d:"10–15 min",g:"8–30 p.",o:"De hele groep vindt samen één ritme — en leert daarin te spreken en te zwijgen.",s:["Alle deelnemers starten elk hun eigen ritme met stem, handen en voeten.","Na enkele minuten: joker roept 'Één!' — iedereen zoekt naar één gemeenschappelijk ritme.","Na enkele minuten: joker roept 'Spreek!' — het ritme desintegreert weer naar individuele geluiden.","Afwisselen tussen 'Één' en 'Spreek' — steeds sneller."],tg:["ritme","ensemble","zintuigen","gehoor"],tip:"Het moment van 'Één!' is het mooiste — soms duurt het lang voor iedereen het vindt. Dat zoeken is de oefening.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"De grote opperbevelhebber",t:"Observatie / concentratie",d:"10–15 min",g:"8–25 p.",o:"Wie is de dirigent? Eén persoon verlaat de ruimte — de groep kiest een leider die alle bewegingen initieert.",s:["Één persoon verlaat de ruimte. De groep kiest een 'opperbevelhebber' die ongemerkt alle ritmes en bewegingen initieert.","De buitenstaander komt terug en moet raden wie de leider is.","De groep kopieert de leider zo snel mogelijk — zonder naar hem/haar te kijken.","Variatie: meerdere leiders tegelijk — op wie let de gisser?"],tg:["observatie","concentratie","gehoor","personage"],tip:"De vaardigheid om te observeren zónder te staren is wat iedereen leert. Dat is ook de vaardigheid van de goede acteur — én van de goede Joker.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Orkest en dirigent",t:"Ritme / stem",d:"10–15 min",g:"6–30 p.",o:"Elk produceert een klank — de dirigent roept ze op en combineert ze tot muziek.",s:["Elke deelnemer of groepje produceert een herhalende melodische of ritmische klank.","De dirigent luistert. Met gebaren roept hij/zij bepaalde klanken op of legt ze het zwijgen op.","Op die manier componeert de dirigent een stuk — iedereen is het instrument.","Iedereen krijgt een beurt als dirigent."],tg:["stem","ritme","gehoor","ensemble"],tip:"Niemand is musicien, iedereen is muziek. De dirigent ontdekt dat macht over anderen verantwoordelijkheid is — niet genot.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Carnaval in Rio",t:"Ritme / opwarming",d:"10–15 min",g:"9–30 p.",o:"Drie musketeers — wie nummer is de leider, wie kopieert?",s:["Groepjes van drie, genummerd 1, 2, 3.","Joker roept 'Nummer één!' — alle énen beginnen een herhalende beweging met klank. Twee en drie kopiëren.","Joker roept 'Nummer twee!' — alle tweeën starten een nieuw ritme. Anderen volgen.","Joker roept 'Drie!' — drieën nemen het over. Afwisselen in snel tempo."],tg:["ritme","opwarming","leiden","volgen"],tip:"De kunst is zo snel mogelijk van leider naar volger te schakelen. Wie daarin vertraagt remt zijn groep. Goed om te observeren wie comfortabel is in welke rol.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Boliviaanse mimosa",t:"Beweging / zintuigen",d:"10–15 min",g:"6–30 p.",o:"Een aanraking verspreidt zich als een golf door het hele lichaam.",s:["Tweetallen. Eén is de mimosa — een plant die gevoelig is voor aanraking.","De andere persoon raakt één plek aan. De mimosa begint op dat punt te bewegen — ritmisch.","De beweging breidt zich uit naar het hele lichaam — tot alles meeswingt.","Drie keer, steeds op een ander punt beginnen. Dan wisselen."],tg:["aanraking","beweging","zintuigen","lichaam"],tip:"De regel is: de beweging begint klein en groeit. Wie meteen groot beweegt heeft het niet begrepen. Zachtheid is hier de vaardigheid.",bron:"Boal",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"De glazen cobra",t:"Vertrouwen / zintuigen",d:"10–15 min",g:"8–30 p.",o:"De groep als één slang — dan de cobra verbroken, iedereen blind.",s:["Iedereen staat achter de ander, handen op de schouders van de persoon voor hem. Ogen gesloten.","Met de handen verkent iedereen het hoofd, de nek en schouders van de persoon voor hem — de intacte cobra.","Op signaal van de joker: de cobra breekt. Iedereen loopt blind door de ruimte — armen licht gespreid, ellebogen voor.","Joker brengt de cobra later weer bij elkaar."],tg:["vertrouwen","zintuigen","blind","aanraking"],tip:"Bewegen met gesloten ogen zonder uitgestrekte armen — dat is de sleutel. Ellebogen beschermen, niet handen. Vertraging is veiligheid.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"De vampier van Straatsburg",t:"Zintuigen / spel",d:"10–15 min",g:"8–30 p.",o:"Eén vampier begint — en elke aanraking maakt een nieuwe vampier.",s:["Iedereen loopt met gesloten ogen door de ruimte — armen beschermend gebogen.","Joker tikt één persoon aan: die is de eerste vampier. Na een tel strekken die de armen voor zich uit en schreeuwt.","Wie de vampier aanraakt of de schreeuw hoort, wordt ook vampier.","Het eindigt als iedereen vampier is — of als de joker stopt."],tg:["zintuigen","blind","improvisatie","opwarming"],tip:"De schreeuw van de vampier is het signaal — niet de aanraking. Dat maakt het ruimtelijk en auditief tegelijk.",bron:"Boal",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"vertrouwen",n:"De doelman",t:"Vertrouwen / snelheid",d:"10–15 min",g:"8–25 p.",o:"Blind rennen — en erop vertrouwen dat de doelman je opvangt.",s:["Zes mensen staan naast elkaar als een vangnetting. Één staat er voor als doelman.","De anderen staan zes meter terug — ogen dicht.","Één voor één rennen ze blind op de doelman af, zo snel ze durven.","De doelman vangt hen om de taille op."],tg:["vertrouwen","ritme","blind","gevoel"],tip:"De vaardigheid is vertrouwen in een vreemde — niet rennen. Begin rustig. De snelheid groeit als het vertrouwen groeit.",bron:"Boal",fase:"vertrouwen",niv:1,eng:"hoog"},
  {b:"vertrouwen",n:"Vriend en vijand",t:"Vertrouwen / bewustwording",d:"10–15 min",g:"9–30 p.",o:"Wie is jouw vriend, wie is jouw vijand — zonder dat je het weet?",s:["Groepjes van drie. Één is de protagonist. De andere twee besluiten onderling — zonder het te zeggen — of ze vriend of vijand zijn.","Ze geven om beurten opdrachten: 'Zing!', 'Kruip!', 'Spring!'. De protagonist gehoorzaamt.","Na enkele minuten: raad wie vriend was, wie vijand.","Nabespreking: hoe voelde het? Wanneer twijfelde je?"],tg:["vertrouwen","reflectie","macht","contact"],tip:"De protagonist ontdekt dat vriend en vijand niet altijd duidelijk zijn — zelfs als ze tegengesteld zijn. Dat inzicht is het Forum-beginpunt.",bron:"Boal",fase:"vertrouwen",niv:2,eng:"middel"},
  {b:"beeld",n:"Voltooi het beeld",t:"Image Theater / interventie",d:"15–25 min",g:"6–25 p.",o:"De groep als dramaturg — elk nieuw lichaam verandert het hele verhaal. De basisoefening voor Forum-interventies en de introductie tot Image Theater.",s:["Twee mensen schudden elkaar de hand. Bevries. Groep: wat zien we? Wat kan dit zijn?","Variant A (Boal, introductie): één persoon verlaat het beeld — de ander blijft met uitgestrekte hand. Wat is nu het verhaal? Die persoon neemt een nieuwe houding aan die een compleet ander verhaal vertelt. Zo wisselt het beeld steeds van betekenis.","Variant B (Rohd, snelle interventie): één persoon neemt een houding aan in het midden. Bevriest. Een tweede voegt het eigen lichaam toe — zo dat er een relatie ontstaat. De eerste vertrekt. De tweede bevriest. Een derde stapt in. Altijd twee lichamen in relatie.","Variant C (Rohd, beeldenwerk): twee spelers maken een bevroren beeld. Joker vraagt iemand uit het publiek: 'Vervang één van de twee spelers. Maak het beeld anders.' De originele speler keert terug en reageert op het gewijzigde beeld."],tg:["image theater","forum theater","verhaal","contact","interventie"],tip:"Dit is de snelste manier om te bewijzen dat één beeld oneindig veel verhalen draagt. Start met variant A als introductie, gebruik B voor Forum-voorbereiding, gebruik C als de groep vastzit in denken en terug naar voelen moet. Het lichaam kiest vóór het hoofd — houd de wissels snel.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Boksematch",t:"Beeld / emotie",d:"10–15 min",g:"6–30 p.",o:"Reageren op denkbeeldige klappen — het lichaam leert mee te bewegen met een fictieve kracht.",s:["Twee personen op afstand. De één deelt denkbeeldige klappen uit — de ander reageert onmiddellijk alsof ze echt zijn.","Dan wisselen: de andere geeft klappen, de eerste ontvangt.","Variante voor geliefden: dezelfde logica maar nu als aanrakingen van genegenheid.","Eindig altijd met de liefdesvariant."],tg:["image theater","gevoel","lichaam"],tip:"Het gaat niet om pantomime — het gaat om echt voelen. Wie het lichaam kan laten reageren op fictie heeft de sleutel tot acteertraining.",bron:"Boal",fase:"beeldentheater",niv:1,eng:"hoog"},
  {b:"beeld",n:"Relaties bouwen",t:"Image Theater / scènetraining",d:"15–25 min",g:"6–20 p.",o:"Eén acteur start — de volgende bouwt via zichtbaar gedrag een relatie op.",s:["Acteur A start een handeling. Acteur B nadert en legt via lichaamstaal een relatie vast: broer, vijand, geliefde, ouder.","A raadt de relatie en reageert daarnaar. C voegt zich er bij — legt een relatie vast met A én B.","Zo groeit een scène van relaties — zonder vooraf afspreken.","Eerste helft in stilte — pas dan woorden."],tg:["image theater","contact","scène","improvisatie"],tip:"De relatie moet zichtbaar zijn in het lichaam — niet in woorden. Wie te snel praat verliest de oefening. Houd de stilte zo lang mogelijk.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Wat is er veranderd?",t:"Observatie / Image Theater",d:"10–15 min",g:"6–30 p.",o:"Twee rijen kijken naar elkaar — en proberen na een wissel te zien wat er veranderde.",s:["Twee rijen tegenover elkaar. Observeer je partner nauwkeurig.","Draaien ze om — veranderen beiden één detail aan hun uiterlijk of houding.","Draaien ze terug: wie kan benoemen wat er veranderd is?","Opbouwen: drie details tegelijk."],tg:["observatie","concentratie","image theater","geheugen"],tip:"Dit traint de acteursvaardigheid die Boal de kern noemt: zien wat je kijkt. Niet vluchtig kijken — maar echt zien.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"De grote machtstest",t:"Image Theater / macht",d:"20–30 min",g:"6–25 p.",o:"Een tafel, zes stoelen, een fles — wie is de machtigste?",s:["Joker plaatst tafel, zes stoelen en een fles in de ruimte.","Één voor één komen deelnemers de objecten zo rangschikken dat één stoel de machtigste wordt.","Groep bespreekt: wanneer klopt het? Wanneer niet?","Daarna: zet een persoon in de machtigste positie — wat verandert er?"],tg:["macht","image theater","ruimte","analyse"],tip:"De verhouding tussen objecten zegt meer dan de objecten zelf. Wie de tafel kantelt, wie de fles verplaatst — dat zijn politieke keuzes. Benoem ze.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Balanseerring",t:"Lichaamswerk / image theater",d:"15–20 min",g:"Even aantal p.",o:"De hele kring in evenwicht — als een schotel op een stok.",s:["Even aantal deelnemers in een cirkel, genummerd 1-2-1-2 afwisselend.","Alle énen buigen naar voren — alle tweeën buigen naar achteren.","Het gewicht heft elkaar op: niemand valt, iedereen houdt de ander.","Variatie: énen en tweeën wisselen tegelijk van kant."],tg:["evenwicht","vertrouwen","lichaam","ensemble"],tip:"Dit werkt alleen als iedereen tegelijk beweegt. Één persoon die te laat is en de kring valt. Dat is de politieke les — collectieve actie vereist gelijktijdigheid.",bron:"Boal",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"geheugen",n:"Geheugen van gisteren",t:"Zintuigengeheugen / concentratie",d:"15–20 min",g:"4–20 p.",o:"Gisteren herleven — elk detail van die dag opnieuw voelen in het lichaam.",s:["Iedereen zit ontspannen op een stoel, ogen gesloten.","Joker begeleidt: herinner alles van gisteren. Wat was het eerste ding dat je zag? De geur van ochtend? De klank van je wekker?","Elk detail: opnieuw voelen met het bijbehorende lichaamsdeel. Eten: mond. Lopen: benen.","Vergelijk achteraf: wie herinnerde hetzelfde moment anders?"],tg:["geheugen","zintuigen","concentratie","personage"],tip:"Geheugen is niet in het hoofd — het is in het lichaam. Wie dit begrijpt begrijpt hoe Boal acteert. Gebruik het als voorbereiding op scènewerk.",bron:"Boal",fase:"verdieping",niv:1,eng:"laag"},
  {b:"geheugen",n:"Herinnerde onderdrukking",t:"Geheugen / verdieping",d:"20–30 min",g:"4–15 p.",o:"Een moment van onderdrukking uit eigen leven herleven — en in de verbeelding doorbreken.",s:["In tweetallen. Eén is de protagonist, één is de copiloot.","De protagonist beschrijft een moment van onderdrukking — gedetailleerd, met zintuigen.","De copiloot stelt alleen zintuigvragen: 'Hoe rook het?' 'Wat hoorde je?' Geen analyse.","Vervolgens: de protagonist probeert in de verbeelding de onderdrukking te doorbreken — met de copiloot als gids."],tg:["geheugen","onderdrukking","innerlijk"],tip:"Dit is geen therapie — het is verbeelding. De copiloot mag geen oplossingen bieden — alleen de ruimte openhouden. Het doorbreken moet van de protagonist zelf komen.",bron:"Boal",fase:"verdieping",niv:1,eng:"laag"},
  {b:"geheugen",n:"Abstract emotie",t:"Acteertraining / emotie",d:"15–20 min",g:"6–25 p.",o:"Pure emotie zonder motivatie — via getallen uitgedrukt, niet via woorden.",s:["Alle deelnemers zijn eerst erg vriendelijk naar elkaar — maar zeggen alleen getallen: '23, 8, 115'.","Langzaam verschuift de houding naar het tegengestelde — koelheid, afwijzing, agressie. Nog steeds alleen getallen.","Daarna terug naar vriendelijkheid — de hele range in één oefening.","Variatie: gebruik dierengeluiden in plaats van getallen."],tg:["gevoel","personage","lichaam"],tip:"Getallen schakelen de rationaliteit uit — het lichaam moet de emotie dragen. Wie toch een 'reden' nodig heeft, begrijpt de oefening nog niet.",bron:"Boal",fase:"verdieping",niv:1,eng:"middel"},
  {b:"geheugen",n:"Het tegenovergestelde van mezelf",t:"Karakter / identiteit",d:"20–30 min",g:"6–25 p.",o:"Een eigenschap kiezen die je niet hebt — en die de hele workshop spelen.",s:["Iedereen schrijft zijn naam en één eigenschap op die ze níet hebben maar wel zouden willen.","Ze spelen die dag die eigenschap.","Joker roept op een gegeven moment: 'Terug naar jezelf!'","Dan: 'Terug naar je tegenovergestelde!' — heen en weer wisselen."],tg:["identiteit","personage","transformatie"],tip:"Wie weet wat je niet bent, leert wat je wel bent. Dat is de paradox van dit spel. Vraag achteraf wat meer aanvoelde als 'echt'.",bron:"Boal",fase:"verdieping",niv:1,eng:"middel"},
  {b:"forum",n:"Stop! Denk!",t:"Repetitietechniek / Forum Theater",d:"20–30 min",g:"4–20 p.",o:"Een scène stoppen op sleutelmomenten — en de verborgen gedachten van de personages horen.",s:["Een scène wordt gespeeld. Op willekeurige momenten roept de joker 'Stop!'","Alle spelers bevriezen. Joker roept 'Denk!' — elke speler zegt hardop de gedachte die op dat moment door het personage gaat.","Niet de tekst — de underwave, de onderstroom.","Na dertig seconden: 'Speel!' — de scène gaat verder."],tg:["forum theater","innerlijk","analyse"],tip:"Dit is de techniek die Forum Theater onderscheidt van gewoon theater. Het onderliggende denken wordt zichtbaar — en daarmee de manipulatie én de vrijheid.",bron:"Boal",fase:"repetitie",niv:3,eng:"laag"},
  {b:"forum",n:"Ondervraag het personage",t:"Repetitietechniek / karakter",d:"20–30 min",g:"4–20 p.",o:"Acteurs verdedigen hun personage tegenover het publiek — in karakter.",s:["Een scène wordt gespeeld. Dan: elke acteur staat als zijn personage voor de groep.","Het publiek stelt vragen — het personage antwoordt vanuit zijn eigen logica, niet die van de acteur.","'Waarom deed je dat?' — 'Wat voelde je op dat moment?'","De joker kan doorvragen: 'Maar wist je niet dat...?'"],tg:["forum theater","personage","analyse"],tip:"Dit onthult waarom antagonisten doen wat ze doen. Begrip van de antagonist — niet sympathie — is de sleutel tot Forum. Verwar die twee niet.",bron:"Boal",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Reconstructie van de handeling",t:"Repetitietechniek / analyse",d:"20–30 min",g:"4–20 p.",o:"Een scène terugkijken als een film — en elk moment van keuze identificeren.",s:["De scène wordt gespeeld. Dan wordt de scène opnieuw gespeeld — maar elke speler kan stoppen en zeggen: 'Ik deed dit omdat...'","Bij elke stop bevriest de rest.","De joker vraagt: 'Wat had je op dat moment anders kunnen doen?'","Vervolgens: speel die alternatieve keuze."],tg:["forum theater","analyse","reflectie"],tip:"Dit is het voorbereiding op het echte Forum — het moment waarop acteurs leren dat elk moment meerdere wegen heeft. Dat is de theatrale vrijheid.",bron:"Boal",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Handshake Forum",t:"Forum-demonstratie",d:"15–20 min",g:"Min. 6 p.",o:"De werking van Forum Theater demonstreren aan een nieuwe groep — met de simpelste mogelijke scène.",s:["Vraag één vrijwilliger. Leg uit: jullie staan aan weerszijden van de ruimte, lopen op elkaar af, geven elkaar een hand. De vrijwilliger weet alleen dat zij/hij een handdruk moet krijgen (de protagonist). Geen woorden.","Spelen: loop op de vrijwilliger af met uitgestoken hand en vriendelijke blik — maar op het laatste moment kruis je je armen. Gebruik lichaam en gezicht om macht te tonen. Laat de vrijwilliger 1–2 keer anders proberen.","Stop de scène, applaus. Vraag het publiek: 'Wat gebeurde er? Wat had de Protagonist nodig? (Een handdruk — respect, erkenning.) Heb je dat ooit zelf meegemaakt?'","Nodig uit: 'Deze persoon is niet alleen. Wil iemand het opnieuw proberen met een ander idee?' De vrijwilliger vervangt de protagonist, herstart de scène. Andere acteurs reageren realistisch.","Stop na 1–2 alternatieven. Vraag: 'Wat probeerde die persoon? Werkte het? Zou dat voor iedereen kunnen? Wat zou daarna gebeuren?'","Probeer minimaal 3 alternatieven. Het gaat niet om het beste idee — het gaat om ideeën proberen en zien wat gebeurt.","Debrief: 'Deze scène staat voor de ervaring van een mensenrecht proberen te krijgen en geblokkeerd worden. In plaats van een handdruk kan het gaan om huisvesting, zorg, erkenning.' Vertel het verhaal van Boal en de boer — de mensen die de onderdrukking ervaren moeten centraal staan in het veranderen ervan."],tg:["forum theater","demo","introductie","kennismaking"],tip:"Gebruik deze oefening bij de allereerste kennismaking met Forum Theater. Hij maakt de werking voelbaar in 15 minuten — sneller dan welke uitleg ook.",bron:"Wildcard",fase:"forum",niv:1,eng:"middel"},
  {b:"forum",n:"Marcher's Forum",t:"Forum-demonstratie",d:"15–20 min",g:"6–25 p.",o:"Forum-werking demonstreren via een beeld van conformiteit en afwijking — de druk van de groep op een individu zichtbaar maken.",s:["Vraag 4–5 vrijwilligers. Leg aan de groep uit: 'Jullie leven in een wereld waar iedereen samen moet marcheren van één kant naar de andere. Blijf marcheren, koste wat kost.'","Apart tegen één vrijwilliger — de protagonist: 'Jij begint op een gegeven moment te huppelen of te dansen in plaats van te marcheren.'","Start de scène. Laat de groep reageren op de afwijking: proberen ze de huppelaar terug te krijgen naar het marcheren? Hoe?","Stop de scène. Vraag het publiek: 'Wat gebeurde er? Wat wilde de protagonist? (Vrij bewegen.) Wat wilde de rest? (Controle, conformiteit.) Heb je dat ooit zelf meegemaakt — je eigen ding willen doen en anderen die willen dat je je aanpast?'","Nodig uit: 'Wie wil het opnieuw proberen?' Vrijwilliger vervangt de huppelaar. Andere acteurs reageren realistisch. Probeer minimaal 3 alternatieven.","Debrief gelijk aan Handshake Forum — koppel de metafoor aan concrete ervaringen van onderdrukking die de groep kent."],tg:["forum theater","demo","conformiteit","groep"],tip:"Kies voor Marcher's Forum als de groep ervaring heeft met groepsdruk (school, werk, gemeenschap). Handshake Forum werkt beter voor één-op-één machtsrelaties (werkgever, zorgverlener, ambtenaar).",bron:"Wildcard",fase:"forum",niv:1,eng:"middel"},
  {b:"forum",n:"Opera en Genre",t:"Repetitietechniek / scènewerk",d:"15–25 min",g:"4–20 p.",o:"Een bestaande scène opblazen door emotie of genre over te drijven — om verborgen lagen zichtbaar te maken en levity in het repeteerproces te brengen.",s:["De scène wordt gespeeld zoals gerepeteerd. Actie en essentiële tekst veranderen niet.","Variant Opera: joker roept een emotie — blij, verdrietig, boos, jaloers, verveeld, bang, flirterig. Alle acteurs spelen de scène met die emotie sterk overdreven, ook als de emotie de tekst tegenspreekt.","Variant Genre: joker roept een genre — ballet, soap, kindershow, detective, actiefilm, horror. De scène wordt in die stijl gespeeld.","Na enkele minuten roept de joker een nieuwe emotie/genre. Publiek (de rest van de groep) mag voorstellen doen.","Blijf aansporen: sterker, groter, over the top. Speel door tot einde scène of tot iedereen uitgeput is.","Debrief: 'Wanneer was de emotie/het genre ineens passend — onthulde het iets nieuws over de scène? Welke momenten willen we bewaren?' Bijvoorbeeld: iedereen die hilarisch lacht na een rechter-vonnis, of een doktersgesprek als horrorfilm."],tg:["repetitie","emotie","genre","humor","forum theater"],tip:"Opera werkt beter voor scènes waar emoties te klein zijn — de overdrijving legt de onderliggende gevoelens bloot. Genre werkt beter als de scène vast zit in één toon — de stijlverschuiving breekt de gewoonte open.",bron:"Wildcard",fase:"repetitie",niv:2,eng:"hoog"},
  {b:"forum",n:"Verbale boksring",t:"Repetitie / argumentatie",d:"15–20 min",g:"8–25 p.",o:"Acteurs voorbereiden om als antagonisten verbaal krachtig en responsief te zijn. Ook bruikbaar om zich voor te bereiden op echte moeilijke ontmoetingen — bij een medisch consult, een uitkeringsinstantie, of activisme.",s:["Een vrijwilliger die zich sterk voelt in het spreken vanuit de antagonist van de Forum-scène gaat in het midden staan.","De rest staat rond de ruimte als een boksring. Er is een denkbeeldige lijn in het midden — de antagonist kan er niet over.","De vrijwilliger begint met een korte speech die de hoofdargumenten van het karakter samenvat: waarom hun handelen 'juist' is. De eerste klap.","Iemand anders stapt aan de andere kant van de ring en geeft een tegenargument. De antagonist luistert en counter-argumenteert. Een dialoog.","Wanneer iemand de antagonist ziet verliezen, kan die persoon achter de antagonist gaan staan, wachten tot er een pauze is, en tappen. De ander neemt over. Geen teams — iedereen kan voor beide kanten spelen.","Vervang niemand die aan het winnen is — het gaat niet om winnen, het gaat om het drama gaande houden.","Stop op basis van tijd of energie.","Debrief: 'Moment om de argumenten van je af te schudden. Sommigen hebben misschien erkenning nodig dat de woorden die ze gebruikten niet hun eigen overtuigingen zijn.' Dan: 'Wat kunnen de acteurs gebruiken om de scène te verdiepen? Welke tactieken gebruikte je om argumenten te blijven aandragen?'"],tg:["forum theater","repetitie","argumentatie","personage"],tip:"Dit is niet hetzelfde als 'Boksematch' (fysiek) — hier staat taal centraal. De oefening vraagt emotionele hygiëne: na afloop de argumenten fysiek van je afschudden, desnoods met een collectief geluid.",bron:"Wildcard",fase:"repetitie",niv:2,eng:"hoog"},
  {b:"forum",n:"Tegen elkaar duwen",t:"Repetitie / responsiviteit",d:"5–10 min",g:"Even aantal p.",o:"Acteurs voorbereiden om met spect-actoren te improviseren — door te leren luisteren en antwoorden via het lichaam in plaats van via het ego.",s:["Twee vrijwilligers demonstreren: tegenover elkaar, handpalmen tegen elkaar. Een denkbeeldige lijn op de vloer tussen hen.","Ze duwen tegen elkaar zo hard als mogelijk — maar alleen zo hard als de ander terug duwt. Ze willen winnen, maar werken samen om in het spel te blijven (niet over de lijn geduwd worden).","Vraag ze te spelen met minder kracht. Dan met meer kracht. Elke partner moet voelen en antwoorden.","Iedereen in paren. Als mensen zich zorgen maken over kracht of lengte: het spel gaat niet over fysieke kracht, het gaat om responsiviteit — de ander matchen.","Pauzeer na korte tijd.","Debrief: koppel de responsiviteit van het spel aan het werk met spect-actoren. 'Spect-actoren duwen tegen de scène — tegen de onderdrukking erin. Om hun idee te kunnen begrijpen, moeten acteurs ruimte maken om te horen wat ze proberen, dan realistisch antwoorden, met genoeg kracht zodat het idee zich kan ontvouwen. Als acteurs meegeven, lijkt onderdrukking trivialiseerbaar. Als ze proberen te winnen zonder te luisteren, lijkt onderdrukking onoverwinnelijk — en wil niemand meer komen.'"],tg:["repetitie","contact","forum theater","improvisatie","lichaam"],tip:"Doe dit vlak vóór een Forum-voorstelling. Het is een fysieke herinnering aan de houding die acteurs moeten hebben tegenover spect-actoren: luisterend, responsief, stevig.",bron:"Wildcard",fase:"repetitie",niv:1,eng:"middel"},
  {b:"forum",n:"Innerlijke monoloog",t:"Repetitie / karakter",d:"15–20 min",g:"4–20 p.",o:"Het onbesproken laten horen — wat personages denken en voelen maar niet zeggen — zichtbaar maken zodat de scène gelaagder wordt.",s:["Zet de scène op vanaf het begin. Instructie aan alle personages: spreek je innerlijke monoloog hardop uit voordat de scène begint. De innerlijke monoloog is de stream of consciousness — de gedachten en gevoelens die het personage niet uitspreekt tijdens de scène.","Alle personages spreken hun innerlijke monoloog tegelijk, zonder te stoppen. De rest van de groep loopt rond en luistert.","Laat het enkele minuten duren. Mensen zullen dingen ontdekken over hun personage — behoeften, angsten, motivaties — die in het gewone spel onzichtbaar blijven.","Joker: 'Wat je zojuist hebt geleerd over de gevoelens, behoeften en motivaties van je personage kan de dialoog en de actie voor de volgende run voeden.'","Speel de scène opnieuw met wat nu bekend is. Publiek (rest van groep) gaat zitten.","Variatie — Ondervraag het personage (als aparte oefening bestaand): publiek stelt tijdens de scène vragen aan de personages (niet aan de acteurs). Acteurs blijven in rol. Joker pauzeert om vragen te laten stellen en gaat dan door.","Debrief: 'Wat heb je ontdekt over de personages? Hoe kan dat de scène aanscherpen?'"],tg:["repetitie","personage","innerlijk","scène"],tip:"Innerlijke monoloog verschilt van 'Ondervraag het personage': dit is zelf-onderzoek door de acteur, dat is externe bevraging. Beide oefeningen kunnen na elkaar — eerst innerlijke monoloog, dan ondervraging — voor diepst begrip van karakter.",bron:"Wildcard",fase:"repetitie",niv:2,eng:"middel"},
  {b:"forum",n:"Meervoudig beeld van onderdrukking",t:"Image Theater / analyse",d:"30–45 min",g:"8–25 p.",o:"Vijf of meer beelden van hetzelfde onderdrukkingsthema naast elkaar — de diversiteit wordt zichtbaar.",s:["Meerdere vrijwilligers bouwen elk een beeld van hetzelfde thema: 'armoede', 'uitsluiting', 'angst'.","De beelden staan verspreid door de ruimte.","Toeschouwers lopen erdoorheen — beschrijven wat ze zien per beeld.","Dan: beelden dynamiseren. Wat hebben ze gemeen? Waar zit de breeklijn?"],tg:["image theater","onderdrukking","gemeenschap","analyse"],tip:"De variatie tussen de beelden is het rijkste materiaal — niet de overeenkomsten. Wie dezelfde situatie zo anders verbeeldt, maakt de subjectiviteit van beleving zichtbaar.",bron:"Boal",fase:"forum",niv:2,eng:"middel"},
  {b:"forum",n:"Beeld van overgang",t:"Image Theater / transformatie",d:"30–45 min",g:"6–20 p.",o:"Van het beeld van nu naar het beeld van gewenst — de weg ertussen als het eigenlijke Forum.",s:["Groep bouwt een beeld van de huidige onderdrukkingssituatie.","Groep bouwt een ideaalbeeld — hoe het zou moeten zijn.","De twee beelden staan naast elkaar. Joker vraagt: wat is nodig om van het ene naar het andere te komen?","De toeschouwers worden uitgenodigd in te grijpen: verander iets in het huidige beeld."],tg:["image theater","transformatie","forum theater","analyse"],tip:"De weg van huidig naar ideaal is het Forum. Niet het doel, maar de beweging. Wie de beweging blokkeert is de antagonist — ook als dat een systeem is en geen persoon.",bron:"Boal",fase:"forum",niv:3,eng:"middel"},
  {b:"afsluiting",n:"De ceremonie",t:"Afsluiting / ritueel",d:"10–20 min",g:"6–30 p.",o:"De groep bedenkt zelf een afsluitingsritueel — en voert het gezamenlijk uit.",s:["Joker vraagt: welk woord, welke beweging of welk gebaar sluit dit process af?","De groep kiest gezamenlijk een ritueel — dat kan simpel zijn: een klap, een omhelzing, een zin.","Het ritueel wordt collectief uitgevoerd — zorgvuldig, in stilte of met geluid.","Variatie: elk subgroepje maakt een ritueel voor de andere subgroepen."],tg:["ritueel","ensemble"],tip:"Een ritueel dat de groep zelf heeft gemaakt is krachtiger dan elk ritueel dat van buitenaf wordt opgelegd. De joker begeleidt — niet dicteert.",bron:"Boal",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"beeld",n:"Het beeld van beelden",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"De protagonist vormt een stilstaand beeld van zijn situatie — de groep reageert met eigen beelden, en zo ontstaat een panorama van perspectieven.",s:["Protagonist maakt een beeld van zijn situatie — zonder uitleg.","De anderen reageren elk met een eigen beeld van dezelfde situatie.","Alle beelden staan tegelijk in de ruimte. Joker vraagt: wat zien we? Wat hebben ze gemeen?","Protagonist loopt langs alle beelden — welk raakt het meest?"],tg:["image theater","verlangen"],tip:"Dit is de eerste stap van de Regenboog — licht, verkennend. De rijkdom zit in de diversiteit van de beelden, niet in debat.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeld en tegenbeeld",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"De protagonist maakt een beeld van de onderdrukte situatie — en daarna een tegenbeeld van hoe het zou zijn als er iets veranderd was.",s:["Protagonist maakt een beeld van de huidige situatie van onderdrukking.","Dan maakt ze een tegenbeeld: hoe zou het eruitzien als de situatie veranderd was?","De twee beelden staan naast elkaar. Groep beschrijft het verschil — alleen in feiten, geen interpretatie.","Joker vraagt: wat is de beweging tussen die twee beelden? Wat is daarvoor nodig?"],tg:["image theater","transformatie","verlangen"],tip:"Het tegenbeeld is geen oplossing — het is een verlangen. Houd de spanning tussen de twee beelden intact. Niet te snel naar 'hoe dan'.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"De beelden van het beeld",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"Het beginbeeld van de protagonist wordt door anderen hervormd, aangevuld of becommentarieerd via nieuwe beelden — een dialoog zonder woorden.",s:["Protagonist maakt een beeld van haar situatie.","Anderen kunnen één voor één het beeld aanpassen — één beweging, één persoon verplaatsen, één houding veranderen.","Na elke aanpassing: groep beschrijft wat er veranderd is.","Protagonist kiest welke versie het meest resoneert — en benoemt waarom."],tg:["image theater","taal","ensemble"],tip:"Geen commentaar in woorden toestaan — alleen beelden. Het is een dialoog tussen lichamen. Zodra woorden komen verlies je de oefening.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Het geprojecteerde beeld",t:"Regenboog / prospectief",d:"25–35 min",g:"6–20 p.",o:"De protagonist projecteert haar innerlijke beelden op andere spelers — zij vormt hen als sculpturen die haar innerlijke wereld vertegenwoordigen.",s:["Protagonist kiest spelers en vormt hen als levende sculpturen die figuren uit haar innerlijke wereld vertegenwoordigen.","Ze plaatst ze in een ruimtelijke verhouding — dichtbij, ver weg, boven, onder.","Groep beschrijft wat ze ziet — geen interpretatie.","Protagonist reageert: klopt het? Wil ze iets aanpassen?"],tg:["image theater","innerlijk"],tip:"De protagonist is de enige die weet wat elk beeld betekent. Vraag nooit om uitleg — het beeld is de uitleg. Sta toe dat het vaag blijft.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"laag"},
  {b:"beeld",n:"Het uur-beeld",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"Beelden van verschillende momenten in de tijd — verleden, heden, toekomst — laten zien hoe een situatie beweegt.",s:["Protagonist maakt een beeld van de situatie vijf jaar geleden.","Dan een beeld van nu.","Dan een beeld van hoe het er over vijf jaar zou kunnen uitzien.","Groep beschrijft de drie beelden naast elkaar: wat verandert, wat blijft, wat keert terug?"],tg:["image theater","beweging"],tip:"De drie beelden naast elkaar zijn krachtiger dan elk apart. Het is een tijdlijn in het lichaam — geen analyse maar een gevoel van beweging.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Rituelen en maskers",t:"Regenboog / prospectief",d:"25–40 min",g:"6–20 p.",o:"Deelnemers verkennen welke sociale rituelen ze automatisch uitvoeren — het masker dat je draagt in een bepaalde rol wordt zichtbaar.",s:["Iedereen kiest een sociale situatie: een vergadering, een familiediner, een sollicitatiegesprek.","Ze spelen de rituele handelingen van die situatie — langzaam, overdreven, bewust.","Joker vraagt: welk masker draag je hier? Hoe voelt dat masker?","Variatie: wissel maskers — draag het werk-masker thuis. Wat gebeurt er?"],tg:["masker","ritueel","identiteit"],tip:"Het masker is niet vals — het is een aanpassing. De vraag is niet 'is dit echt?' maar 'welke macht zit er verborgen in dit ritueel?'",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Meervoudige beelden van geluk",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"Deelnemers beelden uit wat geluk voor hen betekent — de diversiteit onthult hoeveel er impliciet verwacht wordt.",s:["Iedereen maakt in stilte een beeld van 'geluk' met hun lichaam.","Alle beelden tegelijk: de groep kijkt.","Joker vraagt: welke beelden lijken op elkaar? Welke staan tegenover elkaar?","Verdieping: welke van die beelden zijn jouw eigen verlangen, welke zijn aangeleerd?"],tg:["verlangen","reflectie"],tip:"'Geluk' is politiek. De diversiteit in de beelden laat zien hoe normen over geluk verschillen — en wie er buiten valt. Benoem dat voorzichtig.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Het roterende beeld",t:"Regenboog / prospectief",d:"20–30 min",g:"6–20 p.",o:"Een beeld wordt doorgegeven aan de volgende persoon, die het aanpast — zo evolueert het beeld door de groep tot een collectief verhaal.",s:["Eerste persoon maakt een beeld van een gedeeld thema.","Tweede persoon past één element aan — één persoon verplaatsen, één houding veranderen.","Zo gaat het beeld door de hele kring. Elk past één ding aan.","Aan het eind: vergelijk het eindresultaat met het startpunt. Wat is er verteld?"],tg:["ensemble"],tip:"Sta alleen kleine aanpassingen toe — één ding per keer. Wie te veel verandert breekt de continuïteit. De kracht zit in de accumulatie.",bron:"Regenboog",fase:"beeldentheater",niv:1,eng:"middel"},
  {b:"beeld",n:"Het groepsbeeld",t:"Regenboog / prospectief",d:"20–30 min",g:"8–25 p.",o:"De hele groep vormt samen één beeld — wie staat centraal, wie aan de rand? Macht wordt zichtbaar in ruimtelijke verhoudingen.",s:["Joker geeft een thema: 'onze organisatie', 'deze wijk', 'dit gezin'.","Iedereen kiest een positie in het beeld — geen instructies, alleen instinct.","Als iedereen bevroren staat: groep beschrijft wat ze ziet.","Dynamiseer: elk beeld maakt één beweging — wat wil het? Wat probeert het?"],tg:["macht","ensemble","ruimte"],tip:"Wie staat centraal is niet per se de machtigste — wie staat aan de rand kijkt misschien het scherpst. Bevraag beide posities.",bron:"Regenboog",fase:"beeldentheater",niv:1,eng:"middel"},
  {b:"beeld",n:"Rashomon",t:"Regenboog / perspectief",d:"30–45 min",g:"6–20 p.",o:"Dezelfde situatie vanuit meerdere perspectieven opgevoerd — elk personage heeft zijn eigen versie van de waarheid.",s:["Een situatie wordt gekozen — een conflict, een beslissing, een ontmoeting.","Personage A speelt de situatie vanuit zijn perspectief. Groep beschrijft wat ze ziet.","Dezelfde situatie, zelfde tekst — nu vanuit B. Dan vanuit C: de buitenstaander.","Nabespreking: wie heeft gelijk? Bestaat er een objectieve waarheid?"],tg:["perspectief","reflectie","macht"],tip:"Er is geen 'juiste' versie. Wie beweert de objectieve waarheid te hebben, heeft al een machtspositie ingenomen. Dát is de kern van Rashomon.",bron:"Regenboog",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"geheugen",n:"Het beeld van de antagonist",t:"Regenboog / introspectief",d:"25–40 min",g:"4–15 p.",o:"De protagonist beeldt de figuur uit die haar verlangen blokkeert — niet als karikatuur maar zo precies en eerlijk mogelijk.",s:["Protagonist vormt een speler als de figuur die haar blokkeert — intern of extern.","Zo eerlijk mogelijk: niet overdrijven, niet veroordelen. Wie is deze figuur echt?","Anderen in de groep vullen aan vanuit eigen herkenning — ze kennen ook deze figuur.","Protagonist staat tegenover het beeld: wat wil je zeggen?"],tg:["personage","innerlijk"],tip:"De figuur mag niet karikatuur worden — dat beschermt de protagonist maar mist de waarheid. Hoe pijnlijker het echt te maken, hoe waardevoller.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"Het analytisch beeld",t:"Regenboog / introspectief",d:"30–45 min",g:"4–15 p.",o:"De emoties van twee personages worden uitgelegd als afzonderlijke figuren en op 'theatrale blind dates' geplaatst — wat gebeurt er als angst woede ontmoet?",s:["Protagonist benoemt twee emoties die in de situatie spelen — bv. angst en woede.","Twee spelers belichamen elk één emotie — zo precies mogelijk.","De emoties ontmoeten elkaar: ze bewegen, reageren, spreken.","Protagonist observeert en beschrijft: herken je dit? Wat gebeurt er in jou als ze ontmoeten?"],tg:["gevoel","innerlijk"],tip:"De emoties zijn actoren — ze hebben wil, tactiek, history. Laat ze niet meteen praten maar eerst bewegen. De lichaamstaal is rijker dan de woorden.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"Het circuit van rituelen en maskers",t:"Regenboog / introspectief",d:"30–45 min",g:"4–15 p.",o:"Een deelnemer draagt het masker van één situatie en past dat toe in een andere — wat sluit niet aan, wat werkt overal?",s:["Deelnemer kiest een masker: hoe gedraag je je op het werk?","Speel dat masker nu thuis — in een familiegesprek, aan tafel.","Groep observeert: wat wringt? Wat past wel?","Variatie: speel het werk-masker in een vriendschapssituatie. Dan het vriendschaps-masker op het werk."],tg:["masker","innerlijk","identiteit"],tip:"Het masker dat overal past is het machtigste — het meest geïnternaliseerd. Dat masker voelt niet meer als een masker. Dat is het punt.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"Het beeld van de chaos",t:"Regenboog / introspectief",d:"20–30 min",g:"4–15 p.",o:"De innerlijke veelheid wordt zichtbaar: meerdere spelers vertegenwoordigen gelijktijdig actieve impulsen en stemmen in de protagonist.",s:["Protagonist benoemt de stemmen en impulsen die tegelijkertijd actief zijn in haar.","Meerdere spelers belichamen elk één stem — ze bewegen gelijktijdig.","Ze botsen, trekken in verschillende richtingen, onderbreken elkaar.","Protagonist staat erbij en kijkt: klopt dit? Wat overheerst?"],tg:["innerlijk"],tip:"Dit is geen theater om naar te kijken — het is theater om te voelen. De protagonist mag tussenbeide komen: 'stop, jij bent te luid'. Dat is al een interventie.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"De agents in andermans hoofd",t:"Regenboog / introspectief",d:"30–45 min",g:"6–20 p.",o:"Deelnemers herkennen in het verhaal van de protagonist hun eigen agenten — en spelen elkaars innerlijke stemmen.",s:["Protagonist vertelt haar situatie. Groep luistert actief.","Deelnemers identificeren welke agenten ze herkennen in hun eigen hoofd.","Ze spelen niet de agenten van de protagonist — maar hun eigen herkenning van dezelfde figuren.","Nabespreking: hoe gedeeld zijn onze innerlijke stemmen? Wat maakt het collectief?"],tg:["ensemble","innerlijk"],tip:"Dit is het moment waarop het persoonlijke politiek wordt. De agent in het hoofd is niet alleen van jou — hij is sociaal geconstrueerd. Dat inzicht maakt het draagbaar.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"middel"},
  {b:"geheugen",n:"Het schermbeeld",t:"Regenboog / introspectief",d:"20–30 min",g:"4–15 p.",o:"De protagonist toont haar beeld van de antagonist — anderen tonen tegenbeelden — de protagonist kiest welk antilichaam het meest resoneert.",s:["Protagonist maakt een beeld van de antagonist of blokkerende figuur.","Anderen tonen om beurten hun eigen tegenbeelden — hoe zouden ze die figuur counteren?","Protagonist observeert alle tegenbeelden.","Ze kiest welk tegenbeeld het meest resoneert — en beschrijft wat dat in haar losmaakt."],tg:["innerlijk","reflectie"],tip:"Het resonante tegenbeeld is niet per se het 'beste' — het is het meest aansluitende bij wat de protagonist al in zich draagt. Ze herkent haar eigen antilichaam.",bron:"Regenboog",fase:"verdieping",niv:3,eng:"middel"},
  {b:"lichaam",n:"Somatisatie",t:"Regenboog / extraversie",d:"20–30 min",g:"6–20 p.",o:"Onderzoekt hoe sociale druk en stress zich in het lichaam manifesteren — en hoe die macht fysiek wordt opgeslagen.",s:["Deelnemers denken aan een situatie van sociale druk of stress.","Ze lopen door de ruimte en laten het lichaam die druk dragen — waar zit het? Hoe voelt het?","Joker vraagt: wijs aan waar de druk in je lichaam zit. Maak het zichtbaar.","Groep maakt samen een beeld: hoe draagt de collectieve groep die druk?"],tg:["lichaam","reflectie"],tip:"Niet vragen 'wat voel je?' maar 'waar voel je het?' — de lokalisatie in het lichaam is het startpunt van bevrijding.",bron:"Regenboog",fase:"opwarming",niv:2,eng:"middel"},
  {b:"forum",n:"Het ambassadebal",t:"Regenboog / extraversie",d:"45–60 min",g:"8–25 p.",o:"Figuren uit zeer verschillende sociale klassen op één feest — hoe gedragen mensen zich wanneer hiërarchieën plotseling zichtbaar worden?",s:["Deelnemers krijgen een rol: ambassador, bediende, nieuwkomer, bureaucraat, artiest.","Ze mengen zich op het 'bal' — socialiseren, onderhandelen, vermijden.","Joker stopt het spel en vraagt: waar zat de macht? Wie bepaalde de ruimte?","Herspelen: andere rollen, andere strategieën."],tg:["macht","personage"],tip:"Laat mensen hun eigen rol kiezen — dan zie je meteen iets over hoe ze zichzelf in sociale hiërarchieën plaatsen. Dat is het eerste materiaal.",bron:"Regenboog",fase:"forum",niv:1,eng:"middel"},
