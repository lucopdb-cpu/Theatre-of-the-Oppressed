<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<script src="nav.js" defer></script>
<meta name="theme-color" content="#b8803c">
<title>TO Archief — Dreamers Beyond</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1814;--ink2:#52504a;--ink3:#9a9790;
  --paper:#faf8f4;--paper2:#f2ede4;--paper3:#e8e0d4;--paper4:#ddd4c4;
  --amber:#8c5e2a;--amber2:#b8803c;--amber3:#f0d4a8;--amber4:#fdf5e8;
  --rule:rgba(26,24,20,.1);
  --serif:'Playfair Display',Georgia,serif;
  --body:'Source Serif 4',Georgia,serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--body);background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:5rem}
.page{max-width:820px;margin:0 auto;padding:0 24px}

/* MASTHEAD */
.masthead{border-bottom:2px solid var(--ink);padding:28px 0 18px;margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.app-name{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-.02em;line-height:1;color:var(--ink);margin-bottom:4px}
.app-name em{font-style:italic;color:var(--amber)}
.app-tagline{font-family:var(--sans);font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.masthead-right{text-align:right;flex-shrink:0}
.total-count{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--amber);line-height:1}
.total-label{font-family:var(--sans);font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}

/* CONTROLS */
.controls-row{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
#srch{width:100%;padding:10px 34px 10px 36px;border:1px solid var(--paper4);border-radius:8px;font-family:var(--body);font-size:14px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
#srch:focus{border-color:var(--amber2);box-shadow:0 0 0 3px var(--amber3)}
#srch::placeholder{color:var(--ink3);font-style:italic}
.clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink3);font-size:18px;display:none;padding:2px 4px}
.clr.show{display:block}
.rnd-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--paper4);background:var(--paper2);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .12s;letter-spacing:.02em;flex-shrink:0}
.rnd-btn:hover{background:var(--paper3)}

/* FILTER TABS — sessie-fase als primaire navigatie */
.phase-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--paper4);border-radius:10px;overflow:hidden;background:var(--paper2)}
.ptab{flex:1;padding:9px 4px;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.03em;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--ink3);transition:all .15s;border-right:1px solid var(--paper4);display:flex;flex-direction:column;align-items:center;gap:3px}
.ptab:last-child{border-right:none}
.ptab:hover{background:var(--paper3);color:var(--ink2)}
.ptab.on{background:var(--ink);color:var(--paper)}
.ptab-icon{font-size:14px;line-height:1}
.ptab-label{font-size:9px;letter-spacing:.04em;text-transform:uppercase}

/* SECONDARY FILTERS */
.sec-filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.filter-block{background:var(--paper2);border:1px solid var(--paper4);border-radius:8px;padding:10px 12px}
.filter-block-lbl{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:7px;display:block}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-family:var(--sans);font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--paper4);background:#fff;color:var(--ink2);transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--amber2);color:var(--amber)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* Niveau chips met sterren */
.chip-n1.on{background:#2e5c3a;border-color:#2e5c3a}
.chip-n2.on{background:#8c5e2a;border-color:#8c5e2a}
.chip-n3.on{background:#5c2e1e;border-color:#5c2e1e}

/* Energie chips */
.chip-hoog.on{background:#5c3a1e;border-color:#5c3a1e}
.chip-middel.on{background:#3a4a2e;border-color:#3a4a2e}
.chip-laag.on{background:#1e3a5c;border-color:#1e3a5c}

/* Bron chips */
.chip-bron.on{background:var(--amber);border-color:var(--amber);color:#fff}

/* NAV */
.nav-bar{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:22px}
.nav-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--paper4);background:var(--paper2);cursor:pointer;font-size:14px;color:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.nav-btn:hover:not(:disabled){background:var(--paper3)}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-dots{display:flex;gap:4px;flex:1;flex-wrap:wrap;max-height:18px;overflow:hidden}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--paper4);cursor:pointer;flex-shrink:0;transition:all .2s}
.ndot.on{background:var(--amber);transform:scale(1.6)}
.nav-counter{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;flex-shrink:0}

/* CARD */
.card{background:#fff;border:1px solid var(--paper4);border-radius:16px;overflow:hidden;animation:enter .2s ease;box-shadow:0 1px 2px rgba(26,24,20,.05),0 3px 12px rgba(26,24,20,.04)}
@keyframes enter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card head */
.card-head{padding:22px 26px 18px;border-bottom:1px solid var(--paper3);position:relative;padding-left:34px}
.cat-stripe{position:absolute;top:0;left:0;width:8px;height:100%}
.card-badges{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.badge-fase{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--paper4);color:var(--ink3);background:var(--paper2)}
.badge-niveau{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}
.badge-energie{font-family:var(--sans);font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid var(--paper4)}
.niv1{background:#e8f5ed;color:#1a4a28;border-color:#c0dcc8}
.niv2{background:#fdf0e0;color:#5c3a10;border-color:#e8cca8}
.niv3{background:#fde8e0;color:#5c1e10;border-color:#e8c0b0}
.eng-hoog{background:#fdeee0;color:#5c3010;border-color:transparent}
.eng-middel{background:#e8f0e4;color:#2a3c1e;border-color:transparent}
.eng-laag{background:#e0e8f8;color:#1a2a5c;border-color:transparent}
.card-type{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.card-name{font-family:var(--serif);font-size:24px;font-weight:400;line-height:1.15;letter-spacing:-.01em;color:var(--ink)}

/* Card meta */
.card-meta{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--paper3)}
.meta-cell{padding:10px 18px}
.meta-cell:first-child{border-right:1px solid var(--paper3)}
.meta-lbl{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.meta-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);line-height:1.3}

/* Card body */
.card-body{padding:20px 26px 0}
.section{margin-bottom:20px}
.section-lbl{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:7px;display:block}
.doel{font-family:var(--body);font-size:14px;font-weight:300;line-height:1.7;color:var(--ink);font-style:italic}
.steps{display:flex;flex-direction:column;gap:9px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-nr{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--amber2);background:var(--amber4);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;border:1px solid var(--amber3)}
.step-txt{font-family:var(--body);font-size:13px;font-weight:300;line-height:1.65;color:var(--ink)}

/* Tags */
.card-tags{display:flex;flex-wrap:wrap;gap:5px;padding:14px 26px;border-top:1px solid var(--paper3)}
.tag{font-family:var(--sans);font-size:10px;font-weight:500;border-radius:4px;padding:3px 8px}
.tag-bron{background:var(--ink);color:var(--paper);font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.tbron-spolin{background:#1D9E75}.tbron-johnstone{background:#185FA5}.tbron-playback{background:#993556}.tbron-rohd{background:#854F0B}.tbron-grotowski{background:#3C3489}
.tag-cat{border:1px solid var(--paper4);background:var(--paper2);color:var(--ink2)}
.tag-kw{background:var(--paper2);color:var(--ink3);border:1px solid var(--paper3)}

/* Tip */
.card-tip{margin:0 26px 22px;padding:12px 15px;background:var(--amber4);border-left:3px solid var(--amber2);border-radius:0 7px 7px 0}
.tip-lbl{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:4px;display:block}
.tip-txt{font-family:var(--body);font-size:12px;font-weight:300;font-style:italic;line-height:1.65;color:var(--ink2)}

/* Empty */
.empty{text-align:center;padding:4rem 1rem;font-family:var(--body);font-style:italic;color:var(--ink3)}

/* Kbd */
.kbd-row{text-align:center;margin-top:12px;font-family:var(--sans);font-size:11px;color:var(--ink3)}
kbd{font-family:var(--mono);font-size:10px;background:var(--paper2);border:1px solid var(--paper4);border-radius:4px;padding:1px 6px;color:var(--ink2)}

/* Cat stripe colors */
.cs-lichaam{background:#8c5e2a}.cs-zintuigen{background:#2e5c3a}.cs-vertrouwen{background:#1e3a5c}.cs-beeld{background:#5c2e4a}.cs-geheugen{background:#3a4a1e}.cs-forum{background:#5c3a1e}.cs-kennismaking{background:#1e4a4a}.cs-afsluiting{background:#4a3a1e}.cs-opening{background:#2e5c3a}.cs-stem{background:#5c3a3a}.cs-nabespreking{background:#1e3a5c}.cs-derolling{background:#5c4a1e}.cs-jokertraining{background:#3a1e5c}

/* Fase tab accents */
.ptab[data-f="alle"].on{background:#1a1814}
.ptab[data-f="opening"].on{background:#1e4a4a}
.ptab[data-f="opwarming"].on{background:#3a4a1e}
.ptab[data-f="vertrouwen"].on{background:#1e3a5c}
.ptab[data-f="verdieping"].on{background:#5c2e4a}
.ptab[data-f="beeldentheater"].on{background:#5c2e4a}
.ptab[data-f="repetitie"].on{background:#3a1e5c}
.ptab[data-f="forum"].on{background:#5c3a1e}
.ptab[data-f="nabespreking"].on{background:#1e3a5c}
.ptab[data-f="afsluiting"].on{background:#4a3a1e}

/* ═══ SESSIE-BOUWER ═══ */
.sb-toggle{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:20px;padding:12px 16px;
  background:var(--paper2);border:1px solid var(--paper4);
  border-radius:10px;cursor:pointer;transition:background .15s;
  user-select:none;
}
.sb-toggle:hover{background:var(--paper3)}
.sb-toggle-left{display:flex;align-items:center;gap:10px}
.sb-toggle-title{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink)}
.sb-toggle-count{font-family:var(--mono);font-size:11px;background:var(--amber);color:#fff;border-radius:20px;padding:2px 9px;font-weight:500}
.sb-toggle-duur{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.sb-toggle-icon{font-size:16px;color:var(--ink3);transition:transform .2s}
.sb-toggle-icon.open{transform:rotate(180deg)}

.sb-panel{display:none;margin-top:4px;background:#fff;border:1px solid var(--paper4);border-radius:12px;overflow:hidden}
.sb-panel.open{display:block}

.sb-meta{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--paper3)}
.sb-meta-cell{padding:10px 16px}
.sb-meta-cell:not(:last-child){border-right:1px solid var(--paper3)}
.sb-meta-lbl{font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.sb-meta-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--ink)}
.sb-meta-sub{font-size:11px;color:var(--ink3);font-family:var(--sans)}

.sb-arc{display:flex;gap:3px;padding:8px 16px;border-bottom:1px solid var(--paper3);align-items:center;min-height:28px}
.sb-arc-seg{height:8px;border-radius:4px;opacity:.75;min-width:4px}

.sb-list{padding:8px;min-height:60px}
.sb-empty{padding:20px 16px;text-align:center;font-family:var(--body);font-style:italic;color:var(--ink3);font-size:13px}

.sb-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;border:1px solid var(--paper3);background:var(--paper)}
.sb-nr{font-family:var(--mono);font-size:10px;font-weight:500;width:18px;height:18px;border-radius:4px;background:var(--paper2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;color:var(--ink3)}
.sb-handle{color:var(--ink3);font-size:11px;cursor:grab;flex-shrink:0;padding:2px 1px;line-height:1.4;margin-top:1px;user-select:none}
.sb-handle:active{cursor:grabbing}
.sb-controls{display:flex;flex-direction:column;gap:1px;margin-right:4px;flex-shrink:0}
.sb-arrow{width:16px;height:14px;border-radius:3px;border:none;background:var(--paper2);color:var(--ink3);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;font-weight:bold}
.sb-arrow:hover{background:var(--paper4);color:var(--ink)}
.sb-arrow:disabled{opacity:0.3;cursor:not-allowed}
.sb-arrow:disabled:hover{background:var(--paper2);color:var(--ink3)}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-sub{font-size:11px;color:var(--ink3);font-family:var(--sans);display:flex;gap:6px;flex-wrap:wrap}
.sb-item.dragging{opacity:0.5;transform:rotate(2deg)}
.sb-item.drag-over{border-color:var(--amber);background:var(--amber4)}
.sb-rm{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;line-height:1}
.sb-rm:hover{background:#fde8e0;color:#5c1e10}

.sb-actions{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--paper3)}
.sb-btn{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--paper4);background:var(--paper2);font-family:var(--sans);font-size:11px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .12s}
.sb-btn:hover{background:var(--paper3)}
.sb-btn-pri{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.sb-btn-pri:hover{opacity:.85}

/* + knop op kaart */
.card-add-btn{
  display:flex;align-items:center;gap:6px;
  margin:0 26px 20px;padding:9px 14px;
  border-radius:8px;border:1px solid var(--paper4);
  background:var(--paper2);cursor:pointer;
  font-family:var(--sans);font-size:12px;font-weight:500;
  color:var(--ink2);transition:all .12s;width:calc(100% - 52px);
  justify-content:center;
}
.card-add-btn:hover{background:var(--amber4);border-color:var(--amber3);color:var(--amber)}
.card-add-btn.in-sessie{background:var(--amber4);border-color:var(--amber3);color:var(--amber)}
.card-add-btn.in-sessie:hover{background:#fde8e0;border-color:#e8c0b0;color:#5c1e10}

.sb-actions{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--paper3)}
.sb-btn{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--paper4);background:var(--paper2);font-family:var(--sans);font-size:11px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .12s}
.sb-btn:hover{background:var(--paper3)}
.sb-btn-pri{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.sb-btn-pri:hover{opacity:.85}
.card-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 26px 20px;padding:9px 14px;border-radius:8px;border:1px solid var(--paper4);background:var(--paper2);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink2);transition:all .12s;width:calc(100% - 52px)}
.card-add-btn:hover{background:var(--amber4);border-color:var(--amber3);color:var(--amber)}
.card-add-btn.in-sessie{background:var(--amber4);border-color:var(--amber3);color:var(--amber)}
.card-add-btn.in-sessie:hover{background:#fde8e0;border-color:#e8c0b0;color:#5c1e10}
.tbron-feldenkrais{background:#2e5c8c}
@media print{.masthead,.controls-row,.phase-tabs,.sec-filters,.nav-bar,#kw,.kbd-row,.sb-toggle{display:none!important}.sb-panel{display:block!important;border:none!important;margin:0!important}.sb-actions{display:none!important}body{padding:0!important}.page{max-width:100%!important;padding:0 16px!important}}
</style>
</head>
<body>
<div class="page">

<a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);text-decoration:none;padding:12px 0 4px;transition:color .15s" onmouseover="this.style.color='var(--amber)'" onmouseout="this.style.color='var(--ink3)'"><div class="page">← Arsenaal van de Joker</a>

<header class="masthead">
  <div>
    <h1 class="app-name">TO <em>Arsenaal</em></h1>
    <p class="app-tagline">Gereedschapskist voor de Joker</p>
  </div>
  <div class="masthead-right">
    <div class="total-count" id="hc">—</div>
    <div class="total-label">oefeningen</div>
  </div>
</header>

<div class="controls-row">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="search" id="srch" placeholder="Zoek op naam, doel of tag…" autocomplete="off">
    <button class="clr" id="clr" onclick="clearSearch()">×</button>
  </div>
  <button class="rnd-btn" onclick="goRandom()">↻ Willekeurig</button>
</div>

<div class="phase-tabs">
  <button class="ptab on" data-f="alle"><span class="ptab-icon">◎</span><span class="ptab-label">Alle</span></button>
  <button class="ptab" data-f="opening"><span class="ptab-icon">☀</span><span class="ptab-label">Opening</span></button>
  <button class="ptab" data-f="opwarming"><span class="ptab-icon">▲</span><span class="ptab-label">Opwarming</span></button>
  <button class="ptab" data-f="vertrouwen"><span class="ptab-icon">◇</span><span class="ptab-label">Vertrouwen</span></button>

<script>
const D=[
  {b:"geheugen",n:"ABC",t:"Bewustwording",d:"20–25 min",g:"8–25 p.",o:"Sociale dynamieken voelbaar maken. Verbinding met eigen ervaring van aantrekking, vermijding en onbewuste aanwezigheid.",s:["Vertrek vanuit een cirkel. Vraag iedereen een persoon A in gedachten te nemen — iemand die je wil — en niet aan de groep te vertellen wie dat is.","Vraag vervolgens een persoon B te kiezen — iemand die je niet wil. Ook stil houden.","Vraag tenslotte een persoon C te kiezen — iemand die je vanuit je ooghoek in de gaten wil houden.","Vraag nu zodanig in de ruimte te gaan staan dat je A kunt zien, B absoluut niet kunt zien, en C vanuit je ooghoek in de gaten kunt houden.","De groep zal voortdurend herpositioneren zodra anderen bewegen. Laat de beweging een tijd duren.","Storytelling achteraf: wie was jouw A, B en C? Vrijwillig delen."],tg:["reflectie","onderdrukking","verhaal"],tip:"Leg niet uit waar de oefening voor staat vóór ze het hebben ervaren. De drie posities tegelijk aanhouden is onmogelijk — dat ongemak is de kern van de oefening, niet een fout.",bron:"Dreamers Beyond",fase:"verdieping",niv:2,eng:"middel"},
  {b:"geheugen",n:"Palestijntje",t:"TO-oefening",d:"20–30 min",g:"8–25 p.",o:"Inleving in uitsluiting en perspectief wisselen. Directe aanknoping voor nabespreking over onderdrukking.",s:["Iedereen zoekt een 'huis'. Wie geen huis heeft vraagt toegang — bewoner spreekt de weigering uit.","Na oogcontact wisselen twee mensen van huis.","Revolutie — iedereen wisselt tegelijk.","Nabespreking: welke onderdrukkingsmechanismen kwamen voorbij?"],tg:["onderdrukking","perspectief","nabespreking"],tip:"Sla de nabespreking nooit over — dat is de kern van de oefening.",bron:"Dreamers Beyond",fase:"verdieping",niv:1,eng:"middel"},
  {b:"afsluiting",n:"Vulcano",t:"TO-ritueel",d:"20–25 min",g:"8–25 p.",o:"Onderdrukking collectief benoemen en omzetten naar positieve krachten via fysiek contact.",s:["Nauwe cirkel. Rechterhand als vuist, duim in hand van buurman/vrouw — de krater.","Gooi negativiteit in de vulkaan: onderdrukking, racisme, angst.","Trek positieve krachten eruit met de linkerhand: solidariteit, vrijheid, moed.","Woord van de dag. Afsluiting met groepsyell."],tg:["ritueel","lichaam","gemeenschap"],tip:"Cirkel moet écht nauw zijn — fysieke verbinding is essentieel. Doe zelf mee als Joker.",bron:"Dreamers Beyond",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Iedereen die...",t:"Warming-up / kennismaking",d:"10–15 min",g:"8–40 p.",o:"Gedeelde ervaringen zichtbaar maken zonder woorden — alleen via beweging.",s:["Één stoel minder. Wie in het midden staat roept: 'Iedereen die...' + eigenschap.","Wie zich herkent wisselt van stoel. Wie blijft is de volgende roeper.","Variatie: fruit als anonieme groepsindeling.","Variatie: stakeholderrollen om perspectieven te wisselen."],tg:["kennismaking","beweging","gemeenschap"],tip:"Begin licht — bouw op naar ervaringen dichter bij het thema. Niemand is verplicht te bewegen.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Naam naam naam",t:"Concentratie / reactie",d:"10–15 min",g:"8–30 p.",o:"Concentratie scherpen en namen leren. Spanning via een eenvoudig maar verraderlijk spel.",s:["Cirkel. Iemand roept een naam drie keer: 'Sara, Sara, Sara!'","Sara moet haar naam zeggen vóór de derde keer.","Lukt het niet — Sara gaat in het midden.","Vanuit het midden probeert Sara iemand anders te verrassen."],tg:["kennismaking","concentratie","opwarming"],tip:"Varieer tempo: soms snel, soms traag. Dáár zit de verrassing.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"hoog"},
  {b:"kennismaking",n:"Name Gumbo",t:"De-mechanisatie / kennismaking",d:"10–15 min",g:"8–30 p.",o:"Namen leren én het concept 'confusion' introduceren — bewust verward raken als voorbereiding op verandering.",s:["Demonstratie: twee vrijwilligers stellen zich aan elkaar voor en geven elkaar een hand. Bevries. Via de handdruk wisselen ze van naam.","Een derde vrijwilliger doet hetzelfde met één van de twee — neemt steeds de laatst gehoorde naam over als eigen naam.","Iedereen doet mee, ontmoet zoveel mogelijk mensen. Laat het plezier ontstaan.","Nieuwe instructie: 'Stop! Ken je nog je eigen naam? Ga door — en stap eruit zodra je eigen naam bij je terugkeert (geef dan wel nog de naam die je had door).'","Speel tot de meesten eruit zijn en de rest gefrustreerd raakt.","Debrief: 'Hoe was dat? Hoe voelde het om jezelf als een ander voor te stellen? Om je eigen naam niet terug te krijgen?' Introduceer de regel van confusion: als we niet bereid zijn een beetje verward te raken, zijn we niet voorbereid op verandering."],tg:["kennismaking","de-mechanisatie","opwarming"],tip:"De frustratie aan het einde is inhoudelijk — niet een fout in de oefening. Benoem dat: we repeteren voor de onzekerheid van verandering.",bron:"Wildcard",fase:"opening",niv:1,eng:"middel"},
  {b:"lichaam",n:"Colombiaanse hypnose",t:"Lichaamswerk / vertrouwen",d:"15–20 min",g:"6–30 p.",o:"Lichamelijke alertheid en vertrouwen opbouwen. De relatie tussen leiden en volgen onderzoeken zonder woorden.",s:["A houdt handpalm 20–40 cm voor het gezicht van B. B volgt de hand — altijd dezelfde afstand.","A beweegt in alle richtingen: hoog, laag, schuin, achterwaarts. B contorteert het lichaam mee.","Na enkele minuten wisselen — volger wordt leider.","Variatie: beide handen, elk leidend voor een andere partner."],tg:["lichaam","vertrouwen","leiden","volgen"],tip:"De leider is geen vijand. Beweeg nooit te snel — het vraagt samenwerking, geen dominantie.",bron:"Boal",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Vertrouwenscirkel",t:"Vertrouwen / lichaamswerk",d:"15–20 min",g:"8–20 p.",o:"Vertrouwen in de groep fysiek ervaren. Iemand laten vallen en opvangen — letterlijk én als metafoor.",s:["Nauwe cirkel schouder aan schouder. Vrijwilliger in het midden, ogen dicht.","Persoon laat zich vallen met rechte rug — voeten blijven op de grond.","Cirkel vangt op met handpalmen en stuurt zacht terug naar het midden.","Eventueel: persoon rondrollen langs de cirkel — altijd in stilte."],tg:["vertrouwen","lichaam","gemeenschap"],tip:"Minimaal drie mensen in contact op elk moment. Geen abrupte bewegingen. Stilte is essentieel.",bron:"Boal",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"lichaam",n:"Cirkel van knopen",t:"Samenwerking",d:"20–25 min",g:"8–20 p.",o:"Collectief een probleem oplossen dat de groep zelf heeft gecreëerd — zonder woorden.",s:["Groep in cirkel, handen vast. Laat nooit los.","Één voor één bewegen mensen door en onder elkaars armen — knopen trekken door de cirkel.","Als iedereen vastlit: in stilte, zonder woorden, gezamenlijk ontvlechten.","Variatie: ogen dicht — nog langzamer, meer vertrouwen op aanraking."],tg:["ensemble","stilte","lichaam","reflectie"],tip:"Geen woorden. De chaos is de oefening. Communiceer alleen via aanraking en oogcontact.",bron:"Boal",fase:"opwarming",niv:1,eng:"laag"},
  {b:"beeld",n:"Spiegelsequentie",t:"Image Theater",d:"20–30 min",g:"8–30 p.",o:"Diep naar een ander kijken. Leiden en volgen loslaten — zoeken naar volledige gelijkwaardigheid.",s:["Twee rijen tegenover elkaar. Rij A beweegt langzaam, rij B spiegelt exact.","Op signaal: rollen wisselen zonder de beweging te onderbreken.","Fase 3: beiden tegelijk spiegelend én gespiegeld.","De narcistische spiegel: kijk naar jezelf in de ander — zie je eigen schoonheid."],tg:["spiegel","ensemble","image theater","reflectie"],tip:"Wie snel beweegt begrijpt de oefening niet. Het doel is synchronisatie — niet winnen.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"lichaam",n:"Machine van ritmes",t:"Energizer / Image Theater",d:"15–20 min",g:"8–30 p.",o:"Een collectief beeld bouwen van een systeem of thema. Ideologie zichtbaar maken via ritme en beweging.",s:["Iemand begint in het midden met een repetitieve beweging én geluid.","Één voor één sluiten anderen aan — elke persoon voegt een nieuwe beweging toe.","De volledige machine draait: allemaal tegelijk, in ritme.","Variatie: machine van bureaucratie, racisme, solidariteit — de groep kiest."],tg:["ritme","opwarming","image theater","macht"],tip:"Vraag achteraf: wat zag je? Welke ideologie zat in jullie machine?",bron:"Boal",fase:"opwarming",niv:2,eng:"hoog"},
  {b:"lichaam",n:"Tegenduwers",t:"Lichaamswerk / Forum Theater prep",d:"10–15 min",g:"6–30 p.",o:"Fysiek ervaren wat het betekent om niet te winnen. De maieutische houding van de Joker in het lichaam krijgen.",s:["Twee personen tegenover elkaar, handen op elkaars schouders. Denkbeeldige lijn tussen hen.","Beiden duwen met volle kracht — maar wie voelt dat de ander zwakker wordt, veert terug.","Doel: maximale kracht van beiden, niemand wint.","Variatie: rug aan rug — samen neerdalen en opstaan zonder handen."],tg:["evenwicht","forum theater","joker"],tip:"Dit is hoe een Joker beweegt in een Forum-sessie: vol aanwezig, niet dominerend.",bron:"Boal",fase:"forum",niv:3,eng:"middel"},
  {b:"beeld",n:"Beeld van het woord",t:"Image Theater",d:"20–30 min",g:"8–30 p.",o:"Ervaringen en opvattingen zichtbaar maken via het lichaam — voorbij de grenzen van taal.",s:["Joker geeft een thema: 'vrijheid', 'thuis', 'papieren', 'grens'. Deelnemers verbeelden het met hun lichaam.","Één voor één in het midden — geen uitleg. Het beeld spreekt voor zichzelf.","Eerste dynamisering: alle beelden tegelijk — collectieve sociale visie.","Tweede dynamisering: beelden gaan in relatie tot elkaar."],tg:["image theater","lichaam","taal","ensemble"],tip:"Vraag nooit 'wat betekent dit?' — vraag: 'wat roept dit bij je op?' Beelden zijn geen symbolen.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Aesthetics of the Oppressed",t:"Devising / emotionele inhoud",d:"45–60 min",g:"6–20 p.",o:"De emotionele kern van een scène onderzoeken via drie kunstvormen tegelijk — sculptuur, tweedimensionaal beeld, poëzie — zonder de scène na te spelen maar door de gevoelde urgentie zichtbaar te maken.",s:["Maak per scène drie miniteams (als er meerdere scène-groepen zijn, splits elke groep in drieën). Elk miniteam krijgt één medium: sculptuur, 2D-beeld, of poëzie. Moedig aan om te kiezen wat je níet goed kan.","Elk team gebruikt zijn medium om het gevoel van het probleem in de scène te tonen — niet de situatie of het verhaal. Abstract mag. Géén letterlijke uitbeelding.","Materialen: 2D-beeld (papier, stiften, kranten voor collage — géén woorden of symbolen). Sculptuur (schaar, tape, lijm, 'schone rommel' — dozen, inpakpapier, kapotte objecten — géén woorden). Poëzie (papier en pen — mag ook rap of lied).","Geef 15–20 minuten. Teams binnen één scène-groep mogen niet met elkaar praten over hun werk, ook al werken ze aan dezelfde scène.","Debrief — de tentoonstelling: bekijk de drie werken per scène één voor één. Team dat bij die scène hoort mag niet spreken (achter het publiek staan, notities maken). Eerst sculptuur: 'Wat zien we?' Objectieve observaties en subjectieve interpretaties. 'Waar zie je boosheid?' — 'Omdat er veel rood papier is.'","Voeg dan het 2D-beeld toe voor de sculptuur. 'Wat zien we nu nog meer?'","Voeg dan poëzie toe — de makers staan achter het publiek en lezen langzaam en hoorbaar. 'Welke woorden of beelden vielen je op? Wat voel je nu?'","Slot: reflectie op hoe de kunst verbindt. Als mensen zeggen 'we hebben niet eens overlegd maar onze werken bevatten hetzelfde' — verbind dat aan hoe hun gedeelde ervaring in de scène zit. De emotionele lading van hun kunst is wat ze naar de scène moeten brengen."],tg:["devising","emotie","image theater","solidariteit","kunstvormen"],tip:"Aesthetics is vermoedelijk het krachtigste devising-moment in een TO-proces. Het werkt alleen als er voldoende tijd is — rammel dit niet af in 20 minuten. Plan het in als apart repetitieblok.",bron:"Wildcard",fase:"repetitie",niv:2,eng:"middel"},
  {b:"beeld",n:"Ritueel en masker",t:"Image Theater / analyse",d:"25–35 min",g:"8–20 p.",o:"Alledaagse rituelen analyseren om verborgen onderdrukking zichtbaar te maken.",s:["Iemand toont dagelijkse handelingen van thuiskomst tot bedtijd — snel, demonstratief.","Anderen doen hetzelfde. Patronen worden zichtbaar in de herhaling.","Dynamisering: versneld alle rituelen tegelijk — het sociale patroon wordt zichtbaar.","Variatie: maskers wisselen — vrouw speelt man, werknemer speelt baas."],tg:["ritueel","masker","image theater","onderdrukking"],tip:"Het moment waarop iemand ziet wat ze altijd al zagen maar nooit begrepen — dát is de oefening.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Ritueel gebaar",t:"Image Theater",d:"20–25 min",g:"8–25 p.",o:"Een enkel herkenbaar gebaar laten uitgroeien tot een collectief beeld van onderdrukking.",s:["Iemand maakt een ritueel gebaar — een herkenbare sociale handeling zonder uitleg.","Wie herkent het ritueel gaat het midden in en completeert het gebaar.","Samen groeien de gebaren uit tot een statisch collectief beeld.","Dynamisering: ritme, dan woorden, dan beweging — het ritueel komt tot leven."],tg:["ritueel","image theater"],tip:"Gebaren die sommigen meteen herkennen en anderen niet — dáár zit de kern van uitsluiting.",bron:"Boal",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeldentheater",t:"Analyse / Image Theater",d:"20–40 min",g:"6–25 p.",o:"Situaties van onderdrukking of belemmering zichtbaar maken via levende beelden — zonder woorden, voorbij taal.",s:["Joker geeft een thema of situatie. Deelnemers vormen een stilstaand beeld met hun lichamen.","Joker vraagt toeschouwers: wat zie je? Wat roept dit op? Geen interpretatie — alleen waarneming.","Dynamisering: het beeld krijgt beweging, geluid, of woorden.","Toeschouwers kunnen het beeld aanpassen of vervangen — de 'ideale' situatie uitbeelden."],tg:["image theater","analyse","onderdrukking","lichaam"],tip:"Vraag nooit om uitleg van het beeld. Het beeld ís de betekenis. Meerdere kijkers zien verschillende dingen — dat is juist de rijkdom.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Levende diaserie",t:"Scèneontwikkeling",d:"30–60 min",g:"6–20 p.",o:"Verhalen van deelnemers omzetten naar een reeks stilstaande beelden — als storyboard voor een Forumscène.",s:["Een deelnemer vertelt een situatie uit zijn/haar leven — een moment van onderdrukking of blokkade.","De groep 'bevriest' het verhaal in 4–6 stilstaande beelden, als foto's na elkaar.","De verteller bekijkt de beelden van buitenaf — herkent hij/zij zichzelf?","De serie wordt de basis voor een Forumtheaterschène."],tg:["scène","verhaal","forum theater","image theater"],tip:"De verteller kiest zelf welke beelden kloppen. De groep maakt — de verteller beoordeelt. Nooit omgekeerd.",bron:"Formaat",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Het anti-model",t:"Forum Theater prep",d:"30–60 min",g:"6–20 p.",o:"Een Forumtheaterschène maken die het publiek uitnodigt om in te springen — door de oplossing juist níet te tonen.",s:["Kies een situatie van onderdrukking die de deelnemers kennen uit eigen ervaring.","Speel de scène zo dat de protagonist faalt — de onderdrukking 'wint'.","Zorg dat de oorzaak zichtbaar is, maar de oplossing open blijft.","Test: springt niemand in, dan is de scène te zwak of te sterk. Zoek de juiste spanning."],tg:["forum theater","scène","onderdrukking","personage"],tip:"Het anti-model is geen slecht toneelstuk — het is een precies gebouwd instrument. De protagonist moet herkenbaar zijn, niet zielig.",bron:"Formaat",fase:"forum",niv:3,eng:"middel"},
  {b:"forum",n:"Krantentheater",t:"Analyse / politiek",d:"20–40 min",g:"6–20 p.",o:"Bestaande teksten over de doelgroep gebruiken als theatermateriaal — en zo de buitenwereld die over jou schrijft omdraaien.",s:["Kies een krantenartikel, beleidstekst of officieel formulier over of voor de doelgroep.","Lees de tekst hardop — letterlijk, zonder commentaar.","Speel de tekst: geef de woorden lichaam en beweging.","Bevraag: welk beeld wordt geconstrueerd? Welke stemmen ontbreken? Wat staat er écht?"],tg:["taal","macht","analyse","onderdrukking"],tip:"Begin met letterlijk spelen — geen interpretatie. De confrontatie ontstaat vanzelf als mensen horen wat er staat.",bron:"Formaat",fase:"forum",niv:2,eng:"middel"},
  {b:"geheugen",n:"Rainbow of Desire",t:"Innerlijk werk",d:"30–60 min",g:"4–15 p.",o:"De 'politieagenten in je hoofd' zichtbaar maken — innerlijke stemmen die je weerhouden van wat je wil of moet doen.",s:["Een deelnemer beschrijft een situatie waarin hij/zij geblokkeerd werd — niet van buitenaf, maar van binnenuit.","De groep geeft belichaming aan de verschillende innerlijke stemmen: angst, schaamte, loyaliteit, twijfel.","De protagonist staat tegenover zijn/haar eigen 'politieagenten' en gaat het gesprek aan.","Wat zeggen ze? Waar komen ze vandaan? Wat heb je nodig om verder te gaan?"],tg:["innerlijk","identiteit"],tip:"Dit is kwetsbaar werk. Veiligheid gaat voor alles. Nooit doorduwen als iemand stopt. De protagonist bepaalt het tempo.",bron:"Formaat",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"ORID",t:"Evaluatie / reflectie",d:"20–30 min",g:"4–30 p.",o:"Collectieve kennis en ervaring gestructureerd ophalen — van waarneming naar besluit tot handeling.",s:["O — Observatie: wat heb je gezien, gehoord, gedaan? Feiten, geen interpretaties.","R — Reflectie: wat raakte je? Wat verraste je? Welke emotie of associatie riep het op?","I — Interpretatie: wat betekent dit? Wat leer je hieruit? Welk patroon zie je?","D — Decisie: wat ga je doen? Welk besluit neem je op basis van het bovenstaande?"],tg:["reflectie","ensemble"],tip:"Sla geen stap over — ook niet de O. Mensen gaan te snel naar interpretatie. De observatie verankert het gesprek in de werkelijkheid.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"laag"},
  {b:"forum",n:"Workshopdag",t:"Methodiek / programma",d:"Hele dag",g:"8–15 p.",o:"Drie vliegen in één klap: empowerment voor deelnemers, eigenaarschap voor publiek, kennismaking voor werkers.",s:["Ochtend (2 uur): kennismakings-, vertrouwens- en samenwerkingsoefeningen — een tijdelijke groep bouwen.","Middag (3–4 uur): via Beeldentheater en levende diaseries korte scènes ontwikkelen over herkenbare problemen.","Avond (1 uur): scènes spelen voor gemengd publiek — cliënten, werkers, beleidsmakers — en zoeken naar verandering.","Koffie- en maaltijdmomenten zijn essentieel: solidariteit en rust tussen intensieve sessies."],tg:["forum theater"],tip:"Een workshopdag is geen losstaande activiteit — hij hoort bij het onderzoeken van mogelijkheden voor een Theateratelier ter plekke.",bron:"Formaat",fase:"forum",niv:3,eng:"middel"},
  {b:"geheugen",n:"MDDM",t:"Moreel redeneren",d:"30–60 min",g:"6–20 p.",o:"Maatschappelijke conflicten omzetten naar morele dilemma's — stereotype oplossingsdenken doorbreken.",s:["Presenteer een dilemma zonder duidelijk goed of fout antwoord — herkenbaar uit de context van de groep.","Deelnemers kiezen een positie en beargumenteren die — niet winnen, maar verkennen.","Via theatrale omzetting: speel het dilemma uit. Wat doet een personage als de druk toeneemt?","Bevraag: welke waarden botsen hier? Wat zou jij doen? Wat zou rechtvaardig zijn?"],tg:["forum theater"],tip:"MDDM werkt het best als het dilemma écht geen makkelijk antwoord heeft. Vermijd situaties met een duidelijke 'goede kant'.",bron:"Formaat",fase:"forum",niv:3,eng:"middel"},
  {b:"vertrouwen",n:"De dronken fles",t:"Vertrouwen",d:"10–15 min",g:"6–20 p.",o:"Vertrouwen en lichaamsgewaarwording opbouwen. De groep als vangnet leren ervaren.",s:["Één persoon staat rechtop in een kleine cirkel, voeten bij elkaar, lichaam gespannen als een fles.","De cirkel staat dicht om hem/haar heen — handen klaar op borsthoogte.","De persoon laat zich vallen in elke richting — de cirkel vangt op en stuurt zacht terug.","Opbouwen: begin klein, laat de val groter worden naarmate vertrouwen groeit."],tg:["vertrouwen","lichaam"],tip:"Gebruik dit vroeg in een trainingsprogramma — het bouwt groepsgevoel sneller dan woorden. Zorg dat de cirkel écht dicht staat.",bron:"Laos 2004",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"De plank",t:"Vertrouwen / lichaamswerk",d:"15–20 min",g:"6–20 p.",o:"Blind vertrouwen op de groep ervaren — letterlijk gedragen worden.",s:["Één persoon ligt stijf als een plank — armen langs het lichaam, ogen dicht.","De groep tilt samen op — gelijkmatig, rustig, in stilte.","De plank wordt zacht bewogen of langzaam gedraaid.","Variatie: de plank door de cirkel laten reizen — van hand tot hand, zonder te zetten."],tg:["vertrouwen","lichaam","stilte","ensemble"],tip:"Stilte is niet optioneel. Het moment waarop iemand durft los te laten is de oefening.",bron:"Laos 2004",fase:"vertrouwen",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blindgeleiding",t:"Vertrouwen / contact",d:"20–25 min",g:"6–30 p.",o:"Vertrouwen opbouwen via aanraking en geluid. Drie fasen van steeds minder contact.",s:["Fase 1: A leidt B met hand in hand door de ruimte — ogen dicht.","Fase 2: A leidt met één vinger op de schouder — B volgt het kleinste signaal.","Fase 3: A leidt met geluid — een klap, een fluittoon, een woord — B navigeert op gehoor.","Wissel rollen. Nabespreking: wanneer voelde je je veilig? Wanneer niet?"],tg:["vertrouwen","contact"],tip:"Fasen niet overslaan. Wie te snel naar geluid gaat verliest de ervaring van toenemend vertrouwen.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Stop en ga",t:"Concentratie / energizer",d:"10–15 min",g:"8–40 p.",o:"Concentratie en groepsrespons scherpstellen. Basis voor latere oefeningen met ruimte en beweging.",s:["Iedereen loopt in de ruimte — geen vaste richting, geen cirkel.","Op 'stop': iedereen bevriest onmiddellijk.","Op 'ga': iedereen loopt weer.","Variaties: stop = lopen, ga = stoppen — het commando omdraaien. Of: toevoegen van klap, naam, richting."],tg:["concentratie","opwarming","ruimte"],tip:"Zodra mensen beginnen te anticiperen: varieer het commando. Doel is present zijn, niet routineus reageren.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"De poppenkast",t:"Lichaamswerk / karakterontwikkeling",d:"15–20 min",g:"6–25 p.",o:"Bewustwording van hoe het lichaam gestuurd wordt van buitenaf — en wat dat doet met autonomie.",s:["A 'bedient' B als een marionet — denkbeeldige draden aan armen, benen, hoofd.","B volgt de bewegingen van A zo precies mogelijk.","A beweegt traag — kwaliteit gaat boven snelheid.","Variatie: groepsmarionetten — meerdere poppenspelers sturen één persoon."],tg:["lichaam","personage"],tip:"Vraag na: hoe voelde het om bestuurd te worden? Wanneer verzette je je? Dát is het Forum-moment.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Loop als een dier",t:"Karakterontwikkeling",d:"15–20 min",g:"8–30 p.",o:"Lichamelijke karakters verkennen buiten de sociale persona. Beweging als toegang tot nieuwe rollen.",s:["Iedereen loopt als een dier naar keuze — anoniem, geen uitleg.","Joker roept een kwaliteit: 'meer angst', 'trots', 'honger' — het dier past zich aan.","Twee dieren ontmoeten elkaar — wat gebeurt er?","Variatie: het dier krijgt een sociale rol — leraar, baas, kind. Hoe beïnvloedt dat de beweging?"],tg:["personage","lichaam","verbeelding"],tip:"Dit is geen clownerie — het gaat om wat het lichaam weet dat het hoofd vergeet. Neem het serieus.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Dit is geen...",t:"Verbeelding / objecttheater",d:"10–15 min",g:"8–30 p.",o:"Verbeelding activeren en objecten bevrijden van hun functie — voorbereiding op scènewerk.",s:["Eén object (stok, stoel, sjaal) gaat rond in de kring.","Iedereen gebruikt het als iets anders — zonder uitleg. Het lichaam toont wat het is.","De groep kijkt: wat zag je? Reacties zonder oordeel.","Variatie: het object krijgt een emotie of een sociale lading."],tg:["verbeelding","ruimte","lichaam","scène"],tip:"Niemand hoeft te 'presteren'. Een aarzeling is ook een antwoord.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"De Franse telefoon",t:"Communicatie / warming-up",d:"10–15 min",g:"8–30 p.",o:"Hoe boodschappen vervormen in overdracht — en hoe dat in onderdrukking werkt.",s:["Rij of cirkel. Eerste persoon fluistert een zin/beweging naar de volgende.","Elke persoon geeft door wat hij/zij ontving — niets corrigeren.","Laatste persoon toont of zegt het resultaat. Vergelijk met het origineel.","Reflectie: waar ging het mis? Wat werd versterkt, wat verdween?"],tg:["taal","ensemble"],tip:"Gebruik thematische zinnen: 'De leraar wacht op de kinderen' — de vervorming ís de analyse.",bron:"Laos 2004",fase:"opwarming",niv:1,eng:"middel"},
  {b:"forum",n:"Spelen voor doven",t:"Non-verbaal spelen / scèneontwikkeling",d:"20–30 min",g:"6–20 p.",o:"Een scène zonder woorden spelen — lichaam en beeld als enige communicatiemiddelen.",s:["Kies een korte scène of situatie. Speel hem zonder geluid of woorden.","Kijkers beschrijven wat ze zien — geen interpretatie, alleen waarneming.","Speel opnieuw: wat veranderde er in de kijk?","Variatie: één speler mag één woord zeggen — welk woord kiest hij/zij?"],tg:["beweging","image theater","scène"],tip:"Ideaal voor multiculturele groepen of situaties waar taal een barrière is — het beeld niveleert.",bron:"Laos 2004",fase:"repetitie",niv:1,eng:"middel"},
  {b:"forum",n:"Rachomon",t:"Perspectief / scèneanalyse",d:"25–35 min",g:"6–20 p.",o:"Dezelfde situatie vanuit meerdere perspectieven spelen — waarheid als meervoudig begrip.",s:["Een situatie wordt gespeeld vanuit het perspectief van personage A.","Dezelfde situatie, zelfde tekst — nu vanuit B.","En vanuit C: de omstander, de buitenstaander.","Nabespreking: wie heeft gelijk? Wat verandert er als je het perspectief wisselt?"],tg:["perspectief","analyse","forum theater","reflectie"],tip:"Rachomon werkt het best als de situatie een conflict heeft dat herkenbaar is — maar geen duidelijke winnaar.",bron:"Laos 2004",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Hot Seat",t:"Karakterverdieping",d:"20–30 min",g:"6–20 p.",o:"Een personage van binnenuit leren kennen — en de motivaties achter onderdrukking begrijpen.",s:["Een speler gaat 'in karakter' zitten op de stoel.","De groep stelt vragen — het personage antwoordt vanuit zijn/haar logica.","De Joker kan het karakter uitdagen: 'Waarom doe je dat eigenlijk?'","Variatie: twee personages op twee stoelen — in gesprek met elkaar én met de groep."],tg:["personage","forum theater"],tip:"De hot seat onthult waarom antagonisten doen wat ze doen. Dat is de sleutel tot een werkend Forum.",bron:"Laos 2004",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Hannover-variaties",t:"Scènewerk / tegenspeeltraining",d:"25–35 min",g:"6–20 p.",o:"Acteurs voorbereiden op onverwachte interventies — flexibel tegenspeelrepertoire opbouwen.",s:["Een scène wordt gespeeld zoals gerepeteerd.","Joker stopt: 'Doe precies hetzelfde, maar nu met meer angst/macht/wanhoop.'","Scène start opnieuw — zelfde tekst, andere onderstroom.","Variatie: wissel wie de protagonist is. Wie brengt het tegenspeelrepertoire?"],tg:["personage","forum theater"],tip:"Dit is technische acteertraining — maar essentieel voor Forum. Wie niet weet hoe te antwoorden op een interventie, remt het Forum af.",bron:"Laos 2004",fase:"forum",niv:3,eng:"middel"},
  {b:"geheugen",n:"Armoedecyclus",t:"Thematische analyse",d:"30–45 min",g:"6–20 p.",o:"De structuur van armoede en uitsluiting zichtbaar maken als een cirkel — niet als individueel falen.",s:["Groep bouwt een levend schema: persoon A stelt een oorzaak voor, B toont het gevolg, C de volgende schakel.","De keten groeit tot een cirkel — de cyclus sluit.","Joker vraagt: waar zit de breekplek? Wie kan de cirkel doorbreken?","Variatie: de cyclus in beweging — elk gevolg triggert het volgende automatisch."],tg:["macht","analyse","forum theater"],tip:"De kracht zit in het zichtbaar maken van de structuur — niet van de schuldige. Niemand is de oorzaak. Iedereen zit erin.",bron:"Laos 2004",fase:"forum",niv:3,eng:"middel"},
  {b:"kennismaking",n:"Namen verzamelen",t:"Kennismaking / namen",d:"5–10 min",g:"Onbeperkt",o:"Namen leren via beweging en kort fysiek contact — de ruimte vullen als eerste groepstaak.",s:["Iedereen loopt door de ruimte en verspreidt zich gelijkmatig.","Op een teken ontmoet je één persoon: handen schudden, namen uitwisselen, doorlopen.","Opbouwen: twee mensen tegelijk, dan vier, dan zes — zo snel mogelijk.","Afsluiting: wie kan namen noemen van mensen die ze hebben ontmoet?"],tg:["kennismaking","beweging","contact"],tip:"Het gaat niet om onthouden maar om ontmoeten. Wie iedereen probeert te onthouden loopt vast. Wie loopt, ontmoet.",bron:"Formaat",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Jat je schatje",t:"Namen / concentratie",d:"5 min",g:"Min. 9 p.",o:"Namen leren kennen via spanning en humor — een schatje veroveren vóór de bewaarder het tegenhoudt.",s:["Binnenste cirkel = schatjes, buitenste cirkel = schatbewaarders. Eén persoon staat zonder schatje.","De persoon zonder schatje roept de naam van een schatje — dat schatje rent naar hem/haar.","De schatbewaarder probeert het schatje te tikken vóór het ontsnapt (één stap vooruit, niet meer).","Wie ontsnapt: nieuw koppel. Wie getikt wordt: wisselt rol met de schatbewaarder."],tg:["kennismaking","concentratie","opwarming","humor"],tip:"Handen op de rug bij de schatbewaarders — anders kan niemand ontsnappen. Bewaar dat als enige vaste regel.",bron:"Formaat",fase:"opening",niv:1,eng:"hoog"},
  {b:"lichaam",n:"16-8-4-2-1",t:"Energizer",d:"2 min",g:"Onbeperkt",o:"Energie terugbrengen na een pauze of dip — het lichaam wakker schudden via ritme en snelheid.",s:["Kring. Allemaal tegelijk: rechterhand 16 keer schudden terwijl je meetelt.","Dan linkerhand 16 keer, rechtervoet 16 keer, linkervoet 16 keer.","Herhaal met 8, dan 4, dan 2, dan 1.","Afsluiting: één grote gezamenlijke oerkreet."],tg:["opwarming","ritme","lichaam"],tip:"Tempo is alles — hoe sneller de reeks, hoe meer energie. Doe zelf mee en geef het tempo aan.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"1-2-3 Bradford",t:"Concentratie / opwarming",d:"5–20 min",g:"Min. 2 p.",o:"Concentratie scherpen via een simpele telvolgorde die steeds complexer wordt — fout maken is de oefening.",s:["In tweetallen: A zegt '1', B zegt '2', A zegt '3', B zegt '1', enzovoort.","Als dit loopt: vervang '1' door een beweging met geluid. De rest blijft.","Vervang daarna ook '2' en '3' door eigen beweging + geluid.","Variatie: presenteer de bewegingssequenties aan de groep."],tg:["concentratie","ritme","opwarming","ensemble"],tip:"Verwarring is het doel, niet de fout. Wie nooit fouten maakt gaat te voorzichtig. Aanmoedigen om sneller te gaan.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"De mug",t:"Opwarming / concentratie",d:"10–20 min",g:"Min. 9 p.",o:"Reactiesnelheid en groepscoördinatie trainen — de mug net missen is de grap.",s:["Kring. Een denkbeeldige mug vliegt boven het hoofd van één deelnemer.","Die bukt — de buren klappen tegelijk boven zijn hoofd. De mug ontsnapt en vliegt door.","De mug schuift steeds één plaatsje op. Bij grote groepen meerdere muggen tegelijk.","Uitdaging: zo snel mogelijk gaan en toch synchroon klappen."],tg:["concentratie","ritme","opwarming"],tip:"Laat mensen ook ritmes klappen in plaats van één klap — dat maakt het rijker. Tempo opvoeren zodra de groep het snapt.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Huizen, bewoners, storm",t:"Opwarming / groepsvorming",d:"10–20 min",g:"Min. 7 p.",o:"Iedereen in beweging krijgen via drie opdrachten — en steeds nieuwe combinaties laten vormen.",s:["Drietallen: twee mensen vormen een dak (handen hoog tegen elkaar), één staat ertussen als bewoner. Eén persoon is dakloos.","De dakloze roept: 'Huizen!' (huizen zoeken nieuwe bewoner), 'Bewoners!' (bewoners zoeken nieuw huis) of 'Storm!' (alles verplaatst).","De dakloze probeert zelf ook een plek te veroveren — een ander wordt dakloos.","Variatie: thematische namen geven aan de rollen passend bij de groep."],tg:["opwarming","ensemble","beweging"],tip:"Storm is altijd het populairst — gebruik het spaarzaam zodat het een hoogtepunt blijft. De naamgeving van de rollen kan direct het thema van de sessie inleiden.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"West Side Story",t:"Opwarming / polariteit",d:"5–20 min",g:"Min. 6 p.",o:"Twee groepen laten imponeren via beweging en geluid — de confrontatie zonder aanraking.",s:["Twee groepen tegenover elkaar met ruimte ertussen.","Elke groep kiest een leider die een herhaalbaar geluid + beweging verzint om de andere groep te imponeren.","De leider leert de beweging aan de eigen groep — dan samen naar voren.","Herhaal tot iedereen minimaal één keer leider is geweest."],tg:["opwarming","conflict","beweging","ensemble"],tip:"Alles mag behalve aanraken. Variatie: muziek meegeven die de beweging inspireert.",bron:"Formaat",fase:"opwarming",niv:2,eng:"hoog"},
  {b:"lichaam",n:"Cirkel van Toronto",t:"Opwarming / ritme",d:"10 min",g:"Min. 5 p.",o:"Een collectief ritmisch geheel bouwen van individuele bewegingen — machine als groepsmetafoor.",s:["Kring. Iemand staat voor zijn buur en maakt een ritmische beweging met geluid — de buur kopieert.","Als de kopie goed genoeg is, schuift de aangever door naar de volgende.","Zo ontstaan meerdere lagen van beweging en geluid tegelijk in de cirkel.","Werk de hele cirkel af tot iedereen terug op startpositie staat."],tg:["ritme","opwarming","beweging","ensemble"],tip:"Variatie: geef de bewegingen thema's mee — het geluid van discriminatie, van solidariteit, van vreugde.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Duels van Ierland",t:"Opwarming / competitie",d:"15–20 min",g:"Min. 2 p.",o:"Fysieke opwarming met een competitie-element — energie losmaken via drie vormen van duel.",s:["Duel 1: rechterhand plat op rug = hart, andere hand uitgestrekt = zwaard. Hinkelen, doel: zwaard raakt hart van tegenstander.","Duel 2: vrije been = zwaard (teen vooruit), staande voet = hart.","Duel 3: handen en voeten op de grond. Doel: ander omver trekken.","Variatie: knock-outsysteem voor de hele groep."],tg:["opwarming","competitie","lichaam"],tip:"Deelnemers moeten zelf eerlijk zijn — hoe ze dat doen zegt iets over de groep. Noteer dat voor de nabespreking.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Fruitschaal",t:"Opwarming / kennismaking",d:"10–15 min",g:"Min. 9, max. 30 p.",o:"Snel bewegen, lachen en van stoel wisselen — de stoelendans als groepsopener.",s:["Kring op stoelen. Eén persoon staat in het midden zonder stoel.","De persoon in het midden roept een fruitsoort — alle 'appels' wisselen van stoel. De persoon in het midden probeert ook een stoel te pakken.","'Fruitschaal!' = iedereen wisselt. Regel: niet naast je buren gaan zitten.","Variatie: thematische rollen in plaats van fruitsoorten."],tg:["opwarming","beweging","kennismaking"],tip:"Verander de namen naarmate de sessie vordert — gebruik rollen die aansluiten bij het onderwerp. Dat maakt de overgang naar inhoud vloeiend.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"vertrouwen",n:"Eilanden",t:"Vertrouwen / samenwerking",d:"5–10 min",g:"Min. 8 p.",o:"Samen op steeds minder ruimte blijven — letterlijk dichter bij elkaar komen.",s:["Stoelen kriskras door de ruimte = tropische eilanden. De vloer = oceaan.","Op 'Haaien!' moet iedereen zo snel mogelijk een eiland bereiken.","Steeds meer eilanden verdwijnen — mensen moeten samen op één stoel.","Variatie: gebruik kranten als eilanden bij een wilde groep."],tg:["vertrouwen","ensemble","lichaam","aanraking"],tip:"Het moment waarop mensen besluiten samen op een stoel te gaan staan is de oefening. Wat maakt dat makkelijk of moeilijk?",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Flauwvallen",t:"Vertrouwen / opvangen",d:"5–10 min",g:"Min. 8 p.",o:"Vertrouwen op de groep als vangnet — letterlijk instorten en weten dat je wordt opgevangen.",s:["Iedereen loopt door de ruimte. De Joker roept een nummer.","Die persoon strekt handen, geeft een gil, laat zich vallen. De groep vangt op.","Opbouwen: twee nummers tegelijk, dan drie.","Begin altijd in slow motion."],tg:["vertrouwen","ensemble","lichaam"],tip:"Eén keer laten vallen breekt het vertrouwen voor de rest van de sessie. Begin in slow motion en bouw rustig op.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Zoek je partner met geluiden",t:"Vertrouwen / gehoor",d:"10–15 min",g:"Min. 12 p.",o:"Blind navigeren op het geluid van je partner — vertrouwen op gehoor.",s:["Tweetallen bedenken samen een dierengeluid. Eén sluit de ogen, armen voor de borst.","De ziende partner maakt het geluid vanuit een andere plek — de blinde loopt die kant op. Bij stilte: stoppen.","Variatie: geluid van hoog/laag, dichtbij/veraf, luid/zacht.","Wissel rollen. Nabespreking: wanneer voelde je je veilig?"],tg:["vertrouwen","gehoor","concentratie","blind"],tip:"Stilte als commando is krachtig — de blinde moet leren staan. Dat voelt anders dan lopen.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blind Cars",t:"Vertrouwen / leiden",d:"10 min",g:"Min. 12 p.",o:"Blind bestuurd worden via aanraking — vertrouwen op de kleinste signalen.",s:["Tweetallen. Eén is de 'auto' (ogen dicht), de ander is de 'bestuurder'.","Sturen via tikken: midden rug = vooruit, kruin = achteruit, linkerschouder = links, rechterschouder = rechts.","Stoppen = geen tik. Rij door de ruimte zonder te botsen.","Wissel rollen na enkele minuten."],tg:["vertrouwen","leiden","volgen","blind"],tip:"De bestuurder is verantwoordelijk voor de veiligheid — niet andersom. Dat herpositioneert de macht in het koppel.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blind oversteken",t:"Vertrouwen / collectief",d:"10 min",g:"Min. 12 p.",o:"De groep als gids voor de blinde — collectieve verantwoordelijkheid voor veiligheid.",s:["Kring. Een vrijwilliger sluit de ogen — een deelnemer duwt hem zacht richting iemand anders.","Die houdt de blinde op, draait om, stuurt een nieuwe richting.","Later: meerdere blinden tegelijk — de groep zorgt dat ze niet botsen.","Nabespreking: was je liever in de cirkel of in het midden?"],tg:["vertrouwen","ensemble","blind","identiteit"],tip:"De groep leert dat gedeelde verantwoordelijkheid zwaarder is dan één-op-één begeleiden. Goed materiaal voor nabespreking over collectieve zorg.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"De lift",t:"Vertrouwen / teamwork",d:"10–15 min",g:"Groepen van 6–8 p.",o:"Gedragen worden door de groep — fysiek vertrouwen op volle overgave.",s:["Iemand gaat liggen als een stijve plank. De groep hurkend eromheen, ieder een lichaamsdeel.","Op 'drie, twee, één, lift!' tillen ze de plank op boven de hoofden.","Even vasthouden, dan snel laten zakken tot romphoogte — zweefgevoel. Dan rustig neerlaten.","Herhaal voor wie wil."],tg:["vertrouwen","lichaam","contact"],tip:"Iedereen moet gelijktijdig tillen. Concentratie vóór de lift is essentieel — wie te vroeg begint zorgt voor scheefhang.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"beeld",n:"Beeldenrijen",t:"Image Theater / kijken",d:"10–30 min",g:"Min. 4 p.",o:"Leren kijken naar beelden — en ontdekken hoe dezelfde emotie tientallen gezichten heeft.",s:["Twee rijen tegenover elkaar. Groep 1 draait zich om, denkt na over een emotie. Op teken: tegelijk omdraaien en bevriezen.","Groep 2 kijkt: wat is gemeenschappelijk? Wat verschilt?","Stap 2: groep 2 kopieert het beeld van hun partner — de partner ziet zichzelf van buitenaf.","Stap 3: tweetallen maken samen een conflictscène. Groep 2 kopieert en observeert."],tg:["image theater","gevoel","conflict"],tip:"Geef weinig tijd om na te denken — de eerste impuls is altijd het rijkst. 'Maak een beeld van woede! Drie, twee, één!'",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Wat is het verhaal?",t:"Image Theater / scèneontwikkeling",d:"10–30 min",g:"Min. 4 p.",o:"Leren dat elk beeld een verhaal draagt — en dat elke kijker een ander verhaal ziet.",s:["Twee vrijwilligers op afstand. De groep: 'Wat zie je?' Alleen feiten.","Doorvragen: 'Wat zou er aan de hand zijn als je dit op straat zou zien?'","De verste vrijwilliger doet stap voor stap dichterbij — nieuwe vraag bij elke stap.","Favoriete interpretatie: beide vrijwilligers krijgen één zin. De scène komt tot leven."],tg:["image theater","verhaal","scène"],tip:"Accepteer alle antwoorden — hoe absurd ook. De interpretaties die steeds terugkomen zijn het meest veelzeggend over waar de groep mee zit.",bron:"Formaat",fase:"repetitie",niv:2,eng:"middel"},
  {b:"geheugen",n:"Recept van jezelf",t:"Identiteit / reflectie",d:"15–25 min",g:"Min. 8 p.",o:"De eigen identiteit verkennen als een recept — welke ingrediënten hebben jou gemaakt tot wie je bent?",s:["Schrijf een recept van jezelf: welke rollen en ervaringen zijn de ingrediënten? Niet eigenschappen — rollen en contexten.","Hoeveelheden en bereidingswijze mogen: een scheutje geduld, een halve kilo verdriet.","Kies vier ingrediënten om mee verder te gaan.","Deel in de groep — in subgroepen, in de kring, of wie wil."],tg:["identiteit","reflectie","verhaal","personage"],tip:"Rollen zijn altijd ook maatschappelijk bepaald — dit maakt de oefening politiek zonder dat te benoemen. Dat inzicht kan later in het proces terugkomen.",bron:"Formaat",fase:"verdieping",niv:1,eng:"laag"},
  {b:"geheugen",n:"Identiteitenpalet",t:"Identiteit / Image Theater",d:"20–30 min",g:"Onbeperkt",o:"De veelheid van eigen identiteiten in kaart brengen — en ontdekken hoe anderen erop reageren.",s:["Iedereen maakt een lijst van alle eigen identiteiten. Kies vier. Schrijf elk op een post-it en plak het op het lichaam waar het past.","Loop door de ruimte. Op een teken: ontmoet iemand, neem elkaars identiteiten in je op, maak een beeld van één.","Steeds impulsiever reageren — minder tijd per ontmoeting.","Nabespreking: welk beeld kreeg je het vaakst? Wat verraste je?"],tg:["identiteit","image theater","gemeenschap"],tip:"De plek op het lichaam is al veelzeggend. Waarom plak je 'moeder' op je hart en 'werknemer' op je schouder? Vraag dat achteraf.",bron:"Formaat",fase:"verdieping",niv:2,eng:"middel"},
  {b:"geheugen",n:"Reflecteren op eigen identiteiten",t:"Identiteit / beweging",d:"30 min",g:"Onbeperkt",o:"Van individuele identiteitsbeweging naar collectieve dans — de identiteit als lichaamstaal.",s:["Subgroepen van 3–5. Iedereen maakt een bewegingssequentie van de vier eigen identiteiten — een soort dans met geluid.","Drie keer tonen aan de subgroep — in stilte, geen commentaar.","Subgroep bespreekt drie minuten. De 'choreograaf' luistert en noteert.","Vanuit de notities schrijft iedereen een gedicht van zeven regels — eerste en zevende zin zijn hetzelfde."],tg:["identiteit","beweging","reflectie"],tip:"Niet om artistieke kwaliteit — iedereen is danser en dichter op eigen wijze. Benadruk dit uitdrukkelijk vóór de oefening.",bron:"Formaat",fase:"verdieping",niv:2,eng:"laag"},
  {b:"geheugen",n:"Collectieve creatie",t:"Identiteit / groepswerk",d:"30–60 min",g:"Onbeperkt",o:"Van individuele naar collectieve identiteit — wie zijn wij als groep?",s:["Subgroepen leggen alle post-its op de grond en puzzelen: welke komen overeen, welke botsen?","Zeven minuten om alle identiteiten in een patroon te leggen — de groep beslist de vorm.","Alle subgroepen bekijken elkaars creaties. Dan twee groepsbeelden: het voornaamste conflict én de collectieve identiteit.","Elk subgroepje presenteert. De rest reflecteert op herkenbaarheid."],tg:["identiteit","ensemble","image theater"],tip:"De dialoog rondom de beelden is de basis voor verdere verdieping — of voor een Forum-scène. Noteer wat er gezegd wordt.",bron:"Formaat",fase:"verdieping",niv:2,eng:"middel"},
  {b:"beeld",n:"Cross the line",t:"Polariteit / positiebepaling",d:"20–60 min",g:"Min. 12, max. 30 p.",o:"Diverse tegenstellingen in de groep zichtbaar maken — wie staat waar en waarom?",s:["Iedereen staat aan één kant. Deelnemers lopen één voor één naar de andere kant en doen een uitspraak die voor hen geldt.","Wie het ook geldt: gaat mee naar de andere kant.","Verdieping: maak beelden van hoe het voelt om dit kenmerk wel of niet te hebben. De andere groep kopieert.","Reflectie: wanneer stond je bij dezelfde mensen? Wanneer stond je alleen?"],tg:["conflict","positiebepaling","identiteit"],tip:"Werk in eerste instantie niet met de meest beladen polarisatie. Nieuwe verbindingen eerst — dan de harde kern.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeld van de eigen groep",t:"Polariteit / Image Theater",d:"30–45 min",g:"Min. 10, max. 25 p.",o:"De groep zichzelf laten zien — en ontdekken hoe die blik de werkelijkheid construeert.",s:["Een vrijwilliger bouwt een levend beeld van de eigen groep: zet mensen neer in een bepaalde verhouding.","De groep vult aan of past aan — zonder woorden. Het beeld wordt collectief.","Dynamisering: beelden maken één beweging, dan een woord, dan een zin.","Beelden gaan in dialoog. Scène kan ontstaan."],tg:["image theater","conflict"],tip:"De relatie tussen de beelden is even belangrijk als de beelden zelf. Kijken ze naar buiten of naar elkaar? Dát is de analyse.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Van huidig naar ideaal beeld",t:"Polariteit / toekomst",d:"10–15 min",g:"Min. 10, max. 25 p.",o:"De afstand tussen nu en gewenst zichtbaar maken — en die afstand in slow motion overbruggen.",s:["Laat de groep terugkeren naar het oorspronkelijke groepsbeeld.","Bouw een ideaal beeld op basis van wat is besproken.","Deelnemers gaan in slow motion van het huidige naar het ideale beeld.","Drie keer herhalen. Bespreek: wat is er nodig voor deze transformatie?"],tg:["image theater","conflict"],tip:"De beweging van huidig naar ideaal is zelf al een antwoord op de vraag wat er nodig is. Observeer wie beweegt en wie wacht.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Wij kijken naar jullie",t:"Polariteit / confrontatie",d:"5 min",g:"Min. 12 p.",o:"De twee gepolariseerde groepen bewust tegenover elkaar zetten — de confrontatie onder woorden brengen.",s:["Twee groepen tegenover elkaar met ruimte ertussen.","Om beurten, steeds nadrukkelijker: 'Wij kijken naar jullie, jullie kijken naar ons.'","Tien keer herhalen — vijf keer per groep.","Stilte daarna. Wat doet dit?"],tg:["conflict","taal","reflectie"],tip:"Eenvoudiger dan het lijkt — en krachtiger dan je verwacht. Laat de stilte na de tien keer echt vallen.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeldendiscussie",t:"Polariteit / beeldvorming",d:"10–40 min",g:"Min. 12, max. 30 p.",o:"De beeldvorming over en weer benoemen — hoe zien wij hen, hoe zien zij ons?",s:["Beide groepen apart: vijf minuten gesprek over 'Hoe zien wij hen?' en 'Hoe ziet de ander ons?'","Een notulist gaat als ambassadeur naar de andere groep en brengt verslag uit.","Variatie: maak beelden van beide vragen. Dynamiseer. Presenteer aan de andere groep.","Reflectie: kloppen de beelden die we van elkaar hebben?"],tg:["conflict","taal"],tip:"Leg de ambassadeursrol niet vooraf uit — een notulist die weet dat hij ambassadeur wordt, maakt een vriendelijker verslag.",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"forum",n:"Theatraal antwoord",t:"Polariteit / ventilatie",d:"30 min",g:"Min. 12, max. 30 p.",o:"De spanning tussen de groepen speels laten ventileren — een antwoord geven via theater.",s:["Beide groepen apart: vijf minuten nabespreken wat het meest bijstaat.","Tien minuten: maak een korte sketch of performance als antwoord aan de andere groep.","Beide groepen tonen hun antwoord.","Reflectie: wat was frappant? Wat was kwetsend? Wat werd verhelderd?"],tg:["conflict","taal"],tip:"Dit is geen debat — het is een theatraal gebaar. Zorg dat de groepen de vrijheid voelen om te overdrijven, te parodiëren, te rouwen.",bron:"Formaat",fase:"forum",niv:2,eng:"middel"},
  {b:"afsluiting",n:"Rituelen",t:"Afsluiting / rites de passage",d:"60–120 min",g:"Min. 8, max. 30 p.",o:"Een blijvende afsluiting bouwen — een ritueel parcours dat symboliseert wat de groep heeft afgelegd.",s:["De groep bouwt een ritueel parcours van materialen: papier, ballonnen, schaar, elastiek, natuurlijke objecten.","Het parcours symboliseert de weg die is afgelegd — en biedt ruimte om iets achter te laten.","Iedereen loopt één voor één door het ritueel.","Variatie: twee groepen maken elk een ritueel voor de ander."],tg:["ritueel","gemeenschap"],tip:"Hoe meer materiaal, hoe rijker. Geen instructies over hoe het eruitziet — de groep bepaalt. Aanwezig zijn en getuige zijn is de rol van de Joker.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Body shower",t:"Afsluiting / ontspanning",d:"10 min",g:"Groepen van 5 p.",o:"Het proces letterlijk van je af laten tikken — het lichaam reinigen na intensief werk.",s:["Groepen van vijf. Eén persoon in het midden, vier eromheen.","De vier tikken zacht met alle vingertoppen op het hoofd — dan langzaam naar beneden.","Terug omhoog — dan snel de handen naar beneden laten glijden over het hele lichaam. Middelste ademt diep uit.","Drie keer herhalen. Iedereen staat een keer in het midden."],tg:["lichaam","contact"],tip:"Alleen inzetten als de groep comfortabel is met aanraking.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"afsluiting",n:"De Yell",t:"Afsluiting / energie",d:"1 min",g:"Onbeperkt",o:"De dag afsluiten in één woord — en dat woord samen zo hard mogelijk schreeuwen.",s:["Iedereen in een kring, rechterhand naar voren.","Vraag één woord dat de dag samenvat. Laat een paar kreten voorbijkomen.","Kies het woord dat het meest resoneert.","Tel tot drie — iedereen gooit de hand in de lucht en schreeuwt tegelijk."],tg:["opwarming","gemeenschap","ritueel"],tip:"Het gekozen woord zegt meer over de groep dan een lange evaluatie. Onthoud het — vergelijk het met de volgende sessie.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"hoog"},
  {b:"afsluiting",n:"De lege stoel",t:"Afsluiting / derolling",d:"5–10 min",g:"Onbeperkt",o:"Uit de rol komen na intensief spel — afstand nemen van het personage.",s:["Zet een lege stoel voor de groep. Dit is de stoel van het personage dat centraal stond.","Iedereen geeft om de beurt een advies of een laatste opmerking aan het personage.","Variatie: geen stoel — benoem één overeenkomst en één verschil tussen jezelf en het personage.","Schud het personage van je af."],tg:["derolling","personage","reflectie"],tip:"Essentieel na Forum of intensief scènewerk. Wie niet derollt neemt het personage mee naar buiten.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Beeld en geluid van hoe je vertrekt",t:"Afsluiting / stemming",d:"1 min",g:"Onbeperkt",o:"De stemming bij het vertrek zichtbaar maken — één beweging en één geluid per persoon.",s:["Kring. Om de beurt: een beweging + geluid die toont hoe je de ruimte verlaat.","De rest herhaalt de beweging en het geluid.","Ga de hele kring langs.","Variatie: een getal tussen 1 en 10 in plaats van geluid."],tg:["gevoel","beweging","reflectie"],tip:"Kan ook als opening worden gebruikt: hoe kom je binnen? Gecombineerd geeft het een meting van stemmingsverandering.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Weerbericht",t:"Afsluiting / check-in",d:"5–10 min",g:"Min. 5 p.",o:"De gemoedstoestand van de groep in kaart brengen — via een collectief weerbericht.",s:["Kring op stoelen. Joker begint: handen wrijven — de wave gaat rond.","Zodra iedereen wrijft: knip vingers. Als dat rond is: klap handen. Opbouwen.","Variatie: ogen dicht, focus op het geluid van je buurman. Dan: welk intern weerbericht voel je?","Iedereen zegt één woord voor het interne weerbericht."],tg:["check-in","gevoel","ensemble"],tip:"De woordkeuze bij het interne weerbericht geeft direct zicht op hoe de groep erbij zit. Noteer de woorden — ze kunnen het begin zijn van de volgende sessie.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Waar of niet waar",t:"Icebreaker / kennismaking",d:"10–15 min",g:"6–25 p.",o:"Elkaar leren kennen via verrassing en humor — en ontdekken hoe weinig je soms van elkaar weet.",s:["Iedereen schrijft drie dingen over zichzelf op: twee waar, één verzonnen.","Om beurten lees je je drie 'feiten' voor aan de groep.","De groep stemt: welke is de leugen?","Nabespreking: wat verraste je het meest?"],tg:["kennismaking","humor"],tip:"Moedig mensen aan om de leugen geloofwaardig te maken — dat maakt het spannender. Goede opener voor een eerste bijeenkomst.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"hoog"},
  {b:"kennismaking",n:"Interview",t:"Icebreaker / kennismaking",d:"10–15 min",g:"6–30 p.",o:"Actief luisteren oefenen terwijl je iemand anders introduceert — niet jezelf.",s:["Verdeel in tweetallen. Drie minuten de tijd om elkaar te interviewen: wat zijn drie interessante of onverwachte dingen over jou?","Terugkomen in de grote groep: iedereen stelt zijn of haar partner voor.","Presenteer de ander — niet jezelf.","Variatie: de geïnterviewde mag corrigeren als de feiten niet kloppen."],tg:["kennismaking","contact"],tip:"Bewaar het tempo — bij grote groepen snel doorheen. Het gaat om de wisseling van perspectief: jezelf zien door andermans ogen.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Naam met bijvoeglijk naamwoord",t:"Icebreaker / namen",d:"5–10 min",g:"6–30 p.",o:"Namen onthouden via associatie — en meteen iets van jezelf laten zien.",s:["Iedereen kiest een bijvoeglijk naamwoord dat begint met dezelfde letter als hun naam: Levendige Luc, Bedachtzame Bas.","Reeks door de groep: iedereen introduceert zichzelf met naam + bijvoeglijk naamwoord.","Variatie: de groep herhaalt ook alle vorige namen.","Nabespreking: klopt het bijvoeglijk naamwoord? Wat koos je bewust, wat niet?"],tg:["kennismaking","verbeelding"],tip:"De keuze van het bijvoeglijk naamwoord zegt altijd meer dan mensen verwachten. Vraag er achteraf naar.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Het vraagweb",t:"Icebreaker / groepsvorming",d:"20–30 min",g:"8–25 p.",o:"Een zichtbaar web van verbindingen bouwen — en tegelijk iets van jezelf delen.",s:["Iemand houdt het einde van een bol wol vast en gooit naar een ander. Die beantwoordt een vraag en gooit verder.","Zo ontstaat een web van draden die iedereen verbindt.","Aan het eind: wijs op het web — als één persoon weg was, zou het er anders uitzien.","Gebruik vragen die echt iets raken: 'Wat is het moeilijkste dat je ooit hebt gedaan?' 'Wat zou je redden uit een brandend huis?'"],tg:["kennismaking","contact","ensemble"],tip:"Kies vragen die uitnodigen tot echte antwoorden, niet tot sociaal wenselijke. Het web is metafoor — benoem dat expliciet aan het eind.",bron:"Grahame Knox",fase:"opwarming",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Wat kies jij?",t:"Icebreaker / positiebepaling",d:"10–15 min",g:"8–40 p.",o:"Meningen en voorkeuren zichtbaar maken via beweging — en ontdekken waar je staat ten opzichte van anderen.",s:["Tape een lijn op de vloer. Links = optie A, rechts = optie B.","Joker stelt een vraag: 'Strand of berg? Zichtbaar of onzichtbaar? Toekomst zien of verleden veranderen?'","Iedereen springt naar links of rechts — geen twijfelen.","Variatie: bouw op van luchtige naar inhoudelijkere keuzes die raken aan het thema van de sessie."],tg:["kennismaking","positiebepaling","beweging"],tip:"Eindig niet bij de grappige vragen — gebruik de oefening als aanloop naar inhoud. 'Aan welke kant sta jij?' is een Forum-vraag.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Mensenloterij",t:"Icebreaker / kennismaking",d:"15–20 min",g:"10–30 p.",o:"Iedereen in gesprek met iedereen — via een speelse zoekstructuur.",s:["Iedereen krijgt een kaart met 15–20 omschrijvingen: 'Iemand die een instrument speelt', 'Iemand die in meer dan drie landen heeft gewoond'.","Opdracht: zoek voor elke omschrijving een ander persoon en laat die tekenen.","Na 10 minuten stoppen en terugkomen: welke ontdekkingen deed je?","Variatie: gebruik omschrijvingen die aansluiten bij het thema van de sessie."],tg:["kennismaking","beweging"],tip:"Pas de omschrijvingen aan op de groep. Voor Dreamers Beyond: 'Iemand die drie talen spreekt', 'Iemand die weet hoe het voelt om ergens niet welkom te zijn'.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Wie ben ik?",t:"Icebreaker / identiteit",d:"15–20 min",g:"8–30 p.",o:"Identiteit onderzoeken via vragen en aannames — en ontdekken hoe je anderen categoriseert.",s:["Plak een post-it op ieders voorhoofd met een naam: een bekend persoon, een rol, een archetype.","Iedereen stelt ja/nee-vragen om te ontdekken wie ze zijn.","Alleen ja of nee. Bij 'nee' geef je de beurt door.","Nabespreking: welke aannames maakte je? Welke vragen stelde je als eerste?"],tg:["kennismaking","identiteit"],tip:"De vragen die iemand stelt zeggen meer dan het antwoord. Wie vraagt als eerste naar geslacht? Naar nationaliteit? Dát is de analyse.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Op volgorde",t:"Icebreaker / samenwerking",d:"10–15 min",g:"8–30 p.",o:"Samenwerken zonder aanvoerder — en ontdekken hoe een groep zichzelf organiseert.",s:["Opdracht: ga op volgorde staan — van kleinste naar grootste, van januari naar december, van schoenmaat klein naar groot.","Zonder te praten: alleen via gebaren en lichaamstaal.","Variatie met praten: voornamen alfabetisch, moeders naam alfabetisch.","Nabespreking: wie nam het initiatief? Wie volgde? Wie stond er ongemakkelijk bij?"],tg:["kennismaking","ensemble","beweging"],tip:"De stille versie is de interessantere. Wie neemt de regie? Wie laat zich leiden? Dit is zichtbaar groepsdynamisch materiaal.",bron:"Grahame Knox",fase:"opwarming",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Knipoogmoordenaar",t:"Icebreaker / concentratie",d:"10–15 min",g:"8–25 p.",o:"Spanning en aandacht creëren via een eenvoudig geheim — opmaat voor werk met verborgen rollen en macht.",s:["Iedereen trekt een kaart. Wie de aas trekt is de moordenaar — maar zegt niets.","De moordenaar doodt door iemand aan te kijken en te knipogen.","Wie geknipoogd wordt, is dood — en kiest zelf hoe dramatisch.","Wie denkt de moordenaar te kennen, kan een aanklacht doen — maar wie het mis heeft, is ook dood."],tg:["kennismaking","concentratie","gevoel","personage"],tip:"Laat mensen zelf bepalen hoe ze sterven — dat zegt al iets. Goede opwarmer voor werk met verborgen machtsstructuren.",bron:"Grahame Knox",fase:"opening",niv:1,eng:"laag"},
  {b:"lichaam",n:"De menselijke stoel",t:"Icebreaker / vertrouwen",d:"5–10 min",g:"10–40 p.",o:"Collectief vertrouwen en gewicht delen — letterlijk.",s:["Nauwe cirkel, schouder aan schouder. Iedereen draait een kwartslag naar rechts.","Op het teken van de Joker: langzaam neergaan en zitten op de schoot van de persoon achter je.","Als het lukt draagt iedereen en wordt iedereen gedragen.","Variatie: de cirkel begint te lopen terwijl iedereen zit."],tg:["kennismaking","vertrouwen","lichaam","gemeenschap"],tip:"Dit lukt alleen als iedereen tegelijk loslaat. Eén iemand die aarzelt en de cirkel valt. Goed materiaal voor nabespreking over collectieve actie.",bron:"Grahame Knox",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Ballonnenknuffel",t:"Icebreaker / contact",d:"10–15 min",g:"6–20 p.",o:"Fysiek contact normaliseren via absurditeit en lachen.",s:["Drie koppels. Elk koppel krijgt drie ballonnen: opblazen en knopen.","Twee ballonnen onder de oksels van één persoon, één tussen het koppel in.","Opdracht: knap alle drie tegelijk door elkaar te omhelzen — zonder handen.","Het snelste koppel wint."],tg:["kennismaking","contact","lichaam","humor"],tip:"Werkt alleen als de sfeer al enigszins ontspannen is. Niet als eerste oefening bij een onbekende groep.",bron:"Grahame Knox",fase:"opwarming",niv:1,eng:"hoog"},
