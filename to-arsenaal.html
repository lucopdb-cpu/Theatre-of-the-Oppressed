  {b:"geheugen",n:"Slapende personages wakker maken",t:"Regenboog / extraversie",d:"30–45 min",g:"6–20 p.",o:"Deelnemers ontdekken welke figuren en rollen in henzelf slapend zijn — rollen die ze nooit spelen maar die er wel zijn.",s:["Iedereen schrijft drie rollen op die ze spelen in het dagelijks leven.","Dan: welke rol speelt bijna niemand maar zou je soms willen? Die is slapend.","Speel die slapende rol — in een kleine scène of improvisatie.","Nabespreking: hoe voelde dat? Wat hield die rol slapend?"],tg:["identiteit","personage"],tip:"De slapende rollen zijn niet per se de gewenste rollen — ze zijn de mogelijke rollen. Soms is een slapende rol slapend om goede redenen. Onderzoek dat zonder oordeel.",bron:"Regenboog",fase:"verdieping",niv:2,eng:"middel"},
  {b:"lichaam",n:"Dieren",t:"Karakter / opwarming",d:"20–30 min",g:"Even aantal p.",o:"Een dier worden — slapen, dromen, ontwaken, drinken, eten, paren — zonder woorden.",s:["Iedereen trekt in stilte een briefje met een diersoort (man of vrouw). Niet laten zien.","Lie down. Hoe slaapt dit dier? Droom. Ontwaakt. Hoe is het dorstig, hoe drinkt het?","Paartijd: zoek je tegenpool — geen taal, alleen gedrag. Herken jij mij als jouw soort?","Wie samen is gevonden danst zijn paarsdans. De groep kijkt — wat voor dieren zijn dit?"],tg:["personage","lichaam","opwarming"],tip:"Niet om te raden — om te voelen. Wie het dier echt wil zijn in plaats van tonen, vindt zijn partner het snelst. Dat onderscheid zegt alles over acteertraining.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Energieklap",t:"Opwarming / contact",d:"5–10 min",g:"8–40 p.",o:"Een energieball doorgooien door de kring — ontvangen naar binnen, geven naar buiten.",s:["Grote cirkel. Joker heeft een grote bal energie in de handen.","Ontvangen doe je met handen naar binnen, richting borst — geven met handen naar buiten, richting de ander.","Gooi de bal door de cirkel — focus op de persoon, niet op de richting.","Opbouwen in tempo. Echt richten — niet generaliseren."],tg:["opwarming","contact"],tip:"Wie generaliseert gooit nergens heen — niemand weet de bal te vangen. Dat is ook een sociale les: aandacht is gericht, niet verspreid.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Slow motion boksen",t:"Lichaamswerk / scènetraining",d:"15–20 min",g:"6–30 p.",o:"Boksen in uiterste slow motion — zonder aanraken. De spanning zit in de verbeelding, niet in de kracht.",s:["Tweetallen met voldoende ruimte. Alles is toegestaan — maar alleen in slow motion en zonder aanraken.","Beweeg zo langzaam mogelijk. Kijk naar de ander. Laat de verbeelding werken.","Joker breidt uit: iedereen kan iedereen aanvallen vanuit alle hoeken van de ruimte.","Afsluiten met een zachte variant — aanrakingen van genegenheid, even langzaam."],tg:["lichaam","scène","verbeelding","beweging"],tip:"Dit is de basis voor het veilig spelen van geweld in Forum Theater. De spelregel — slow motion, geen aanraking — beschermt iedereen, ook tijdens interventies.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Bouw een object",t:"Opwarming / creativiteit",d:"5–10 min",g:"8–30 p.",o:"Als groep in stilte en zo snel mogelijk een object bouwen met lichamen.",s:["Cirkel. Joker roept een object: telefoon! Auto! Kleerhanger!","Zonder te spreken vormt de groep het object met hun lichamen — zo snel mogelijk.","Joker roept de volgende. Tempo opbouwen.","Variatie: objecten die verband houden met het thema van de workshop."],tg:["improvisatie","ensemble","lichaam"],tip:"Denken buiten de grenzen van het voor de hand liggende. Wie het object letterlijk nabootst mist de oefening — wie het idee van het object pakt, raakt het.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Vul de lege ruimte",t:"Opwarming / ruimtebewustzijn",d:"10–15 min",g:"8–40 p.",o:"De lege ruimtes tussen mensen en wanden altijd opvullen — nooit een lege plek laten.",s:["Iedereen loopt, ogen open. Wees bewust van de ruimtes tussen mensen en wanden.","Vul de lege ruimtes — als er een gat is, loop erheen.","Sneller. Wees voorzichtig — niet botsen. Nog sneller.","Bevries. In tweetallen, arm in arm — opnieuw ruimte vullen. Dan drietallen."],tg:["ruimte","opwarming","reflectie","ensemble"],tip:"Dit is een goede opening als de groep een nieuwe ruimte betreedt. De collectieve aanpassing aan een nieuwe ruimte is al een oefening in gemeenschappelijk reageren.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Kies een leider",t:"Observatie / macht",d:"10–15 min",g:"8–25 p.",o:"Wie is de leider die niemand aanwijst — en hoe gedraagt macht zich als niemand het weet?",s:["Cirkel. Iedereen ogen dicht. Joker kiest in stilte... niemand.","Ogen open. Joker: 'Wie denkt er dat hij/zij de leider is? Zoek het uit — geen geweld.'","Iedereen loopt door de ruimte, probeert anderen te volgen of af te leiden.","Tweede ronde: Joker kiest iedereen. Nu: leider, leid ze — zonder te praten."],tg:["macht","observatie","leiden","ensemble"],tip:"De eerste ronde onthult hoe mensen macht zoeken en toewijzen zonder dat er macht is. De tweede ronde onthult hoe macht voelt als iedereen het heeft.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Wissel personages",t:"Karakterontwikkeling / lichaamswerk",d:"20–30 min",g:"Even aantal p.",o:"Een zelf gecreëerd personage tweemaal overdragen — en dan terugvinden wie jij was.",s:["Iedereen creëert een personage via looppatroon, gebaar en klank (geen taal).","Loop door de ruimte. Ontmoet iemand — wissel personages door imitatie. Geen woorden.","Als de overdracht volledig is: loop verder als dit nieuwe personage.","Wissel nog een keer. Dan: zoek je originele personage terug."],tg:["personage","lichaam","identiteit"],tip:"Het personage dat je tweemaal 'door anderen is geweest' is altijd veranderd. Die verandering te benoemen is een oefening in hoe verhalen en macht door overdracht vervormen.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Vind de plek blind",t:"Zintuigen / ruimte",d:"5–10 min",g:"8–30 p.",o:"Een punt in de ruimte kiezen met open ogen — en er blindelings naartoe lopen.",s:["Iedereen staat op een eigen plek. Kies een punt zo ver mogelijk weg, op ooghoogte, geen meubels in de weg.","Ogen dicht. Ga erheen — zonder te spreken.","Als je iemand tegenkomt: ga er omheen, ogen blijven dicht.","Aankomen: ogen open. Ben je er?"],tg:["zintuigen","ruimte","blind","concentratie"],tip:"Een mooie opening voor blind werk. Het verankert de deelnemer in de ruimte en in zijn eigen lichaam vóór er andere mensen bij komen.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Geleide wandeling (blind)",t:"Zintuigen / vertrouwen",d:"15–20 min",g:"6–30 p.",o:"Een blinde partner via geluid door de ruimte leiden — steeds verder weg, tot hij/zij van heel ver 'thuiskomt'.",s:["Tweetallen. Bepaal samen een klank — geen mechanisch geluid, iets dat je met adem maakt.","Leider maakt de klank: blinde volgt. Geen klank = stop.","Na een tijdje: vier à vijf stappen afstand. Daarna zo ver mogelijk uit elkaar.","Leiders verspreiden zich door de ruimte en roepen blinden 'thuis'."],tg:["blind","vertrouwen","zintuigen"],tip:"Joker-tip: imiteer soms de klank van een leider om de blinde te 'stelen'. Dat verhoogt de focus op de subtiliteit van het geluid — en op wie je echt vertrouwt.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blind knuffelen",t:"Zintuigen / contact",d:"10–15 min",g:"Even aantal p.",o:"Blind door de ruimte lopen — iedereen die je tegenkomt respectvol omhelzen.",s:["Even aantal. Iedereen een eigen plek. Ogen dicht, handen langs de zij of over de borst.","Loop in stilte. Als je iemand tegenkomt: geef een zachte, respectvolle omhelzing.","Ga na een paar omhelzingen één houden — en leer die omhelzing kennen.","Op signaal: twee stappen terug — vind dezelfde omhelzing opnieuw. Vijf stappen. Zover mogelijk."],tg:["contact","blind","aanraking","vertrouwen"],tip:"Elk stel vindt elkaar op een andere manier terug. Sommigen via geur, lichaamslengte, warmte. Dat is het gesprek na de oefening — hoe herken jij een ander?",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blind sculptuur",t:"Zintuigen / image theater",d:"15–20 min",g:"Even aantal p.",o:"Een bevroren beeld voelen met gesloten ogen — en het nabootsen met het eigen lichaam.",s:["Twee rijen tegenover elkaar, tien meter apart. Rij A sluit de ogen.","Rij B maakt een hou bare lichaamshouding. Ze roepen hun partners bij naam.","Rij A loopt blind op de stem af — voelt de houding van partner: handen, gezicht, voeten.","Als het beeld volledig gevoeld is: rij A keert terug en maakt een spiegelende kopie."],tg:["blind","zintuigen","image theater","aanraking"],tip:"Variatie: rij B raakt elkaar ook aan zodat ze een groepsbeeldt vormen — rij A moet niet alleen de partner maar het hele beeld aftasten en reproduceren.",bron:"Theatre for Living",fase:"opwarming",niv:2,eng:"laag"},
  {b:"zintuigen",n:"Elektrische stroom",t:"Zintuigen / concentratie",d:"5–10 min",g:"8–40 p.",o:"Een handdruk-puls de cirkel rondsturen — in beide richtingen, dan met ogen dicht en meerdere pulsen tegelijk.",s:["Cirkel, handen vast kruiselings (over de voorkant). Joker stuurt een puls: een handdruk die rondgaat.","En de andere kant op. Luister.","Ogen dicht: joker stuurt meerdere pulsen tegelijk. Laat ze niet stoppen in jou.","Sneller."],tg:["zintuigen","concentratie","contact","ensemble"],tip:"Wie een puls 'inslikt' breekt de stroom. Dat is voelbaar — en precies de oefening: niet ophopen, maar doorgeven.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"De darm",t:"Vertrouwen / lichaamswerk",d:"15–20 min",g:"Min. 20 p.",o:"Door een menselijke tunnel dragen worden — een collectieve vertrouwenservaring in stilte.",s:["Twee rijen tegenover elkaar, dicht bijeen, armen voor en in elkaar gevlochten. Een conveyor belt.","Absolute stilte. Vrijwilliger staat met de rug naar de opening, armen gekruist.","De joker tilt de voeten op. De rijen dragen de persoon door de tunnel, hoofd altijd ondersteund.","Aan het eind wordt de persoon voorzichtig overeind geholpen."],tg:["vertrouwen","lichaam","ensemble","stilte"],tip:"Stilte is niet onderhandelbaar. Één fluistering breekt de meditatieve kwaliteit. De persoon die erdoor gaat ervaart het als een initiatiereis.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"Vang me",t:"Vertrouwen / durf",d:"10–15 min",g:"10–30 p.",o:"Blind rennen op een groep af — en erop vertrouwen dat tien mensen je opvangen.",s:["Tien tot twaalf mensen aan één kant van de ruimte, armen uitgestrekt, handpalmen naar voren.","Één persoon staat aan de andere kant, neemt een richting, sluit de ogen.","Runt zo hard als ze durft — armen langs het lichaam of over de borst, hoofd omhoog.","De groep 'absorbeert' haar."],tg:["vertrouwen","gevoel","blind","ensemble"],tip:"Niet de snelheid is het doel — het durven loslaten is het doel. Hoe sneller iemand rent, hoe meer vertrouwen ze hebben.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"Groepsloop",t:"Vertrouwen / lichaamswerk",d:"15–20 min",g:"8–25 p.",o:"Op de handen van de groep klimmen en worden gedragen — de groep als vloer.",s:["Vrijwilliger trekt schoenen uit. De groep staat rondom hem — aan alle kanten.","Hij heft een voet op: handen komen eronder. Dan een hand: handen komen eronder.","Langzaam klimt hij omhoog — de groep draagt hem overal naartoe.","Als hij een rol wil maken: de groep beweegt mee om hem te ondersteunen."],tg:["vertrouwen","lichaam","ensemble","contact"],tip:"De walker moet zijn gewicht spreiden — niet rechtop staan. De groep leert zo om collectief verantwoordelijkheid te dragen voor één lichaam.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"lichaam",n:"Darling, wil je glimlachen?",t:"Plezier / concentratie",d:"5–10 min",g:"8–30 p.",o:"Iemand aan het lachen krijgen zonder te lachen — simpel en bijna onmogelijk.",s:["Cirkel. Wie 'het' is gaat naar iemand toe, gaat zo dicht mogelijk bij hem/haar zitten.","Zegt: 'Schat, als je van me houdt, glimlach dan alsjeblieft.'","De ander antwoordt drie keer: 'Schat, je weet dat ik van je hou — maar ik kan niet glimlachen.'","Wie toch lacht is de volgende."],tg:["plezier","concentratie","gevoel","contact"],tip:"De kracht zit in de ernst waarmee het spel gespeeld wordt. Wie het probeert te forceren verliest direct. Wie het laat komen verliest ook direct. Er is geen strategie.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Vos in het hol",t:"Plezier / energie",d:"10–15 min",g:"10–40 p.",o:"Hond jaagt vos — vos is veilig als hij een hol inloopt, maar dat zet de achterkant eruit.",s:["Tweetallen staan door de ruimte verspreid, handen vast, armen als een O — dit is een 'hol'.","Joker kiest een hond en een vos. Hond jaagt vos. Vos is veilig als hij in een hol duikt.","De persoon tegenover de vos wordt de nieuwe vos en moet vluchten.","Als de hond een vos tagt: wisselen ze rollen."],tg:["opwarming","plezier"],tip:"Groepen van alle leeftijden spelen dit eindeloos. Het is ook één van de weinige spellen die écht beter wordt hoe vaker het gespeeld wordt.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Buiken",t:"Afsluiting / plezier",d:"10–15 min",g:"8–40 p.",o:"Met je hoofd op iemands buik liggen — en wachten tot iemand begint te lachen.",s:["Één persoon ligt op de rug. De tweede legt zijn hoofd op de buik van de eerste, haaks erop.","De derde legt zijn hoofd op de buik van de tweede. Enzovoort — een keten.","Als iedereen ligt: adem samen. Praat niet.","Na een tijdje begint iemand te lachen — en dan gaat de golf. Wave after wave."],tg:["lichaam","contact"],tip:"Dit is een techniek voor spanningstechnische ontlading na intensief werk. Je hoeft er niets voor te doen — het lichaam doet het vanzelf.",bron:"Theatre for Living",fase:"opwarming",niv:1,eng:"middel"},
  {b:"geheugen",n:"Autosculpteren",t:"Beeldentheater / scèneontwikkeling",d:"30–45 min",g:"8–25 p.",o:"Iedereen maakt een lichaamsvorm van zijn sterkste emotie in een persoonlijk conflict — en groepen vormen zich op basis van herkenning.",s:["Iedereen ligt in een cirkel, hoofden naar binnen, ogen dicht. Denk aan een persoonlijk moment van struggle.","Wat is de sterkste emotie in dat moment? Maak er een vorm van in je hoofd.","Op een klap: sta op met gesloten ogen en maak die vorm met je hele lichaam.","Ogen open: zoek vormen die op de jouwe lijken. Groepen vormen zich op basis van herkenning."],tg:["image theater","gevoel","scène","gemeenschap"],tip:"De groepen die ontstaan zijn niet willekeurig — ze zijn emotioneel verwant. Die verwantschap is het materiaal voor scèneontwikkeling.",bron:"Theatre for Living",fase:"repetitie",niv:2,eng:"middel"},
  {b:"beeld",n:"Beeld in dans",t:"Animatietechniek / expressie",d:"25–35 min",g:"6–20 p.",o:"Een bevroren beeld transformeren naar beweging via innerlijk geluid en ritme.",s:["Een beeld staat stil. Elk personage doet een innerlijke monoloog — wie zijn ze in dit moment?","Joker vraagt: wat is de essentie van dit personage — een dier, een element, een geluid?","Laat het geluid en ritme van binnen opbouwen — niet tonen, nog niet.","Op een klap: laat het naar buiten. Het beeld wordt dans en geluid."],tg:["image theater","gevoel"],tip:"Het resultaat is ruwe beweging verbonden aan narratief. Het kan worden gechorografeerd tot gemeenschapsdans. Dit is niet artistiek theater — het is lichamelijke analyse.",bron:"Theatre for Living",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"beeld",n:"Stap in de toekomst",t:"Animatietechniek / scèneanalyse",d:"15–25 min",g:"4–20 p.",o:"Een beeld een of twee stappen verder in de crisis laten gaan — om te begrijpen waar het naartoe beweegt.",s:["Beeld staat stil. Elk personage weet wat het wil.","Op opeenvolgende klappen — elke klap is één bevroren stap — beweeg richting je verlangen.","Je kunt niet praten maar je kunt de ander aanraken.","Joker stopt: wat zien we nu? Hoe ver zijn we van de crisis af?"],tg:["image theater","scène","verlangen"],tip:"Hetzelfde kan in omgekeerde richting — stap in het verleden — om te begrijpen hoe de situatie is ontstaan. Verleden en toekomst in hetzelfde beeld.",bron:"Theatre for Living",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"forum",n:"Ideaal beeld",t:"Animatietechniek / Forum Theater",d:"20–30 min",g:"6–20 p.",o:"Iemand uit het publiek hersculptureert een onderdrukkingsbeeld naar het ideale — en de acteurs proberen er te komen terwijl ze in karakter blijven.",s:["Een oendrrukkingsbeeld staat stil.","Joker vraagt: wie heeft een idee hoe dit eruitziet als de onderdrukking is doorbroken? Kom en hersculpteer.","Acteurs keren terug naar het originele beeld en proberen op opeenvolgende klappen het ideaalbeeld te bereiken.","Ze blijven trouw aan hun personage — ze mogen het ideaal niet bereiken als dat niet past bij wie ze zijn."],tg:["forum theater","image theater","transformatie"],tip:"De weg van huidig naar ideaal is het forum. Niet het einddoel — de reis. Observeer wie beweegt, wie tegenwerkt, en wat er nodig is voor elke stap.",bron:"Theatre for Living",fase:"forum",niv:3,eng:"middel"},
  {b:"forum",n:"Analyseer naar stijl",t:"Repetitietechniek",d:"15–20 min",g:"4–20 p.",o:"Een scène spelen in één extreme stijl — clowns, opera, soap — om verborgen relaties en subtekst bloot te leggen.",s:["Een scène is gebouwd en gerepeteerd.","Joker kiest een stijl: clowns, soapopera, Japans theater, stomme film.","De scène wordt gespeeld in die stijl — letterlijk, zo ver als het kan.","Terug naar normaal: wat heb je ontdekt?"],tg:["personage","forum theater"],tip:"Stijl bevrijdt de acteur van zijn gewoontes. De ongewone stijl onthult wat in de normale uitvoering verborgen blijft — relaties, machtsverhoudingen, ironie.",bron:"Theatre for Living",fase:"repetitie",niv:3,eng:"middel"},
  {b:"forum",n:"Tegengestelde gedachte",t:"Repetitietechniek / acteertraining",d:"15–20 min",g:"4–20 p.",o:"Een tekst spelen met de tegengestelde innerlijke gedachte — en ontdekken dat het lichaam nooit liegt.",s:["Scène is gerepeteerd. Elk personage kent zijn tekst.","Joker geeft elk personage een innerlijke gedachte die het tegenovergestelde is van wat hij/zij zegt.","Speel de scène — tekst hetzelfde, innerlijk omgekeerd.","Nabespreking: wat veranderde er? Wat werd zichtbaar?"],tg:["personage","innerlijk"],tip:"Dit onthult dat het lichaam altijd de innerlijke toestand communiceert — ongeacht de tekst. Acteurs leren dat hun echte werk in de onderstroom zit, niet in de woorden.",bron:"Theatre for Living",fase:"repetitie",niv:1,eng:"laag"},
  {b:"forum",n:"Improviseer met je familie",t:"Karakter / scèneontwikkeling",d:"25–35 min",g:"8–25 p.",o:"Een personage creëren — en op basis van herkenning een 'familie' vormen met anderen.",s:["Iedereen bedenkt een personage: een schurk, een held, een archetype — relevant aan het thema.","Loop als dit personage, voeg een gebaar en klank toe.","Loop door de ruimte: herken je een ander als 'familie'? Loopt samen.","In kleine groepjes: introduceer je personage, bespreek zijn/haar verlangens en angsten. Maak dan een scène."],tg:["personage","scène","ensemble","improvisatie"],tip:"De 'families' die zich vormen onthullen hoe mensen categoriseren. De improvisaties die uit familiesdynamieken ontstaan zijn altijd rijker dan individuele karakterkeuzes.",bron:"Theatre for Living",fase:"repetitie",niv:2,eng:"middel"},
  {b:"vertrouwen",n:"Zatte fles",t:"Vertrouwen / evenwicht",d:"5 min",g:"Onbeperkt",o:"De eigen fysieke grenzen verkennen — zo ver mogelijk leunen zonder te vallen.",s:["Sta rechtop, hielen tegen elkaar, voeten licht naar buiten. Lichaam als een rechte plank.","Leun zo ver mogelijk naar voren — terugkomen. Dan achterwaarts.","Voor, achter, voor, achter — steeds verder, de grenzen aftasten.","Daarna ook zijwaarts. Nooit vallen — altijd herstellen."],tg:["vertrouwen","evenwicht","lichaam"],tip:"Een goede start van een vertrouwensreeks. Iedereen doet het alleen, voor zichzelf — geen publiek, geen prestatie. Doe zelf mee als joker.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Haag van het vertrouwen",t:"Vertrouwen / durf",d:"10–15 min",g:"10–30 p.",o:"Zo snel mogelijk door twee rijen heen rennen — die pas op het laatste moment opengaan.",s:["Twee rijen tegenover elkaar, armen gestrekt, handen gevouwen met de persoon tegenover zich.","Vrijwilliger staat ver weg en rent zo snel als hij durft op de haag af.","De haag opent pas op het allerlaatste moment — net op tijd.","Wie durft, mag. Variatie: blind rennen als het vertrouwen groot genoeg is."],tg:["vertrouwen","gevoel","ritme"],tip:"De haag opent te vroeg = geen spanning. Te laat = gevaar. Oefen het timing van de haag vóór de eerste deelnemer rent.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"hoog"},
  {b:"vertrouwen",n:"De Griek",t:"Vertrouwen / samenwerking",d:"15–20 min",g:"8–20 p.",o:"De Griek maakt bewegingen — de groep biedt voortdurend fysieke ondersteuning aan elk lichaamsdeel.",s:["Één vrijwilliger is de Griek, staat met zeven à acht mensen eromheen.","De Griek initieert elke beweging — de groep ondersteunt elk lichaamsdeel dat gewicht geeft.","In de lucht lopen, op de rug liggen, zij aan zij hangen — alles is mogelijk.","De groep blijft voortdurend in fysiek contact en wisselt constant van ondersteuning."],tg:["vertrouwen","ensemble","aanraking","lichaam"],tip:"De Griek bepaalt — de groep volgt. Niet andersom. Als de groep begint te sturen verliest de Griek zijn autonomie. Dat is het moment om te stoppen.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"Stoel met persoon optillen",t:"Vertrouwen / samenwerking",d:"5–10 min",g:"6–20 p.",o:"Iemand op een stevige stoel zo zwaar mogelijk maken — en dan toch optillen.",s:["Één persoon zit op een stevige stoel (geen klapstoel). Denkt zijn gewicht naar beneden, de grond in.","Vijf à zes deelnemers om de stoel heen — tillen samen zo hoog mogelijk op.","Rustig neerzetten — in slow motion.","Variatie: de persoon op de stoel kan proberen het tillen te bemoeilijken of juist mee te helpen."],tg:["vertrouwen","ensemble","lichaam","contact"],tip:"Verrassend hoe zwaar iemand kan worden als ze zich mentaal verzwaren. En hoe licht als ze meewerken. Dat verschil is het gesprek na de oefening.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"De Val",t:"Vertrouwen / overgave",d:"10–15 min",g:"8–20 p.",o:"Op de grond gaan liggen en door zeven mensen worden opgetild tot boven hun hoofden.",s:["Zeven mensen: drie aan elke zijde + één bij het hoofd. Handpalmen omhoog onder schouders, onderrug, knieholte.","Op '3-2-1-ja!' tillen ze tegelijk op — de persoon zweeft boven de hoofden.","Even vasthouden, dan snel omlaag en rustig neerleggen.","Iedereen die wil, kan een beurt."],tg:["vertrouwen","contact","ensemble","stilte"],tip:"Doe dit in absolute stilte. Het zweefgevoel is het meest intens als er geen woorden zijn. Wie dit eenmaal heeft meegemaakt vergeet het nooit.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"laag"},
  {b:"vertrouwen",n:"Pinguïn",t:"Zintuigen / vertrouwen",d:"10–15 min",g:"8–30 p.",o:"Jouw pinguïnmoeder terugvinden in een kakofonie van geluiden — terwijl je zelf ook een moedergeluid maakt.",s:["Cirkel. Iedereen bedenkt een eigen geluid. Onthoud het geluid van je rechterbuur — dat is je moeder.","Joker laat iedereen zijn geluid horen. Geen twee geluiden hetzelfde.","Ogen dicht, verspreid door de ruimte. Iedereen maakt zachtjes zijn eigen geluid én zoekt het moedergeluid.","Als je je moeder gevonden hebt: ga links van haar staan. De cirkel herstelt zich."],tg:["zintuigen","gehoor","vertrouwen","ensemble"],tip:"De kakofonie is de oefening — niet het vinden. Wie te snel zoekt verliest zijn eigen geluid. Wie zijn eigen geluid verliest is zijn identiteit kwijt.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"vertrouwen",n:"De poorten van verleiding",t:"Zintuigen / vertrouwen",d:"15–20 min",g:"12–30 p.",o:"Blinden worden verleid door poorten — de poorten met de meeste punten winnen.",s:["Helft vormt poorten (handen hoog aaneen). Elke poort bedenkt drie geluiden: gevaar, verleiding, overwinning.","Andere helft loopt blind. Poorten proberen blinden te verleiden met hun verleidingsgeluid.","Als een blinde door de poort loopt: overwinningsgeluid en punt. Bij gevaar: gevaargeluid.","Na afloop rollen wisselen, nieuwe geluiden verzinnen."],tg:["zintuigen","vertrouwen","gehoor","competitie"],tip:"De geluiden moeten écht van elkaar verschillen — controleer dit vóór het spel begint. Een poort die haar eigen overwinningsgeluid vergeet heeft een probleem.",bron:"Formaat",fase:"vertrouwen",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Drie lichtflitsen voor de blinde",t:"Zintuigen / geheugen",d:"10–15 min",g:"6–25 p.",o:"Drie korte momenten zien — en daarna reconstrueren waar je bent geweest.",s:["Tweetallen. Blinde wordt naar drie plekken in de ruimte geleid.","Op elke plek: ogen heel even open — dan weer dicht.","Na de drie plekken: blinde probeert te raden waar hij is geweest.","Variatie: ook de route reconstrueren die hij heeft afgelegd."],tg:["zintuigen","geheugen","vertrouwen","blind"],tip:"Korte momenten van zien zijn rijker dan lang kijken. De fragmenten dwingen het brein om te reconstrueren — dat is de oefening.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blinde op vakantie",t:"Zintuigen / verbeelding",d:"10–15 min",g:"6–25 p.",o:"Een vakantie beleven met gesloten ogen — de begeleider creëert de hele ervaring fysiek.",s:["Tweetallen. Blinde heeft ogen dicht. Begeleider neemt mee op vakantie.","Geen woorden — wel geluiden. Kanoën (zit samen, roei), disco (beweeg samen), strand (lig neer).","Minimaal drie activiteiten. Dan: blinde opent ogen en vertelt wat hij dacht te hebben gedaan.","Rollen wisselen."],tg:["zintuigen","verbeelding","vertrouwen","blind"],tip:"Hoe concreter en fysieker de begeleider de omgeving maakt, hoe rijker de reconstructie. Een goede begeleider denkt als regisseur.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Blinde leiden met één vinger",t:"Zintuigen / vertrouwen",d:"10–15 min",g:"6–25 p.",o:"Iemand blind leiden met niet meer dan één vinger — een gedeelde taal uitvinden zonder woorden.",s:["Tweetallen spreken af wie leidt, wie blind is.","Leider raakt blinde aan met één vinger en ontwikkelt daarmee een taal: start, stop, links, rechts.","Geen woorden. De taal ontstaat vanzelf uit de beweging.","Terugkeren naar het speelvlak. Rollen wisselen."],tg:["zintuigen","vertrouwen","beweging","taal"],tip:"De taal die twee mensen samen uitvinden met één vinger is altijd uniek. Vertel achteraf wat elk signaal betekende — dat gesprek is even rijk als de oefening.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Blinde leiden met geluiden",t:"Zintuigen / gehoor",d:"10–15 min",g:"6–25 p.",o:"Een blinde navigeren via twee afgesproken geluiden — temidden van de geluiden van alle andere koppels.",s:["Tweetallen spreken twee geluiden af: één voor lopen, één voor stoppen.","Joker controleert: geen twee koppels met hetzelfde geluid.","Iedereen werkt tegelijk — de blinden navigeren in een kakofonie.","Begeleiders mogen steeds meer afstand nemen. Rollen wisselen."],tg:["zintuigen","gehoor","vertrouwen","blind"],tip:"De kakofonie is essentieel — anders is het te makkelijk. Hoe meer afstand de begeleider neemt, hoe meer vertrouwen in het eigen gehoor.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Wek de beer",t:"Opwarming / competitie",d:"10–15 min",g:"8–30 p.",o:"De slapende beer plagen zonder geraakt te worden als hij wakker wordt.",s:["Één deelnemer is de beer — ligt achter een lijn op zijn buik te slapen.","De rest staat achter een andere lijn. Tussen de lijnen: het speelveld.","Deelnemers komen de beer plagen. Als iemand de beer op het achterwerk slaat, wordt hij wakker.","Iedereen vlucht naar de veiligheidslijn. Wie getikt wordt is de nieuwe beer."],tg:["opwarming","competitie","plezier"],tip:"Hoe langer iemand durft te plagen, hoe spannender. De beer mag geen valstart maken — dat eerlijkheidsprincipe maakt of breekt het spel.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Katten en honden",t:"Opwarming / competitie",d:"10–15 min",g:"10–30 p.",o:"Twee rijen tegenover elkaar — bij het roepen van je team ren je je partner achterna.",s:["Twee rijen tegenover elkaar, twee meter tussenruimte. Ene rij honden, andere katten.","Iedereen heeft een partner direct tegenover zich.","Joker roept 'Honden!' — honden tikken hun kattenpartner vóór ze de veiligheidslijn bereiken.","Joker roept 'Katten!' — katten tikken. Wie tikt: punt voor zijn team."],tg:["opwarming","competitie","ritme"],tip:"Varieer het ritme — lang wachten, snel roepen, een vergelijkbaar woord zeggen. Daar wordt de groep wakker van.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Stoelendans",t:"Opwarming / muziek",d:"10–15 min",g:"8–30 p.",o:"Het klassieke stoelendans — muziek stopt, iedereen zoekt een stoel, wie er zonder staat valt af.",s:["Stoelen in een cirkel, zitting naar buiten. Één stoel minder dan deelnemers.","Muziek speelt. Als de muziek stopt: zo snel mogelijk een stoel.","Wie geen stoel vindt: valt af. Één stoel weg. Opnieuw.","Winnaar is de laatste die een stoel veroverde."],tg:["opwarming","muziek","competitie"],tip:"Variatie: wie afvalt wordt dirigent en bepaalt wanneer de muziek stopt. Zo blijft iedereen betrokken.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Tikkertje",t:"Opwarming / energie",d:"10–15 min",g:"8–40 p.",o:"Het universele tikkertje — met tientallen varianten voor elk moment in het proces.",s:["Iemand is tikker. Wie getikt wordt is de nieuwe tikker.","Basisvarianten: slingertje (pak de hand van de tikker), jaagtikkertje (ook tikker worden), versteentje (stil staan).","Veiligheidsvarianten: knieltje, knuffeltje (samen veilig), schildpadtje (op de rug liggen).","Joker kiest de variant die past bij de sfeer."],tg:["opwarming","plezier"],tip:"Tikkertje is nooit simpel — het is een systeem met regels en eerlijkheid. De variant die je kiest zegt iets over wat de groep op dat moment nodig heeft.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Vampier (blind)",t:"Opwarming / zintuigen",d:"10–15 min",g:"8–30 p.",o:"Iedereen loopt blind — één is vampier en bijt, waarna de ziekte zich verspreidt.",s:["Iedereen loopt blind door de ruimte. Joker kiest stilletjes één vampier.","Als de vampier iemand tegenkomt: beet met vampierkreet. Slachtoffer gilt en wordt vampier.","Optionele regel: twee vampiers die elkaar bijten genezen — zodat het langer duurt.","Einde: iedereen is vampier."],tg:["blind","opwarming","plezier"],tip:"Dit gaat over geluid en gevoel, niet over zien. De kreetsignalen zijn essentieel — oefen ze vóór het spel begint.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Vlaamse baseball",t:"Opwarming / competitie",d:"15–20 min",g:"12–30 p.",o:"Honkbal binnenshuis — bal gooien, drie hoeken bereiken, niet geraakt worden.",s:["Twee teams. Drie hoeken van de ruimte zijn honken. Vierde hoek: de werpers.","Eerste werper gooit de bal en rent naar het eerste honk. Veldspelers tikken hem met de bal.","Bereikt de werper alle drie de honken zonder geraakt te worden: punt.","Bal gevangen zonder stuiter: teams wisselen."],tg:["opwarming","competitie","beweging","ensemble"],tip:"Variatie: iedereen loopt in dezelfde vreemde loopstijl — krabbenloop, paardenloop. Dan wordt het een lichaamsoefening én een wedstrijd.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Pinkelen",t:"Concentratie / reactie",d:"10–15 min",g:"6–25 p.",o:"Vier commando's uitvoeren met de handen — maar alleen als het woord 'commando' erbij wordt gezegd.",s:["Kring. Iedereen trommelt met twee wijsvingers op de knieën — dit heet 'pinkelen'.","De baas geeft opdrachten: Pinkelen / Hol (handpalm omhoog) / Bol (handpalm omlaag) / Plat (handpalm dwars).","Opdracht is alleen geldig met 'commando' ervoor. Zonder dat woord: doorgaan met wat je deed.","Wie de foute opdracht uitvoert is af. Tempo opvoeren."],tg:["concentratie","opwarming"],tip:"De val zit in het ritme — een lange reeks correcte commando's gevolgd door één zonder het sleutelwoord. Wie op de automatische piloot zit trapt er altijd in.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Praatjesmaker",t:"Opwarming / concentratie",d:"10–15 min",g:"8–25 p.",o:"De praatjesmaker vertelt een verhaal — en op een afgesproken woord rent iedereen weg.",s:["Één speler staat in het midden met arm uitgestrekt. De anderen houden lichtjes een vinger vast.","De praatjesmaker vertelt een verhaal. Er is één afgesproken sleutelwoord — als dat valt: iedereen rent.","De praatjesmaker tikt iemand: die wordt de nieuwe praatjesmaker.","Variatie: het sleutelwoord wordt gewijzigd in het spel."],tg:["opwarming","concentratie","verhaal"],tip:"De beste praatjesmakers bouwen spanning op vóór het sleutelwoord. Wie goed vertelt controleert wanneer de groep vlucht.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Ratten en Raven",t:"Opwarming / competitie",d:"15–20 min",g:"12–30 p.",o:"Twee teams met nummers — als jouw nummer wordt geroepen, pak de wimpel uit de cirkel zonder die van jezelf te verliezen.",s:["Twee teams (Ratten en Raven) staan tegenover elkaar, genummerd. In het midden: een wimpel in een cirkel.","Joker roept een nummer — die twee hinkelen het speelveld in en proberen de wimpel te pakken.","Doel: wimpel naar eigen kamp brengen zonder eigen wimpel kwijt te raken.","Na verloop van tijd meerdere nummers tegelijk roepen."],tg:["opwarming","competitie","ensemble"],tip:"Hinkelen maakt het eerlijker en spannender dan rennen. De scheidsrechterrol van de joker is cruciaal — discussie over overtredingen breekt het spel.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"De liedjespolonaise",t:"Opwarming / groepsvorming",d:"10–15 min",g:"12–40 p.",o:"Groepjes van drie à vier kiezen een liedje en proberen andere stoeten te verleiden zich aan te sluiten.",s:["Groepjes van 3 à 4. Elk groepje kiest een liedje en maakt op een fragment een herhaalbaar bewegingspatroon.","Op het signaal van de joker: iedereen loopt zingend en bewegend in polonaise door de ruimte.","Opdracht: verleid anderen om bij jouw polonaise aan te sluiten. Wie een mooiere stoet ziet: mag overlopen.","Winnaar is de grootste polonaise aan het eind."],tg:["opwarming","ensemble","muziek"],tip:"Het gaat om verleiden, niet om winnen. Wie het grootst, vrolijkst en meest aanstekelijk is trekt mensen aan. Dat principe staat centraal in theater.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Kat en muis labyrint",t:"Opwarming / ruimte",d:"10–15 min",g:"12–30 p.",o:"De deelnemers vormen een labyrint — de kat jaagt op de muis door rijenwisseling.",s:["Iedereen staat in een rij- en kolomsysteem met uitgestrekte armen zijwaarts. Kat en muis rennen door de gangen.","Op een signaal draaien alle spelers een kwartslag — de gangen veranderen.","Kat mag de muis niet dwars door een rij snijden — alleen door de gangen.","Als de kat de muis tikt: nieuwe kat en muis."],tg:["opwarming","ruimte"],tip:"De joker bepaalt het moment van draaien. Te snel geeft de muis geen kans, te langzaam maakt het saai. Het ritme van de signalen is het regisseurwerk van de joker.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Kringklap",t:"Ritme / concentratie",d:"5–10 min",g:"8–30 p.",o:"Een klap doorgeven door de kring — bij twee klappen keert de richting om.",s:["Kring. Joker klapt en kijkt naar zijn buur — de klap gaat de kring rond.","Als iemand twee keer klapt: de richting keert om.","Opbouwen in tempo. Meerdere richtingen tegelijk als de groep er klaar voor is.","Joker kan vals knippen of stampen om verwarring te zaaien."],tg:["ritme","concentratie","oogcontact","opwarming"],tip:"Twee klappen zijn het bewuste teken — wie niet oplet mist het en breekt de kring. De kringklap traint oogcontact even goed als ritme.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"De tafel van zeven",t:"Concentratie / rekenen",d:"10–15 min",g:"8–25 p.",o:"Tellen in de kring — maar de zeven en veelvouden worden vervangen door een geluid.",s:["Kring. Tellen om beurten: 1, 2, 3, 4, 5, 6, biep!, 8...","'Biep' vervangt elk getal dat de zeven bevat of een veelvoud ervan: 7, 14, 17, 21, 27...","Wie een fout maakt: valt af of sterft theatraal. Dan begint de kring opnieuw bij 1.","Variatie: bij elke biep ook van telrichting wisselen."],tg:["concentratie","ritme","competitie"],tip:"De druk zit in de stijgende getallen. Rond de twintig en dertig maakt bijna iedereen fouten. Dat is het leukste moment — niet het begin.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Ik ga op reis",t:"Concentratie / geheugen",d:"10–15 min",g:"6–25 p.",o:"Steeds langere lijsten onthouden — en uitbeelden in plaats van alleen zeggen.",s:["Eerste persoon: 'Ik ga op reis en neem mee: een koffer.'","Elke volgende voegt één voorwerp toe en herhaalt de hele lijst.","Variatie: voorwerpen niet alleen noemen maar ook uitbeelden.","Doorgaan tot de lijst te lang wordt om te onthouden."],tg:["concentratie","geheugen","ritme","personage"],tip:"De uitbeeldingsvariant maakt het rijker — je kunt nu ook met je lichaam helpen herinneren. En de groep helpt mee als je twijfelt.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"zintuigen",n:"Associatiecirkel",t:"Concentratie / impuls",d:"10–15 min",g:"8–25 p.",o:"Een woord associëren en direct doorgooien — zo snel dat denken geen kans krijgt.",s:["Kring. Joker gooit een bal naar iemand en zegt een woord: 'Gras'.","Die persoon gooit direct verder en zegt het eerste dat opkomt: 'Groen', 'Oma', 'Maaien'.","Zo snel mogelijk — geen tijd voor correcte associaties.","Variant zonder bal: iemand aanwijzen in de kring."],tg:["concentratie","improvisatie","verbeelding"],tip:"De persoonlijke associaties zijn rijker dan de voor de hand liggende. Wie 'oma' zegt bij 'gras' heeft iets prijs gegeven. Dat is het materiaal.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"zintuigen",n:"Handen herkennen",t:"Concentratie / tastzin",d:"10–15 min",g:"6–20 p.",o:"Handen onderzoeken met gesloten ogen — en ze daarna herkennen als de volgorde is veranderd.",s:["Een rij mensen steekt de rechterhand naar voren. Vrijwilliger onderzoekt alle handen nauwkeurig — ring, structuur, grootte, behaardheid.","De rij wisselt in stilte van volgorde. De vrijwilliger probeert blindelings de namen te noemen bij de handen.","Variatie: ook ruggen of gezichten gebruiken.","Wisselen wie er blind is."],tg:["concentratie","zintuigen","aanraking"],tip:"Handen vertellen meer dan mensen denken. De erkende winnaar is wie het meest heeft gevoeld. De echte winnaar is wie het meest heeft geleerd over aanraken.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Statusoefening",t:"Spel / bewustwording",d:"15–20 min",g:"8–25 p.",o:"Een beroep of statusgetal op de rug — en ontdekken welke status je hebt door hoe anderen je begroeten.",s:["Memovellen met beroepen of nummers 0–10 op ieders rug geplakt — zonder dat ze het zelf weten.","Iedereen begroet iedereen — passend bij de status die ze zien op de rug van de ander.","Na afloop: ga op een rij staan in volgorde van de status die je dénkt te hebben.","Beroepen of nummers vergelijken. Wie zat er goed?"],tg:["status","macht","reflectie","identiteit"],tip:"De manier waarop mensen begroeten onthult meer over hun eigen aannames dan over de ander. Dat gesprek na de oefening is het meest waardevol.",bron:"Formaat",fase:"opwarming",niv:2,eng:"middel"},
  {b:"lichaam",n:"Status vanuit beelden",t:"Spel / image theater",d:"15–20 min",g:"6–20 p.",o:"Hoge en lage statusbeelden maken — en vanuit die beelden spelen en improviseren.",s:["Joker vraagt: maak een beeld van hoge status. Wat kenmerkt dat fysiek?","Dan: een beeld van lage status. Wat verandert er in het lichaam?","Vanuit de beelden: spelopdrachten. 'Ontslaa je medewerker', 'Groet de koning'.","Korte improvisaties: hoe gedraagt elke status zich in conflict?"],tg:["status","image theater","improvisatie","macht"],tip:"Status zit in kleine details — oogcontact, tempo, ruimtegebruik. Wie de grote gebaren zoekt mist de kern.",bron:"Formaat",fase:"opwarming",niv:2,eng:"middel"},
  {b:"lichaam",n:"Koning en knechten",t:"Spel / macht",d:"10–15 min",g:"6–20 p.",o:"De koning geeft opdrachten — de knechten voeren ze uit maar trekken gekke bekken zodra hij wegkijkt.",s:["Één persoon is de koning op een troon. Drie knechten eromheen.","Koning geeft opdrachten. Knechten voeren ze serieus uit.","Maar zodra de koning niet kijkt: raarste gezichten, grappigste gebaren — zonder betrapt te worden.","Wie betrapt wordt: afgezet. Nieuwe knecht nodig."],tg:["macht","improvisatie","plezier","status"],tip:"Het spel onthult hoe macht werkt — zelfs in een grappige context houden mensen zich aan de regels als de autoriteit kijkt. Dat is een Forummoment.",bron:"Formaat",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Geleide fantasie",t:"Spel / verbeelding",d:"15–25 min",g:"6–30 p.",o:"De joker vertelt een fantasieverhaal — de deelnemers spelen het direct, allemaal tegelijk.",s:["Joker vertelt een verhaal dat iedereen direct uitbeeldt: 'Je staat alleen in een groot bos. Het is koud...'","Plotwendingen worden toegevoegd — grommend geluid, een rivier, een monster.","Iedereen speelt alleen, tegelijk, in de eigen verbeelding.","De joker past de lengte en de plotwendingen aan de groep aan."],tg:["verbeelding","improvisatie","personage","verhaal"],tip:"Concreet en fysiek houden. Niet 'je voelt iets' maar 'je zet je voet in ijskoud water'. De fysieke specificiteit maakt het theater.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Hoeken van emotie",t:"Spel / acteren",d:"15–20 min",g:"8–30 p.",o:"Twee spelers lopen vanuit tegenoverliggende hoeken op elkaar af — elk met een eigen emotie — en wisselen die bij de begroeting.",s:["Groep verdeeld in twee. Elke hoek: iemand kiest in stilte een emotie.","Op teken van de joker lopen beiden vanuit hun hoek — zo groot mogelijk de emotie uitbeeldend.","Ze ontmoeten elkaar midvoor en begroeten elkaar vanuit hun emotie.","Bij de begroeting: nemen ze elkaars emotie geleidelijk over en lopen verder naar de andere groep."],tg:["gevoel","personage","improvisatie"],tip:"De overdracht van emotie bij de begroeting is het kernmoment. Laat de twee emoties even naast elkaar bestaan vóór de wisseling.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Podium vullen",t:"Spel / ruimtebewustzijn",d:"10–15 min",g:"8–30 p.",o:"De speelruimte altijd gelijkmatig bezetten — en de balans bewaren als op een schaal.",s:["Iedereen loopt over het afgebakende speelvlak. Joker wijst op gaten: 'Vul die ruimte!'","Later: stel je voor dat er een grote bal onder het midden ligt die het podium doet kantelen.","Deelnemers daagen elkaar uit door de balans te verstoren — maar bewaren hem als groep.","Variatie voor Forum-acteurs: bewustwording van clusteren rondom een inspringer."],tg:["ruimte","ensemble","reflectie"],tip:"Dit is ook een voorbereiding op forumtheater. Acteurs die de neiging hebben te clusteren leren hier dat het podium een gezamenlijke verantwoordelijkheid is.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"forum",n:"Dialoog",t:"Dynamiseringstechniek",d:"15–25 min",g:"4–20 p.",o:"Een bevroren beeld laten spreken — personages gaan een dialoog aan vanuit hun beeldhouding.",s:["Een compositiebeeld staat stil. Elk personage heeft een innerlijke monoloog gedaan.","Op teken van de joker: de personages beginnen te praten — vanuit de houding waarin ze staan.","Ze mogen bewegen als de tekst dat vraagt — maar vertrekken altijd vanuit het beeld.","Joker kan stoppen: 'Bevries!' — nieuw beeld. Wat is er veranderd?"],tg:["image theater","taal","improvisatie"],tip:"De houding stuurt de tekst — niet andersom. Wie eerst bedenkt wat hij wil zeggen verliest de oefening. Wie vanuit het lichaam spreekt vindt de waarheid van het personage.",bron:"Formaat",fase:"repetitie",niv:2,eng:"middel"},
  {b:"forum",n:"Slow slow motion",t:"Repetitietechniek",d:"10–15 min",g:"4–20 p.",o:"Een scène spelen in extreme slow motion — om te ontdekken wat er normaal te snel gaat.",s:["Scène is gerepeteerd. Joker roept: 'Slow slow motion.'","Alles vertraagt tot het uiterste — elke beweging, elke syllabe.","Joker observeert: welke momenten worden nu zichtbaar die normaal te snel gaan?","Daarna normaal tempo. Wat is er veranderd?"],tg:["personage","beweging","analyse"],tip:"Slow motion is geen truc — het is een analyse-instrument. De spanning die in slow motion zichtbaar wordt was er altijd al. Nu kan iedereen het zien.",bron:"Formaat",fase:"repetitie",niv:2,eng:"middel"},
  {b:"forum",n:"Vervreemden",t:"Repetitietechniek / Brecht",d:"15–25 min",g:"4–20 p.",o:"Een scène vervreemden — acteurs stappen in en uit het personage en beschrijven wat er gebeurt.",s:["Scène loopt. Op een teken van de joker: de acteur stapt uit zijn personage.","Beschrijft in derde persoon wat hij doet: 'Hij loopt naar de deur. Hij wil weggaan maar kan niet.'","Dan weer in de scène. Dan weer eruit.","Variatie: acteurs spelen ook elkaars personage — tegelijk of afwisselend."],tg:["personage","analyse"],tip:"Dit is Brechts Verfremdungseffekt in de praktijk. Het doel is niet afstand — het is een andere soort nabijheid: de analytische nabijheid van de waarnemer.",bron:"Formaat",fase:"repetitie",niv:2,eng:"middel"},
  {b:"afsluiting",n:"De klap",t:"Afsluiting / energie",d:"2 min",g:"Onbeperkt",o:"De bijeenkomst afsluiten met één gezamenlijke klap — timen zonder afspraak.",s:["Iedereen staat in een kring.","De opdracht: klap tegelijk één keer in de handen — zonder aftellen, zonder signaal, alleen op gevoel.","Herhaal tot de kring echt als één lichaam klapt.","Soms duurt het lang, soms gaat het meteen."],tg:["ensemble","opwarming"],tip:"Het moment waarop een groep echt samen klapt is onmiskenbaar — niet bijna tegelijk, maar echt samen. Dat moment voelt anders dan alle voorgaande. Benoem dat.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"hoog"},
  {b:"afsluiting",n:"Eén tot tien",t:"Afsluiting / concentratie",d:"5–10 min",g:"6–20 p.",o:"Als groep tellen van 1 tot 10 — niemand mag tegelijk spreken, niemand weet wie er wanneer spreekt.",s:["Kring. Iedereen heeft ogen open of dicht.","Iemand begint: zegt '1'. Dan een ander: '2'. Niemand weet wie er spreekt — niet afspreken.","Als twee mensen tegelijk zeggen: opnieuw beginnen bij 1.","Doel: 10 bereiken."],tg:["concentratie","ensemble","stilte"],tip:"Groepen die goed samenwerken komen tot 10. Groepen die het moeilijk hebben bereiken 3 en beginnen telkens opnieuw. De oefening is een diagnose van de groepscohesie.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"kennismaking",n:"Drie verschillen en drie overeenkomsten",t:"Kennismaking / observatie",d:"10–15 min",g:"6–30 p.",o:"Met een vreemde drie verschillen en drie overeenkomsten zoeken — alleen op basis van wat je ziet.",s:["Tweetallen met iemand die je nog niet goed kent.","Zoek drie overeenkomsten — alleen op basis van wat zichtbaar is. Geen vragen stellen.","Zoek drie verschillen — ook alleen op basis van wat je ziet.","Deel met de grote groep: wat viel je op?"],tg:["observatie","kennismaking","concentratie"],tip:"'Alleen op basis van wat zichtbaar is' is de kernregel. Niet vragen — kijken. Wie begint te praten heeft al verloren. Dit traint de acteursvaardigheid bij uitstek.",bron:"Formaat",fase:"opening",niv:1,eng:"middel"},
  {b:"kennismaking",n:"Sorry ik ben je naam vergeten",t:"Kennismaking / namen",d:"5–10 min",g:"8–30 p.",o:"Namen leren door te oefenen hoe je het vraagt als je ze vergeten bent.",s:["Joker introduceert: soms vergeet je de naam van iemand die je al kent. Hoe vraag je het dan?","Iedereen zegt zijn naam. Dan: iedereen vergeet iedereen.","Loop door de ruimte. Ontmoet iemand, doe alsof je hun naam bent vergeten — vraag het vriendelijk.","Variatie: de ander vertelt niet meteen — geeft eerst drie hints."],tg:["kennismaking","gemeenschap","humor"],tip:"Deze oefening normaliseert het vergeten van namen — dat is een sociale vaardigheid, geen fout. Wie dit heeft geoefend vraagt het daarna makkelijker.",bron:"Formaat",fase:"opening",niv:1,eng:"hoog"},
  {b:"kennismaking",n:"Namenuitwisseling",t:"Kennismaking / namen",d:"5–10 min",g:"8–30 p.",o:"Namen doorgeven door de kring — steeds de naam van de ander aannemen.",s:["Kring. Joker begint: 'Ik ben Luc.'","Buurpersoon: 'Jij was Luc, ik ben Sara.' — en neemt de naam Luc over.","Volgende: 'Jij was Sara (die Luc was), ik ben Ahmed.' — neemt Sara over.","Namen schuiven door de kring."],tg:["kennismaking","geheugen","concentratie"],tip:"De concentratie zit in het bijhouden wie nu welke naam draagt. Halverwege de kring weet niemand meer hoe het begon. Dat is het punt.",bron:"Formaat",fase:"opening",niv:1,eng:"laag"},
  {b:"lichaam",n:"Ruimtewandeling",t:"Aanwezigheid / ruimte",d:"10–15 min",g:"Onbeperkt",o:"De ruimte als tastbare substantie verkennen — aanwezig zijn in het lichaam, in de ruimte, in het moment.",s:["Iedereen loopt door de ruimte. Joker: 'De lucht om je heen is niet leeg — het is een substantie die je nog niet kent.'","Beweeg er doorheen: niet als water, niet als modder, maar als iets totaal nieuws. Laat het lichaam ontdekken.","Side-coach: 'Laat wat je ziet, jou zien. Voel de ruimte voor je, achter je, boven je.'","Variatie: tempo veranderen, de substantie verdichten of verdunnen via coaching."],tg:["ruimte","aanwezigheid","zintuigen"],tip:"Dit is de meest fundamentele oriëntatieoefening van Spolin. Gebruik het als opening van élke sessie. De side-coaching is het instrument — niet de oefening zelf.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Ruimte-objecten",t:"Verbeelding / zintuigen",d:"15–20 min",g:"4–20 p.",o:"Imaginaire objecten fysiek reëel maken — gedeeld begrip als theater.",s:["Spelers werken individueel: handen vormen een object dat ze vast lijken te houden. Gewicht, grootte, temperatuur.","Ze bewegen door de ruimte met hun object — geven het door aan een ander.","De ontvanger 'ziet' het object en werkt ermee verder — ook al is er niets.","Groepswerk: samen een zwaar object dragen, een deur openen, een bal overgooien."],tg:["ruimte","verbeelding","ensemble"],tip:"Het gedeelde geloof in het object ís het theater. Wie twijfelt breekt het voor iedereen. Coaching: 'Geloof in je handen.'",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Gibberish",t:"Taal / lichaam",d:"10–20 min",g:"3–20 p.",o:"Communiceren zonder woorden — door onzintaal de expressieve taal van het lichaam bevrijden.",s:["Twee spelers voeren een gesprek in onzintaal — gebaren, toon en tempo dragen de betekenis.","Variatie: een derde speelt tolk — vertaalt de gibberish naar het publiek.","Variatie Gibberish/Nederlands: joker wisselt middenin van gibberish naar normaal en terug.","Nabespreking: wat begreep je? Hoe wist je dat?"],tg:["taal","gevoel","lichaam","beweging"],tip:"Gibberish werkt het best voor groepen met taaldiversiteit. De betekenis zit in het lichaam, nooit in de woorden.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Geven en Nemen",t:"Ensemble / samenwerking",d:"15–20 min",g:"4–20 p.",o:"Ruimte innemen en ruimte geven — de kern van ensemble-bewustzijn.",s:["De ruimte behoort aan iedereen samen. Slechts één speler beweegt of spreekt per moment.","Wie ruimte 'neemt' (begint te bewegen) is verantwoordelijk voor alle anderen.","Als iemand anders beweegt: de eerste stopt en wacht — zonder strijd.","Opbouwen: meerdere spelers in scènes — wie neemt, wie geeft?"],tg:["ensemble","aanwezigheid","forum theater"],tip:"Dit is het principe achter elk goed Forum — wie interveniëert neemt, wie opzij stapt geeft. Bewust oefenen maakt het zichtbaar.",bron:"Spolin",fase:"forum",niv:3,eng:"middel"},
  {b:"vertrouwen",n:"Contact (Aanraking om te Spreken)",t:"Aanraking / communicatie",d:"10–15 min",g:"2–20 p.",o:"Alleen spreken bij fysiek contact — het lichaam als poortwachter van de taal.",s:["Twee spelers voeren een gesprek. De eerste regel: je mag alleen praten als je de ander aanraakt.","Elke nieuwe gedachte of wending vereist een nieuwe aanraking.","Variatie: de aanraking moet wisselen — iedere keer een ander lichaamsdeel.","Nabespreking: wanneer voelde het contact als makkelijk? Wanneer niet?"],tg:["aanraking","contact","vertrouwen"],tip:"Krachtig voor groepen die moeite hebben met nabijheid. De aanraking als communicatiemiddel normaliseert contact zonder het te forceren.",bron:"Spolin",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"geheugen",n:"Verhaal Woord voor Woord",t:"Verhaal / samenwerking",d:"10–15 min",g:"3–15 p.",o:"Collectief een verhaal bouwen — één woord per beurt, geen controle.",s:["Kring. De eerste persoon zegt één woord. De volgende voegt één woord toe. Enzovoort.","Het verhaal bouwt op — niemand weet waar het heen gaat, niemand controleert.","Variatie: zinnen in plaats van woorden. Dan versnellen.","Variatie: een van tevoren bepaald genre — horror, liefde, politiek."],tg:["verhaal","ensemble"],tip:"De momenten waarop het verhaal absurd wordt zijn de interessantste — dat is wanneer het onbewuste spreekt. Nooit corrigeren of sturen.",bron:"Spolin",fase:"verdieping",niv:1,eng:"middel"},
  {b:"lichaam",n:"Volg de Volger",t:"Ensemble / collectief",d:"10–15 min",g:"6–30 p.",o:"Bewegen als één lichaam zonder aangewezen leider — emergent ensemble.",s:["Groep beweegt door de ruimte of staat in een kring.","Niemand leidt — iedereen is tegelijk leider en volger.","Het groepsbewustzijn ontstaat vanzelf: snelheid, richting, gebaar.","Joker observeert: wie trekt de aandacht? Wie ondersteunt? Wat verandert als iemand iets probeert te 'winnen'?"],tg:["ensemble","leiden","improvisatie"],tip:"Verschilt van Boals Spiegel doordat er geen koppel is. Het gaat om collectieve emergentie, niet om één-op-één reflectie.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Geluidsspiegel",t:"Gehoor / aanwezigheid",d:"10–15 min",g:"2–20 p.",o:"Geluid spiegelen in plaats van beweging — het oor als instrument van synchronisatie.",s:["Tweetallen. A maakt een klank of melodie. B spiegelt exact — timing, toon, volume.","Geen woorden — alleen klank.","Na een poos: wisselen wie begint, zonder signaal.","Variatie: de groep als één geluidsspiegel voor de joker."],tg:["gehoor","spiegel","ritme","aanwezigheid"],tip:"De discipline van het spiegelen van geluid traint iets anders dan visuele spiegel — het oor reageert anders dan het oog. Houd het schoon en eenvoudig.",bron:"Spolin",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"lichaam",n:"Status transacties",t:"Status / bewustwording",d:"20–25 min",g:"4–20 p.",o:"Status als fysiek, zichtbaar verschijnsel leren zien — en leren spelen.",s:["Tweetallen voeren een gesprek over niets bijzonders — de eerste regel: de ene probeert zijn status te verhogen, de ander te verlagen.","Na twee minuten: wisselen wie verhoogt en wie verlaagt.","Variatie: beiden verhogen — wat gebeurt er? Beiden verlagen — hoe ziet dat eruit?","Nabespreking: hoe wist je of je hoog of laag stond? Wat in het lichaam?"],tg:["status","macht","reflectie","personage"],tip:"Status zit in detail: oogcontact, tempo, ruimtegebruik, de plek van de pauze. Wie de grote gebaren zoekt mist het.",bron:"Johnstone",fase:"opwarming",niv:2,eng:"middel"},
  {b:"lichaam",n:"Meester en dienaar",t:"Status / rollenspel",d:"20–30 min",g:"4–20 p.",o:"Machtsverhoudingen uitspelen in een klassiek scenario — en ontdekken hoe de machtsrollen van binnenuit werken.",s:["Tweetallen: één is meester, één is knecht. De meester geeft opdrachten — de knecht voert uit.","Variatie: de ruimte behoort volledig aan de meester. Hoe voelt dat voor de knecht?","Omwisselen. Hoe verandert het lichaam?","Nabespreking: wanneer voelde je je meest comfortabel? Waarom?"],tg:["status","macht","personage","lichaam"],tip:"Dit is Johnstones bekendste statusoefening. Het werkt ook als voorbereiding op Forum — wie is antagonist, wie protagonist? De machtsverhouding maakt dat zichtbaar.",bron:"Johnstone",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Accepteren en Uitbouwen (Ja En)",t:"Improvisatie / spontaneïteit",d:"15–20 min",g:"2–20 p.",o:"Aanbod van de ander altijd accepteren en uitbouwen — blokkeren verbieden.",s:["Tweetallen spelen een improvisatiescène. De regel: alles wat de ander inbrengt moet worden geaccepteerd en uitgebouwd.","'Ja, en...' als basisstructuur — nooit 'ja maar' of 'nee'.","De scene gaat waar hij wil — niet waar je hem wil sturen.","Oefening in het tegendeel: bewust blokkeren. Wat voelt dat? Wat doet het met de energie?"],tg:["improvisatie","ensemble","personage"],tip:"'Yes And' is geen truc — het is een houding. Wie blokt beschermt zichzelf. Wie accepteert maakt theater. Dat onderscheid is ook de kern van Forum.",bron:"Johnstone",fase:"opwarming",niv:1,eng:"middel"},
  {b:"geheugen",n:"Herintegratie",t:"Verhaal / structuur",d:"20–30 min",g:"4–15 p.",o:"Eerder geïntroduceerde elementen terugbrengen in het verhaal — de kunst van de narratieve kring.",s:["Groep begint een verhaal. Elk element dat wordt ingebracht — object, personage, detail — wordt door de joker opgeschreven.","Halverwege: joker introduceert verplicht één eerder element terug.","Einddoel: elk element keert terug. Niets verdwijnt uit het verhaal.","Nabespreking: wat maakte het verhaal rijker? Wat voelde als toevallig, wat als noodzakelijk?"],tg:["verhaal","improvisatie"],tip:"Re-incorporation is het verschil tussen een reeks gebeurtenissen en een verhaal. Elk terugkerend element geeft de kijker het gevoel dat er een wereld bestaat.",bron:"Johnstone",fase:"verdieping",niv:1,eng:"middel"},
  {b:"lichaam",n:"Expert interview",t:"Improvisatie / status",d:"10–15 min",g:"4–20 p.",o:"Spontaan expert zijn over een compleet onbekend onderwerp — zonder te blokkeren.",s:["Één persoon is 'expert' op een absurd specifiek gebied: 'de psychologie van kaasschimmels', 'de traditie van het dubbel parkeren'.","De groep stelt serieuze vragen. De expert antwoordt volledig overtuigd.","Regel: nooit 'ik weet het niet' — altijd een antwoord.","Na twee minuten: nieuwe expert, nieuw onderwerp."],tg:["status","improvisatie","humor"],tip:"De sleutel is hoge status spelen met lage inhoud. Het grappige ontstaat uit de combinatie — niet uit de grap. Wie probeert grappig te zijn verliest de oefening.",bron:"Johnstone",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"geheugen",n:"Routines doorbreken",t:"Verhaal / improvisatie",d:"15–20 min",g:"4–15 p.",o:"Leren dat verhalen pas beginnen als de routine wordt onderbroken — en die onderbreking bewust inzetten.",s:["Twee spelers spelen een scène van volledige normaliteit — iedereen kent zijn plek.","Joker stopt: 'Verander één ding.' De andere speler reageert op de verandering.","De scène moet nu ergens heen — het verhaal begint.","Variatie: publiceer het moment van breuk als 'het begin van de scène'."],tg:["verhaal","improvisatie"],tip:"Johnstone zegt: een verhaal begint pas als iets verandert. Deze oefening maakt dat principe speelbaar. Gebruik het als voorbereiding op Forumscèneontwikkeling.",bron:"Johnstone",fase:"verdieping",niv:1,eng:"middel"},
  {b:"zintuigen",n:"Fluid Sculptures",t:"Playback / expressie",d:"15–20 min",g:"4–15 p.",o:"Abstracte emoties en gevoelens uitbeelden via beweging en geluid — de korte form van Playback.",s:["Een deelnemer deelt een kort gevoel of moment: 'Ik voelde me vandaag als...'","Drie tot vier spelers vormen tegelijk een beeldend, beweeglijk antwoord — niet letterlijk, maar associatief.","Geluid, ritme en beweging tegelijk — geen woorden.","De verteller kijkt: klopt dit? Is er iets dat resoneert?"],tg:["playback","gevoel","ensemble"],tip:"Fluid Sculptures zijn de snelste Playback-vorm. Gebruik ze als warming-up voor dieper vertelwerk, of als kortform tussendoor.",bron:"Playback Theatre",fase:"opwarming",niv:1,eng:"middel"},
  {b:"geheugen",n:"Pairs (Tweetallen verhaal)",t:"Playback / luisteren",d:"15–25 min",g:"4–20 p.",o:"Een kort persoonlijk verhaal van twee mensen terugspelen — simultaan, in tweetallen.",s:["Conductor vraagt twee mensen elk een kort moment te delen — tegelijk of na elkaar.","Twee spelers spelen de twee verhalen gelijktijdig naast elkaar — of verweven.","De verbinding tussen de verhalen ontstaat vanzelf — zonder regie.","Vertellers kijken: wat weerklinkt, wat verrast?"],tg:["playback","verhaal","contact"],tip:"De kracht zit in de gelijktijdigheid — twee verhalen die naast elkaar leven maken de verbinding tussen mensen zichtbaar. Conductor begeleidt zacht.",bron:"Playback Theatre",fase:"verdieping",niv:1,eng:"middel"},
  {b:"afsluiting",n:"Luisterritueel",t:"Playback / getuigenis",d:"10–15 min",g:"6–30 p.",o:"Een moment van gedeeld getuigen — zonder oordeel, zonder interpretatie, alleen ontvangen.",s:["Kring. Iemand deelt één moment — een woord, een zin, een beeld.","De kring luistert in stilte. Geen reactie, geen commentaar.","Na de stilte: de spelers of de groep maakt een kort fluid sculpture als antwoord.","De verteller ontvangt het — hoeft niets te zeggen."],tg:["contact","verhaal","gemeenschap"],tip:"Dit ritueel geeft elk verhaal de waardigheid van een publiek getuigenis. Het maakt de sluiting van een sessie merkbaar.",bron:"Playback Theatre",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"geheugen",n:"Gevoelstableau",t:"Playback / image",d:"10–15 min",g:"4–15 p.",o:"Een gevoel of stemming vertalen naar een bevroren beeldende vorm — als antwoord op een verteld moment.",s:["Conductor vraagt: 'Hoe voel je je op dit moment?' of na een gedeeld verhaal.","Drie spelers vormen een stilstaand tableau — houdingen, ruimtelijke verhoudingen, expressie.","De verteller bekijkt het tableau: klopt dit? Wat wil je aanpassen?","Variatie: de verteller voegt zelf een element toe aan het tableau."],tg:["playback","image theater","gevoel","verhaal"],tip:"Het tableau heeft geen uitleg nodig — het ís het antwoord. Als de verteller iets aanpast wordt hij co-maker van zijn eigen verhaal.",bron:"Playback Theatre",fase:"verdieping",niv:1,eng:"middel"},
  {b:"lichaam",n:"Playback Chorus",t:"Playback / ensemble",d:"10–15 min",g:"4–20 p.",o:"De groep als koor — een gedeeld gevoel collectief uitdrukken via één beweging en klank.",s:["Conductor vraagt: 'Wat voelt de groep op dit moment?' — na een zware oefening of ontmoeting.","De hele groep vormt tegelijk een beweging en klank die dat gevoel weerspiegelt.","Geen instructie — het collectieve antwoord ontstaat.","Conductor benoemt wat er was: 'Dit was jullie moment.'"],tg:["playback","ensemble","gevoel"],tip:"De chorus maakt collectieve emoties zichtbaar zonder ze te benoemen. Gebruik het na intensieve Forum-sessies of aan het eind van een dag.",bron:"Playback Theatre",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Cover the Space",t:"Warming-up / ruimte",d:"5–10 min",g:"8–40 p.",o:"De ruimte altijd gelijkmatig bezetten — een gedeeld bewustzijn van de vloer als gemeenschap.",s:["Iedereen loopt door de ruimte. Joker: 'Zorg dat alle lege plekken zijn gevuld — geen clusters, geen lege hoeken.'","Als de groep naar één kant trekt: de tegenoverliggende hoek is leeg. Vul die.","Sneller. Nog sneller. Stop.","Bevroren: kijk rond. Is de ruimte goed gevuld?"],tg:["ruimte","reflectie","ensemble"],tip:"Eenvoudige oefening met grote impact: de groep leert zichzelf reguleren zonder instructies. Goed als eerste stap naar scènewerk.",bron:"Rohd",fase:"opwarming",niv:1,eng:"middel"},
  {b:"beeld",n:"Circle Sculpt",t:"Image Theater / Rohd",d:"15–20 min",g:"8–25 p.",o:"Een beeld bouwen in de cirkel — de groep als beeldhouwer van een gedeeld thema.",s:["Kring. Joker geeft een thema: 'Macht', 'Thuis', 'Hulp'.","Eén voor één stappen deelnemers de cirkel in en nemen een houding aan die iets uitdrukt over het thema.","Elk lichaam reageert op de andere lichamen — positie, richting, afstand.","Als iedereen in het beeld staat: groep beschrijft wat ze zien."],tg:["image theater","kring","ensemble"],tip:"De volgorde van instappen verandert het beeld. Wie als laatste binnenkomt bepaalt mede de betekenis van alles daarvoor. Benoem dat.",bron:"Rohd",fase:"beeldentheater",niv:2,eng:"middel"},
  {b:"lichaam",n:"Schreeuw Bevriezing",t:"Warming-up / energie",d:"5–10 min",g:"8–40 p.",o:"Bewegen, stoppen op een schreeuw — en een ander signaal om los te laten.",s:["Iedereen beweegt door de ruimte.","Bij een schreeuw van de joker: iedereen bevriest onmiddellijk.","Bij een tweede schreeuw: iedereen laat los en beweegt.","Variatie: deelnemers kunnen zelf de schreeuwen geven — de joker stopt het spel."],tg:["opwarming","lichaam"],tip:"Eenvoudiger dan Stop-en-Ga maar meer lawaai — goed voor groepen die energie nodig hebben. De schreeuw zelf geeft toestemming om hard te zijn.",bron:"Rohd",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"forum",n:"Activerend Monoloog",t:"Bridge Activity / materiaal",d:"20–30 min",g:"4–20 p.",o:"Een getuigenismonoloog schrijven en spelen — als brug naar scèneontwikkeling.",s:["Deelnemer schrijft twee à drie minuten over een moment van onrecht of blokkade — in eerste persoon, zo specifiek mogelijk.","De monoloog wordt gespeeld — alleen de eerste keer voor de kring, daarna mogelijke herhaling.","Groep reageert: wat zagen ze? Welke momenten van keuze waren er?","Variatie: de monoloog wordt basis voor een Forumscène."],tg:["verhaal","forum theater"],tip:"Rohd gebruikt dit als brug tussen vertrouwen en activerend werk. De specificiteit van het schrijven maakt de monoloog theatraal — niet het spelen.",bron:"Rohd",fase:"forum",niv:3,eng:"middel"},
  {b:"lichaam",n:"Kijk Omhoog Kijk Omlaag",t:"Aanwezigheid / concentratie",d:"10–15 min",g:"6–30 p.",o:"Oogcontact bewust gebruiken — aanwezigheid door kijken en niet-kijken.",s:["Kring op stoelen of staand. Iedereen kijkt naar de grond.","Joker: 'Look up.' Iedereen kijkt tegelijk op en kijkt naar iemand — als twee mensen elkaar aankijken: zitten ze out.","Opnieuw beginnen. Het spel duurt tot er één persoon over is.","Variatie: in stilte — geen joker, de groep reguleert zichzelf."],tg:["oogcontact","aanwezigheid","concentratie","stilte"],tip:"Dit is Grotowskis eenvoudigste oefening in aanwezigheid. De stilte-versie werkt het best voor groepen die al samen gewerkt hebben.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"laag"},
  {b:"lichaam",n:"Fysieke transformatie",t:"Lichaamswerk / karakter",d:"15–20 min",g:"6–25 p.",o:"Het lichaam transformeren zonder psychologie — alleen via houding, gewicht en adem.",s:["Iedereen staat neutraal. Joker: 'Laat je gewicht zakken. Dan verder. De grond trekt.'","Langzaam transformeert het lichaam — niet via een rol of emotie, maar via fysieke impulsen.","Joker stuurt: 'Wat wil dit lichaam? Wat zoekt het?'","Variatie: twee getransformeerde lichamen ontmoeten elkaar — wat gebeurt er?"],tg:["lichaam","transformatie","aanwezigheid","personage"],tip:"Grotowski's methode begint altijd in het lichaam, nooit in de psychologie. De transformatie is een fysiek onderzoek — geen acteeroefening.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"middel"},
  {b:"derolling",n:"Handen wassen",t:"Derolling / lichamelijk",d:"3–5 min",g:"4–30 p.",o:"De rol van de handen afwassen — een concreet lichamelijk ritueel van overgang.",s:["Iedereen maakt de beweging van handen wassen — alsof er echte zeep en water is.","Joker begeleidt: 'Was de rol van je handen. Wat kleefde er aan?'","Droog ze af. Schud ze los.","Optioneel: echte kom water en handdoek centraal neerzetten — wie wil wast letterlijk."],tg:["derolling","ritueel","lichaam"],tip:"De combinatie van verbeelding en eventueel echt water maakt dit memorabel. Water als symbool van overgang is universeel — gebruik dat.",bron:"Dreamers Beyond",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"derolling",n:"Ruggelings terug",t:"Derolling / beweging",d:"5–8 min",g:"4–25 p.",o:"Letterlijk wegstappen van de rol — achteruitlopend de speelruimte verlaten.",s:["Na een intensieve scène of Forum: iedereen staat op de speelvloer.","Joker: 'Stap terug uit het spel — achteruit, de rol op de vloer achterlatend.'","Iedereen loopt rustig achteruit naar de rand van de ruimte.","Eenmaal aan de rand: omdraaien. Je bent terug."],tg:["derolling","beweging","ruimte"],tip:"Het achteruitlepen is het tegenovergestelde van het instappen. Die symmetrie werkt onbewust — het lichaam begrijpt dat het spel voorbij is.",bron:"Theatre for Living",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"derolling",n:"Wat ik meeneem, wat ik achterlaat",t:"Derolling / reflectie",d:"8–12 min",g:"4–25 p.",o:"Bewust kiezen wat van de rol en de sessie meegaat, en wat in de ruimte blijft.",s:["Iedereen schrijft of denkt: 'Wat neem ik mee uit deze sessie?' (eigen inzicht, energie, vraag).","Dan: 'Wat laat ik hier achter?' (rol, emotie, spanning van het personage).","Deel in tweetallen — één minuut per persoon.","Joker sluit af: 'Dat wat je achterlaat, blijft hier. Je bent vrij te gaan.'"],tg:["derolling","reflectie"],tip:"De actieve keuze 'ik laat dit hier' geeft agency terug. Dat is precies wat derolling moet doen — de controle teruggeven aan de deelnemer.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"derolling",n:"Collectief uitschudden",t:"Derolling / energie",d:"3–5 min",g:"4–40 p.",o:"De groep schudt samen de spanning van de sessie eruit — luid, collectief, bevrijd.",s:["Iedereen staat. Joker start: handen schudden, steeds harder.","Armen. Schouders. Het hele lijf — meer en meer geluid.","Op het hoogtepunt: iedereen een kreet of geluid laten los.","Stilte. Voel het eigen gewicht."],tg:["derolling","opwarming","ensemble","lichaam"],tip:"Na het schudden is de stilte essentieel — die geeft het lichaam de kans de reset te voelen. Houd die stilte minstens tien seconden vast.",bron:"Theatre for Living",fase:"afsluiting",niv:1,eng:"hoog"},
  {b:"jokertraining",n:"De drie posities van de Joker",t:"Joker-training / theorie",d:"20–25 min",g:"4–12 p.",o:"De drie basisposities leren herkennen: waarnemer, begeleider, speler.",s:["Joker legt uit: waarnemer (buiten het spel, ziet alles), begeleider (in contact met de groep), speler (stapt zelf in).","Tweetallen spelen een korte scène. De derde observeert als Joker — afwisselend vanuit de drie posities.","Na de scène: welke positie nam je het meest in? Welke was het moeilijkst?","Wisselronde: iedereen heeft een beurt als Joker."],tg:["positiebepaling","observatie","joker"],tip:"De meeste beginning-Jokers hangen te lang in de begeleiderspositie en te weinig in de waarnemerspositie. Train dat onderscheid expliciet.",bron:"Dreamers Beyond",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"Stilte als instrument",t:"Joker-training / techniek",d:"15–20 min",g:"4–12 p.",o:"Leren wanneer de Joker stil moet zijn — en die stilte verdragen zonder in te vullen.",s:["Groepje speelt een Forum-scène. De Joker mag alleen non-verbaal communiceren: knikken, gebaar, aanwezigheid.","Na vijf minuten: Joker mag één zin zeggen per minuut.","Nabespreking: wanneer werd er iets ingevuld dat de groep zelf had kunnen ontdekken?","Hoe voelde de stilte — voor de Joker, voor de groep?"],tg:["stilte","joker"],tip:"De stilte van de Joker is geen passiviteit — het is actieve aanwezigheid. Wie dat verschil voelt, begrijpt wat Joker-zijn betekent.",bron:"Formaat",fase:"jokertraining",niv:1,eng:"laag"},
  {b:"jokertraining",n:"Omgaan met weerstand",t:"Joker-training / veiligheid",d:"25–30 min",g:"4–12 p.",o:"Oefenen hoe te reageren als een deelnemer weerstand biedt — zonder te escaleren of te vermijden.",s:["Rollenspel: één persoon speelt een weerstandige deelnemer (weigert mee te doen, saboteert, provoceert).","De Joker-in-opleiding begeleidt de situatie.","Andere deelnemers observeren en geven daarna feedback: wat opende, wat sloot?","Wissel de weerstandsrol — zo ervaart iedereen beide kanten."],tg:["conflict","vertrouwen"],tip:"Weerstand is altijd informatie. Een Joker die weerstand als vijand ziet, verliest. Een Joker die weerstand als signaal ziet, wint.",bron:"Dreamers Beyond",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"De ethiek van het Forum",t:"Joker-training / ethiek",d:"30–40 min",g:"4–12 p.",o:"De ethische vragen van het Forum-werk verkennen — macht, manipulatie, representatie, veiligheid.",s:["Groep bespreekt: 'Wie heeft het recht om dit verhaal te vertellen?'","Dan: 'Wanneer gebruik je je macht als Joker bewust — en wanneer onbewust?'","Casussen inbrengen uit eigen praktijk: een moment waarbij je twijfelde.","Geen antwoorden — alleen vragen die scherper worden."],tg:["joker","macht","identiteit"],tip:"Ethiek is geen checklist — het is een voortdurende vraag. De beste Jokers zijn niet degenen met de meeste antwoorden, maar degenen met de betere vragen.",bron:"Formaat",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"Co-joker protocol",t:"Joker-training / samenwerking",d:"25–30 min",g:"4–12 p.",o:"Leren samenwerken als Joker-duo — taakverdeling, signalen, ingrijpen zonder de ander te ondergraven.",s:["Tweetallen spelen samen een sessie: één is hoofd-Joker, één is co-Joker.","Afspraken vooraf: wanneer neemt de co-Joker over? Welke signalen gebruiken jullie?","Na de sessie: hoe voelde de samenwerking? Wanneer zat je in elkaars vaarwater?","Tweede ronde: rollen omdraaien."],tg:["joker","ensemble"],tip:"De co-Joker is niet de assistent — hij is een gelijkwaardige waarnemer met een ander perspectief. Maak die gelijkwaardigheid expliciet in de afspraken.",bron:"Dreamers Beyond",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"opening",n:"Energiemeting",t:"Check-in / energie",d:"3–5 min",g:"6–40 p.",o:"De energiestand van de groep meten op een schaal van 1 tot 10 — snel, eerlijk, zichtbaar.",s:["Joker: 'Ga staan op een plek die je energieniveau toont: 1 = compleet leeg, 10 = overloopvol.'","Iedereen plaatst zich gelijktijdig — geen overleg.","Joker observeert het landschap: 'Dit is waar we staan.'","Optioneel: één persoon van elke kant licht toe waarom."],tg:["check-in","opwarming","positiebepaling"],tip:"De ruimtelijke meting is eerlijker dan een verbaal antwoord — het lichaam kiest sneller dan het hoofd. Gebruik het om je programma aan te passen als iedereen bij de 3 staat.",bron:"Rohd",fase:"opening",niv:1,eng:"hoog"},
  {b:"opening",n:"Adem als aankomst",t:"Opening / adem",d:"4–6 min",g:"6–40 p.",o:"Met een gezamenlijke ademhaling de groep samenbrengen — van individuele drukte naar collectieve aanwezigheid.",s:["Iedereen staat of zit. Ogen mogen dicht.","Joker begeleidt: 'Adem in — voel de ruimte om je heen. Adem uit — laat alles los wat je mee naar binnen droeg.'","Drie ronden, elk iets dieper.","Joker: 'Open je ogen. We zijn hier. Dit is nu.'"],tg:["check-in","adem","aanwezigheid"],tip:"Doe dit altijd zelf mee als Joker — zichtbaar, rustig. Je ademhaling is de metronoom van de groep.",bron:"Grotowski",fase:"opening",niv:1,eng:"laag"},
  {b:"opening",n:"Eerste woord",t:"Opening / impuls",d:"5–8 min",g:"6–30 p.",o:"Het allereerste woord dat opkomt delen — als venster op de toestand van de deelnemer.",s:["Kring. Joker: 'Zeg het eerste woord dat opkomt als je denkt aan vandaag. Niet nadenken — gewoon zeggen.'","Iedereen om de beurt. Geen uitleg, geen herhaling.","Joker herhaalt alle woorden als een koor: 'Dit zijn wij vandaag.'","Optioneel: wie herkent het woord van iemand anders?"],tg:["check-in","improvisatie","taal"],tip:"Verbied nadrukkelijk nadenken. Wie aarzelt, zegt het tweede woord al — niet het eerste. Snelheid is de oefening.",bron:"Spolin",fase:"opening",niv:1,eng:"middel"},
  {b:"opening",n:"De cirkel sluiten",t:"Opening / ritueel",d:"5–8 min",g:"6–40 p.",o:"De groep letterlijk een cirkel laten vormen als collectief openingsgebaar.",s:["Joker vraagt de groep een cirkel te vormen — niet te snel, organisch.","Als de cirkel staat: een moment stilte. Kijk rond.","Joker: 'We zijn hier samen. Dit is onze ruimte, voor de komende tijd.'","Optioneel: elk legt een hand op de schouder van de buur. Één diepe adem. Dan loslaten."],tg:["check-in","ritueel","kring","gemeenschap"],tip:"De kracht van een cirkel zit in de gelijkwaardigheid die hij uitdrukt — niemand staat voor of achter. Maak dat expliciet als het relevant is voor de groepscontext.",bron:"Boal",fase:"opening",niv:1,eng:"middel"},
  {b:"nabespreking",n:"Ik zag — ik voelde — ik denk",t:"Nabespreking / structuur",d:"10–15 min",g:"6–25 p.",o:"Een drieledige structuur om observatie, gevoel en analyse te scheiden.",s:["Joker introduceert drie zinnen: 'Ik zag...' (feiten), 'Ik voelde...' (emotie), 'Ik denk...' (analyse).","Iedereen kiest één zin en maakt hem af — mondeling of op papier.","Grote kring: wie deelt, deelt. Geen debat — alleen luisteren.","Joker: 'Wat valt op in wat er gedeeld is?'"],tg:["nabespreking","observatie","gevoel"],tip:"De drie lagen houden de nabespreking eerlijk. Wie 'ik denk' zegt maar eigenlijk 'ik voel' bedoelt, ontdekt dat aan de zin zelf.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"middel"},
  {b:"stem",n:"De naam zingen",t:"Stem / kennismaking",d:"8–12 min",g:"6–25 p.",o:"De eigen naam op toon zingen als introductie — de stem als visitekaartje.",s:["Kring. Iedereen zingt zijn eigen naam op een toon die hij kiest — zacht, expressief, hoe dan ook.","De groep zingt de naam terug — zo trouw mogelijk aan de originele toon.","Tweede ronde: de naam zingen op een toon die niet bij je past — hoog als je laag bent, fragiel als je krachtig bent.","Nabespreking: wat zei de toon die je koos?"],tg:["stem","kennismaking"],tip:"De groep die de naam terugzingt geeft een cadeau. Hoe preciezer ze dat doen, hoe zorgzamer de sfeer. Dat is al een oefening in luisteren.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"opening",n:"Hoe kom je binnen?",t:"Check-in / opening",d:"5–10 min",g:"6–30 p.",o:"De binnenkomst bewust maken — hoe betreedt iemand de ruimte, en wat brengt hij/zij mee?",s:["Iedereen beloopt de ruimte en wordt bewust van hoe ze binnenkomen.","Joker: 'Laat zien hoe je vandaag binnenkomt — niet hoe het hoort, maar hoe het is.'","Eén beweging en één geluid per persoon, allemaal tegelijk of om de beurt.","Variatie: benoem daarna met één woord de toon waarmee je bent gekomen."],tg:["check-in","aanwezigheid","gevoel"],tip:"Dit opent elke sessie zonder dat het 'een oefening' lijkt. De beweging zegt meer dan elk verbaal check-in ritueel. Doe het zelf als Joker.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"middel"},
  {b:"opening",n:"Weerskaart van het lichaam",t:"Check-in / lichamelijk",d:"5–10 min",g:"6–30 p.",o:"De huidige lichamelijke staat in kaart brengen als weerbericht — voor jezelf en voor de groep.",s:["Kring. Iedereen sluit even de ogen en scant het lichaam: hoofd, schouders, borst, buik, benen.","Joker: 'Welk weerbericht is er in jouw lichaam? Zonnig? Bewolkt? Onweer?'","Om de beurt: één woord of één beeld. Geen uitleg verplicht.","Variatie: teken het weerbericht in de lucht met één hand."],tg:["check-in","lichaam","aanwezigheid"],tip:"Dit is sneller en rijker dan 'hoe gaat het met je'. Het lichaam liegt niet — het woord 'onweer' zegt meer dan een verklaring.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"middel"},
