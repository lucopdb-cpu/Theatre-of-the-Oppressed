  {b:"opening",n:"De drempel",t:"Check-in / ritueel",d:"5–10 min",g:"6–30 p.",o:"De overgang van buiten naar binnen bewust maken — een drempel als rituele grens.",s:["Joker markeert een lijn in de ruimte: een touw, een krijtstreep, een rij stoelen.","Iedereen staat aan één kant — de buitenwereld. Aan de andere kant: de theaterruimte.","Elk individu kruist de drempel wanneer hij/zij er klaar voor is — zonder haast.","Optioneel: wie de drempel oversteekt laat iets achter en neemt iets mee."],tg:["check-in","ritueel","aanwezigheid"],tip:"Een ritueel heeft geen uitleg nodig. Leg de drempel neer en zeg alleen: 'Kom wanneer je er klaar voor bent.' Wacht tot de laatste persoon binnen is voor je doorgaat.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"middel"},
  {b:"opening",n:"Namen in de ruimte",t:"Check-in / kennismaking",d:"5 min",g:"6–40 p.",o:"De ruimte vullen met namen — als collectief geluidslandschap bij de start.",s:["Iedereen verspreidt zich door de ruimte.","Op teken van de joker: iedereen zegt tegelijk zijn eigen naam — zo lang als het voelt.","Tweede ronde: iedereen zegt de naam van iemand anders die ze in de ruimte zien.","Derde ronde: één naam tegelijk, van de groep samen, zonder aanwijzing."],tg:["check-in","kennismaking","stem","ensemble"],tip:"De derde ronde lukt bijna nooit meteen. Dat is precies de oefening: hoe zoekt een groep samen een stem?",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"middel"},
  {b:"opening",n:"Kleur van de dag",t:"Check-in / metafoor",d:"5–10 min",g:"6–25 p.",o:"De dag of de stemming omzetten naar een kleur — een metafoor die geen uitleg hoeft.",s:["Kring. Joker: 'Als vandaag een kleur had, welke zou dat zijn?'","Om de beurt: naam + kleur. Geen uitleg verplicht, maar welkom.","Variatie: ook vorm (wat voor vorm heeft je dag?) of temperatuur (hoe warm of koud?).","Joker reflecteert aan het eind: welke kleuren domineren? Wat zegt dat?"],tg:["check-in","gevoel"],tip:"Kleur is laagdrempeliger dan een woord als 'moe' of 'blij'. Het nodigt uit tot metafoor en daarmee tot theater. Benoem die verbinding.",bron:"Formaat",fase:"opening",niv:1,eng:"middel"},
  {b:"opening",n:"Lichaamsscanner",t:"Check-in / adem",d:"5–8 min",g:"6–40 p.",o:"Rustig het lichaam doorlopen van hoofd tot voeten — aanwezig raken vóór de sessie begint.",s:["Iedereen staat of zit comfortabel. Ogen mogen dicht.","Joker begeleidt rustig: 'Begin bij de kruin van je hoofd. Voel de aanraking van de lucht...'","Langzaam afdalen: voorhoofd, kaak, nek, schouders, armen, handen, borst, buik, heupen, benen, voeten.","Afsluiting: drie diepe ademhalingen. Ogen open. Hier zijn we."],tg:["check-in","adem","aanwezigheid","lichaam"],tip:"Dit is de stilste opening die er is. Gebruik het voor groepen die moeilijk tot rust komen, of na een zware reis naar de locatie. Doe het zelf mee.",bron:"Formaat",fase:"opening",niv:1,eng:"laag"},
  {b:"stem",n:"Stemopwarming",t:"Stem / vocaal",d:"10–15 min",g:"6–30 p.",o:"De stem activeren van murmelen tot vol geluid — zonder dwang, van binnenuit.",s:["Begin: iedereen ademt diep in en laat de uitadem klinken als een lange 'aaah' — zacht, voor zichzelf.","Twee: op de uitadem een toon zoeken die comfortabel voelt. Niet presteren — verkennen.","Drie: toon vullen, groter maken, dan laten zakken naar stilte.","Vier: de hele groep samen — één collectieve toon, die organisch ontstaat en oplost."],tg:["stem","adem","opwarming"],tip:"Vraag niemand om mooi te zingen. Het gaat om aanwezigheid in de stem, niet om kwaliteit. Wie fluistert doet ook mee.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"stem",n:"Adem en beweging",t:"Adem / lichaamswerk",d:"10–15 min",g:"6–30 p.",o:"Adem en beweging verbinden — ontdekken dat elke beweging een adem heeft.",s:["Iedereen staat vrij in de ruimte. Joker: 'Begin met ademen. Laat de uitadem een beweging starten.'","De beweging groeit mee met de adem — niet aangestuurd, maar gevolgd.","Na enkele minuten: de beweging mag een geluid meenemen op de uitadem.","Afsluiting: stilstand. Voel het lichaam na."],tg:["adem","beweging","lichaam","stem"],tip:"Dit is geen dansles — het is een ontdekkingstocht. Wie 'goed' wil bewegen mist de oefening. Wie de adem volgt vindt altijd iets.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"laag"},
  {b:"stem",n:"Stemscultuur",t:"Stem / collectief",d:"15–20 min",g:"6–25 p.",o:"Collectief geluid bouwen — van fluisteren tot een volledige vocale sculptuur.",s:["Iedereen begint met een bijna onhoorbaar geluid — een adem, een murmeling.","Joker beweegt door de ruimte en 'dirigeert' met handen: omhoog = luider, omlaag = zachter.","Geleidelijk ontstaat een collectief klanklandschap — iedereen geeft zijn eigen bijdrage.","Finale: de joker laat alle stemmen samen groeien en daarna wegsterven naar stilte."],tg:["stem","ensemble"],tip:"Er is geen goed of fout geluid. Wie zijn stem niet wil gebruiken, ademt hoorbaar mee — ook dat is stem.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"stem",n:"Gibberish speech",t:"Stem / expressie",d:"10–15 min",g:"4–20 p.",o:"Een toespraak houden in onzintaal — met alle overtuiging van een leider.",s:["Vrijwilliger staat op en houdt een 'toespraak' over een belangrijk onderwerp — volledig in gibberish.","Het lichaam, de intonatie en het ritme dragen de boodschap — geen woorden.","De groep luistert ernstig en reageert non-verbaal.","Na de toespraak: groep beschrijft wat ze gehoord heeft."],tg:["stem","taal","status"],tip:"De toespraken die het overtuigendst zijn, zijn bijna altijd die waarbij de spreker het meest gelooft in zijn eigen gibberish. Geloof is alles.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"stem",n:"Vocale echo",t:"Stem / ritme",d:"10–15 min",g:"6–25 p.",o:"Een geluid de groep ingooien — de groep gooit het terug, veranderd of hetzelfde.",s:["Kring. De joker maakt een geluid en gebaar en gooit het naar iemand.","Die persoon vangt het, laat het iets veranderen en gooit het verder.","Het geluid evolueert door de groep heen — soms nauwelijks, soms radicaal.","Variatie: twee geluiden tegelijk de kring in."],tg:["stem","ritme","ensemble"],tip:"Het geluid is een levend iets — niet een boodschap die correct overgeleverd moet worden. Mutatie is toegestaan en gewenst.",bron:"Spolin",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"stem",n:"Atemübung (Grotowski)",t:"Adem / aanwezigheid",d:"10–15 min",g:"6–20 p.",o:"De ademhaling bewust vertragen en verdiepen — het lichaam als instrument openen.",s:["Iedereen ligt op de rug of staat vrij. Ogen dicht.","Joker begeleidt: 'Adem in — vier tellen. Vasthouden — vier tellen. Adem uit — acht tellen.'","Na vijf ronden: vrije ademhaling, maar bewust. Voel hoe de ribben bewegen.","Sta langzaam op. Voel het verschil met voor de oefening."],tg:["adem","aanwezigheid","concentratie","check-in"],tip:"Niemand ademt verkeerd. Maar bijna iedereen ademt oppervlakkiger dan zijn lichaam wil. Deze oefening herstelt dat — zonder het te zeggen.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"laag"},
  {b:"stem",n:"Ritme en stem",t:"Stem / ritme",d:"10–15 min",g:"8–30 p.",o:"Een ritmisch stammen verbinden met de stem — het lichaam als percussie-instrument.",s:["Iedereen staat. Joker start een eenvoudig voetritme: links-rechts-links-rechts.","Als het ritme stabiel is: een toon toevoegen op de stap — hum, ah, om.","Variaties: tempo verhogen, pauze inbouwen, richting veranderen.","Afsluiting: iedereen stopt tegelijk op een signaal. Stilte."],tg:["stem","ritme","lichaam","opwarming"],tip:"De verbinding van stap en stem is ouder dan theater. Het activeert iets basaals. Gebruik het als de groep energie nodig heeft maar ook aanwezigheid.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"hoog"},
  {b:"nabespreking",n:"De zin die blijft",t:"Nabespreking / reflectie",d:"5–10 min",g:"6–30 p.",o:"De sessie samenvatten in één zin die écht is blijven hangen.",s:["Kring. Joker: 'Welke zin, woord of beeld blijft er bij je hangen van deze sessie?'","Om de beurt: één zin, zonder uitleg.","Joker herhaalt de zinnen aan het eind — als een litanie.","Optioneel: schrijf ze op en stuur ze later."],tg:["nabespreking","reflectie","geheugen"],tip:"Geen analyse — alleen resonantie. Wie vraagt waarom iemand een bepaalde zin zegt, breekt de oefening af.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"laag"},
  {b:"nabespreking",n:"Drie cirkels",t:"Nabespreking / evaluatie",d:"15–20 min",g:"6–25 p.",o:"De sessie evalueren via drie overlappende cirkels: wat heb ik geleerd, wat voel ik, wat ga ik doen.",s:["Joker tekent drie overlappende cirkels op een flip-over: HOOFD, HART, HANDEN.","Iedereen schrijft één post-it per cirkel — anoniem of niet.","De post-its worden gedeeld en geclusterd per cirkel.","Nabespreking: wat valt op? Wat zit in het midden (de overlapping)?"],tg:["nabespreking","reflectie"],tip:"De overlapping van hoofd, hart en handen is de rijkste plek. Wie iets plaatst in het midden heeft een integratiemoment bereikt.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"laag"},
  {b:"nabespreking",n:"Forum-nabespreking (structuur)",t:"Nabespreking / Forum Theater",d:"20–30 min",g:"6–30 p.",o:"Een Forum-sessie nabespreken met aandacht voor het proces én de inhoud.",s:["Vraag 1 (feit): 'Wat zag je? Wat gebeurde er letterlijk?' — geen interpretatie.","Vraag 2 (gevoel): 'Wat raakte je? Wat was moeilijk? Wat gaf energie?'","Vraag 3 (analyse): 'Wat leer je hieruit over de situatie in het stuk? Over je eigen situatie?'","Vraag 4 (actie): 'Wat neem je mee? Wat wil je morgen anders doen?'"],tg:["nabespreking","forum theater","reflectie"],tip:"Dit is ORID toegepast op Forum. Sla vraag 1 nooit over — het verankert het gesprek in gedeelde feiten. Dat beschermt tegen projectie.",bron:"Formaat",fase:"nabespreking",niv:3,eng:"middel"},
  {b:"nabespreking",n:"Open brief aan het personage",t:"Nabespreking / derolling",d:"10–15 min",g:"4–20 p.",o:"Een brief schrijven aan het personage dat je hebt gespeeld — als manier om afstand te nemen.",s:["Iedereen pakt papier en pen. Joker: 'Schrijf een brief aan het personage dat je vandaag hebt gespeeld of gezien.'","Twee minuten schrijven — ononderbroken, niet lezen, niet corrigeren.","Wie wil leest een fragment voor.","Afsluiting: vouw de brief op. Je mag hem weggooien."],tg:["nabespreking","derolling","reflectie","personage"],tip:"De brief schept afstand tussen speler en rol. Wie schrijft 'jij bent...' in plaats van 'ik ben...' heeft de stap al gezet.",bron:"Formaat",fase:"nabespreking",niv:1,eng:"middel"},
  {b:"nabespreking",n:"Spectrum van reacties",t:"Nabespreking / positiebepaling",d:"10–15 min",g:"6–30 p.",o:"De diversiteit van reacties op een sessie zichtbaar maken — niemand heeft hetzelfde ervaren.",s:["Joker plaatst twee uitersten in de ruimte: 'Dit raakte me sterk' — 'Dit liet me koud'.","Deelnemers plaatsen zichzelf op de lijn.","Joker vraagt aan enkele posities: 'Waarom sta je hier?'","Tweede ronde met andere stelling: 'Ik voel mij nu klaar om te handelen' vs. 'Ik heb meer nodig.'"],tg:["nabespreking","reflectie","positiebepaling"],tip:"De diversiteit zelf is de boodschap. Niet iedereen is er klaar voor na één sessie — dat is eerlijk en waardevol om te zien.",bron:"Rohd",fase:"nabespreking",niv:1,eng:"laag"},
  {b:"nabespreking",n:"Twee kolommen",t:"Nabespreking / analyse",d:"15–20 min",g:"6–20 p.",o:"Wat werkte en wat niet — op flip-over, samen, zonder oordeel.",s:["Flip-over in twee kolommen: + en Δ (delta = wat kan anders, geen 'min').","Groep vult aan — anoniem via post-its of mondeling.","Joker leest alles voor, zonder commentaar.","Discussie: wat wil de groep meenemen naar de volgende keer?"],tg:["nabespreking","reflectie","joker"],tip:"Gebruik nooit de kolom 'min' of 'slecht' — Δ (delta) nodigt uit tot constructief nadenken over verandering, niet tot klagen.",bron:"Rohd",fase:"nabespreking",niv:1,eng:"middel"},
  {b:"derolling",n:"Schud het uit",t:"Derolling / lichaam",d:"3–5 min",g:"4–30 p.",o:"De rol letterlijk van het lichaam afschudden — een fysieke grens trekken.",s:["Iedereen staat. Joker: 'Schud je handen uit — alsof er iets aan kleeft.'","Schouders. Armen. Hele torso. Benen. Voeten.","Dan: hele lichaam tegelijk, met geluid.","Afsluiting: stil staan. Voel het eigen gewicht terug."],tg:["derolling","lichaam","opwarming"],tip:"Dit werkt ook als energie-reset in het midden van een sessie. Maar als derolling is de intentie essentieel — benoem dat het om de rol gaat.",bron:"Theatre for Living",fase:"afsluiting",niv:1,eng:"hoog"},
  {b:"derolling",n:"Kostuum uittrekken",t:"Derolling / ritueel",d:"5–8 min",g:"4–20 p.",o:"De rol als een denkbeeldig kostuum uitdoen — een rituele overgang.",s:["Iedereen staat. Joker: 'Voel het kostuum van je personage — hoe zit het? Hoe voelt de stof?'","Trek het uit — in verbeelding, met alle bijbehorende bewegingen.","Hang het ergens neer of leg het op de grond.","Joker: 'Dit kostuum blijft hier. Jij gaat naar huis in jouw eigen kleren.'"],tg:["derolling","ritueel","verbeelding","personage"],tip:"Wie het kostuum 'ophang' in de ruimte heeft een externe referentie. Die afstand is meer dan metafoor — het werkt.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"derolling",n:"Wat van mij, wat van het personage",t:"Derolling / analyse",d:"10–15 min",g:"4–20 p.",o:"Bewust onderscheiden wat eigen gevoel is en wat van de rol was.",s:["Iedereen schrijft of deelt mondeling: 'Wat voelde ik dat van mij was?'","Dan: 'Wat voelde ik dat van het personage was?'","Derde vraag (optioneel): 'Wat van het personage herken ik ook in mezelf?'","Joker bewaakt: dit is geen therapiesessie — het is reflectie."],tg:["derolling","identiteit","reflectie","personage"],tip:"De derde vraag is optioneel maar krachtig. Zet hem pas in als de groep voldoende veiligheid heeft en de joker zeker is over de draagkracht.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"jokertraining",n:"De maieutische houding",t:"Joker-training / houding",d:"20–25 min",g:"4–12 p.",o:"De niet-weten-houding van de Joker oefenen — vragen stellen zonder antwoord te willen.",s:["Tweetallen. A beschrijft een situatie. B mag alleen vragen stellen — geen antwoorden, geen advies, geen interpretatie.","Vijf minuten. Dan wisselen.","Grote kring: wat was moeilijk? Wanneer wilde je antwoord geven?","Nabespreking: wat is het verschil tussen vragen die openen en vragen die sturen?"],tg:["joker","aanwezigheid"],tip:"De meeste 'vragen' zijn vermomde antwoorden. 'Bedoel je dat...' is al een antwoord. Echte vragen beginnen met 'wat', 'hoe', 'wanneer' — nooit met 'of'.",bron:"Dreamers Beyond",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"Sidecoaching oefenen",t:"Joker-training / sidecoaching",d:"20–30 min",g:"6–15 p.",o:"De kunst van sidecoaching leren — interveniëren zonder het spel te onderbreken.",s:["Groep speelt een bekende oefening (bijv. Space Walk of Stop-en-Ga).","Één persoon is de joker-in-opleiding en sidecoacht — terwijl het spel loopt.","Andere deelnemers mogen achteraf feedback geven: welke coachzin opende? Welke sloot?","Wisselen: iedereen heeft een beurt als joker."],tg:["joker","stem"],tip:"Minder is meer. Eén krachtige coachzin op het juiste moment doet meer dan tien instructies. Train op timing, niet op inhoud.",bron:"Spolin",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"Interventie of inmenging?",t:"Joker-training / Forum",d:"25–30 min",g:"4–12 p.",o:"Het verschil leren voelen tussen een joker die het Forum opent en een joker die het stuurt.",s:["Twee jokers spelen dezelfde Forum-sessie met dezelfde spelers.","Joker A gebruikt directieve taal: 'Probeer dit eens', 'Dat werkt niet', 'Wie heeft een beter idee?'","Joker B gebruikt open taal: 'Wat denkt het publiek?', 'Klopt dit voor jullie?', stilte bewaren.","Groep bespreekt: wat voelde anders? Wanneer voelde je je meer of minder vrij?"],tg:["forum theater","joker","macht"],tip:"De beste joker wordt het meest gemist als hij weg is — maar het minst opgemerkt als hij er is. Dat is het paradoxale ideaal.",bron:"Formaat",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"De noodstop",t:"Joker-training / veiligheid",d:"15–20 min",g:"4–12 p.",o:"Oefenen hoe een sessie veilig af te breken — als het te zwaar wordt.",s:["Groep speelt een intensieve scène. De joker-in-opleiding moet op een bepaald moment stoppen.","Niet door te zeggen 'stop' — maar door een ritueel: een woord, een gebaar, een voorwerp.","Andere deelnemers reageren: voelden ze zich veilig? Wat werkte?","Nabespreking: hoe weet je wanneer het te veel is?"],tg:["vertrouwen","joker"],tip:"Elke joker moet een noodstop hebben die niet aan discussie onderhevig is. Oefen die — zodat hij er is als hij nodig is.",bron:"Formaat",fase:"jokertraining",niv:1,eng:"middel"},
  {b:"jokertraining",n:"Joker als getuige",t:"Joker-training / houding",d:"20–25 min",g:"4–12 p.",o:"De joker als getuige leren zien — aanwezig maar niet centraal.",s:["Een groep speelt een Forum-sessie. Één persoon observeert als 'schaduwjoker'.","De schaduwjoker schrijft wat hij/zij ziet — wat de actieve joker doet, mist, of vermijdt.","Na de sessie: schaduwjoker deelt observaties — altijd als vragen, nooit als oordeel.","Wisselen."],tg:["observatie","verhaal","reflectie"],tip:"De schaduwjoker ziet wat de actieve joker niet ziet — omdat actie en observatie niet tegelijk kunnen. Maak van die blinde vlek een leerplek.",bron:"Dreamers Beyond",fase:"jokertraining",niv:1,eng:"laag"},
  {b:"stem",n:"Vocale ruimte verkennen",t:"Stem / exploratie",d:"10–15 min",g:"6–20 p.",o:"De eigen stem in alle registers verkennen — van fluisteren tot vol geluid.",s:["Begin met een fluistering op de uitadem — de kleinste stem.","Langzaam opbouwen: adem + geluid, dan toon, dan gevuld geluid.","Joker: 'Zoek de bovenkant van je stem. Dan de onderkant. Dan het midden.'","Afsluiting: iedereen zingt/toon samen op één noot — hoe lang het duurt."],tg:["stem","ensemble"],tip:"Geen mooie stem nodig. Elke stem heeft een register, en elk register een kleur. De oefening is de verkenning, niet het resultaat.",bron:"Grotowski",fase:"opwarming",niv:1,eng:"middel"},
  {b:"stem",n:"Tekst als muziek",t:"Stem / taal",d:"15–20 min",g:"4–20 p.",o:"Een tekst spelen als muziek — zonder de betekenis te begrijpen.",s:["Kies een korte tekst die de groep niet kent (andere taal, of onzin).","Iedereen leest de tekst hardop — maar let alleen op ritme, toon en klank, niet op betekenis.","Variaties: fluisteren, zingen, stampen.","Dan: iedereen vertelt wat ze dachten dat de tekst betekende."],tg:["stem","taal","muziek"],tip:"De betekenisloze tekst bevrijdt de stem van intellectuele controle. Wie niet weet wat hij zegt, luistert naar hoe hij het zegt.",bron:"Spolin",fase:"opwarming",niv:1,eng:"middel"},
  {b:"nabespreking",n:"Lichaamsevaluatie",t:"Nabespreking / lichamelijk",d:"5–10 min",g:"6–30 p.",o:"De sessie evalueren via het lichaam — niet via woorden maar via houding.",s:["Joker: 'Sta op een plek in de ruimte die toont hoe je je voelt aan het eind van deze dag.'","Iedereen kiest vrij een positie — dicht bij de deur, in het midden, in een hoek, liggend.","Joker observeert en beschrijft wat hij ziet — zonder oordeel.","Optioneel: wie wil legt één zin uit bij zijn positie."],tg:["nabespreking","lichaam","reflectie","positiebepaling"],tip:"De ruimtelijke evaluatie zegt meer dan elke vragenlijst. Wie bij de deur staat is er al bijna uit — letterlijk en figuurlijk.",bron:"Boal",fase:"nabespreking",niv:1,eng:"middel"},
  {b:"nabespreking",n:"Het laatste beeld",t:"Nabespreking / Image Theater",d:"10–15 min",g:"6–20 p.",o:"De sessie samenvatten in één bevroren beeld — wat de groep mee naar huis neemt.",s:["Joker: 'Maak een beeld van wat deze dag voor jou was — in je lichaam.'","Iedereen maakt tegelijk een beeld — geen overleg.","Joker vraagt drie à vier mensen om te beschrijven wat ze zien.","Optioneel: groep maakt samen één collectief eindbeeld."],tg:["nabespreking","image theater","geheugen"],tip:"Het beeld is niet de samenvatting — het is de essentie. Vraag nooit om uitleg. Het beeld ís al wat het moet zijn.",bron:"Boal",fase:"nabespreking",niv:2,eng:"middel"},
  {b:"afsluiting",n:"Dankwoord in drie",t:"Afsluiting / verbinding",d:"5–10 min",g:"6–25 p.",o:"Drie mensen bedanken voor iets concreets — de verbinding benoemen voor het afscheid.",s:["Joker: 'Loop door de ruimte. Bedank drie mensen — voor iets concreets wat ze vandaag deden of zeiden.'","Geen algemeen 'bedankt voor alles' — specifiek en gericht.","Iedereen loopt totdat de ruimte tot rust komt.","Joker sluit af: 'Dat was vandaag. Dank.'"],tg:["ritueel","contact"],tip:"De specificiteit is het geschenk. 'Bedankt dat je op dat moment stilstond' is rijker dan 'bedankt voor je aanwezigheid'.",bron:"Dreamers Beyond",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"afsluiting",n:"De cirkel van intenties",t:"Afsluiting / actie",d:"10–15 min",g:"6–25 p.",o:"De sessie afsluiten met een collectieve cirkel van intenties — wie neemt wat mee?",s:["Kring. Joker: 'Wat neem je mee de wereld in? Één woord of één zin.'","Om de beurt, zonder herhaling of commentaar.","Joker herhaalt de intenties: 'Dit nemen we mee.'","Optioneel: de groep herhaalt elke intentie samen."],tg:["ritueel","ensemble","reflectie"],tip:"De collectieve herhaling van intenties maakt ze publiek. Wat je hardop hebt gezegd in bijzijn van anderen, doe je sneller ook buiten de ruimte.",bron:"Dreamers Beyond",fase:"afsluiting",niv:1,eng:"middel"},
  {b:"afsluiting",n:"Oogcontact afsluiting",t:"Afsluiting / contact",d:"5 min",g:"6–30 p.",o:"In stilte oogcontact maken met iedereen in de kring — als non-verbaal afscheid.",s:["Kring. In stilte.","Joker: 'Kijk iedereen in de kring aan — neem de tijd. Één seconde per persoon is genoeg.'","Geen woorden. Alleen oogcontact.","Joker sluit af na de laatste blik: 'Dank.'"],tg:["oogcontact","stilte","contact"],tip:"Dit is het krachtigste en het kwetsbaarste afscheid. Doe het alleen als de groep voldoende veiligheid heeft opgebouwd. Dan is het onvergetelijk.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"afsluiting",n:"Stille cirkel",t:"Afsluiting / stilte",d:"3–5 min",g:"6–30 p.",o:"Een minuut stilte houden samen — als eerbetoon aan wat er was.",s:["Kring. Iedereen staat.","Joker: 'We staan hier één minuut in stilte — voor alles wat er was in deze ruimte.'","Geen instructies, geen muziek. Gewoon stilte.","Na de minuut: joker knikt of maakt een kleine beweging. Klaar."],tg:["stilte","ritueel","concentratie"],tip:"Een minuut stilte is langer dan je denkt. Houd hem vol. Wie er ongemakkelijk bij is, leert iets over zijn relatie met stilte.",bron:"Formaat",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"afsluiting",n:"Collectieve adem",t:"Afsluiting / adem",d:"3–5 min",g:"6–40 p.",o:"De sessie afsluiten met een gezamenlijke ademhaling — een collectief lichaam.",s:["Kring, dicht bij elkaar. Iedereen legt de handen op de schouders van de buren.","Joker begeleidt: 'Adem samen in — vier tellen. Samen uit — vier tellen.'","Drie ronden. Dan vrij ademen.","Afsluiting: handen loslaten. De groep is klaar."],tg:["adem","ensemble","ritueel"],tip:"De fysieke verbinding (handen op schouders) plus de gedeelde adem maakt van de kring letterlijk één lichaam. Dat is de ervaring waarop de sessie eindigt.",bron:"Dreamers Beyond",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"lichaam",n:"Punt van contact",t:"Contact Improvisation / duet",d:"15–20 min",g:"Even aantal p.",o:"Twee lichamen verbonden op één punt — dat punt is het leiderschap.",s:["Tweetallen. Ze maken contact op één punt: hand aan hand, rug aan rug, schouder aan schouder.","Dat contactpunt beweegt — maar raakt nooit los.","Wie leidt? Niemand bepaalt dat vooraf — het contact bepaalt.","Variatie: het contactpunt mag wisselen — maar niet onderbroken."],tg:["contact","leiden","volgen","lichaam"],tip:"Het contact is het woordeloze gesprek. Wie probeert te leiden verliest het. Wie luistert via het contactpunt, danst.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Gewicht delen",t:"Contact Improvisation / vertrouwen",d:"15–20 min",g:"Even aantal p.",o:"Gewicht letterlijk delen — het eigen gewicht als geschenk aan de ander.",s:["Tweetallen staan zij aan zij, schouder raakt schouder.","Langzaam: laat een beetje gewicht in de schouder van de ander zakken.","De ander ontvangt — en geeft ook gewicht terug.","Opbouwen: meer gewicht, andere contactpunten, bewegen terwijl het gewicht gedeeld is."],tg:["contact","vertrouwen","lichaam"],tip:"Gewicht delen is het meest directe vertrouwen — het lichaam kan niet liegen over hoeveel het geeft en ontvangt.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"lichaam",n:"Val en vang (continu)",t:"Contact Improvisation / ensemble",d:"15–20 min",g:"6–20 p.",o:"In een kleine groep continu vallen en opvangen — zonder vooraf afspreken wie wanneer vangt.",s:["Groep van vijf à zes staat dicht bij elkaar.","Iedereen kan op elk moment (licht) vallen in een willekeurige richting.","De groep vangt zonder aanwijzing — het groepslichaam is alert.","Variatie: ogen dicht voor wie valt."],tg:["contact","ensemble","vertrouwen"],tip:"De alertheid van het groepslichaam is de oefening. Wie met zijn aandacht erbij blijft vangt — wie afdwaalt mist iemand. Dat voelt iedereen.",bron:"Theatre for Living",fase:"vertrouwen",niv:1,eng:"middel"},
  {b:"geheugen",n:"Dubbel (inner voice)",t:"Psychodrama / innerlijk",d:"20–30 min",g:"4–15 p.",o:"De verborgen innerlijke stem van een personage hoorbaar maken — de dubbel spreekt wat het personage zwijgt.",s:["Een scène wordt gespeeld. Joker kiest een dubbel voor de protagonist.","De dubbel staat naast de protagonist en spreekt zijn innerlijke gedachten hardop — terwijl de scène loopt.","De protagonist speelt gewoon door — maar mag het contact zoeken met de dubbel.","Variatie: de protagonist kiest zelf zijn dubbel."],tg:["psychodrama","innerlijk","personage"],tip:"De dubbel spreekt wat het personage niet kan zeggen. Dit is niet de mening van de joker — het is een hypothese. De protagonist corrigeert als het niet klopt.",bron:"Formaat",fase:"verdieping",niv:3,eng:"laag"},
  {b:"geheugen",n:"Rolwisseling (Moreno)",t:"Psychodrama / perspectief",d:"20–30 min",g:"4–15 p.",o:"Volledig van rol wisselen — de antagonist spelen om hem van binnenuit te begrijpen.",s:["Een scène wordt gespeeld. Joker stopt en vraagt protagonist en antagonist van rol te wisselen.","De vorige protagonist speelt nu de antagonist — en omgekeerd.","De scène wordt opnieuw gespeeld — vanuit de nieuwe rollen.","Nabespreking: wat begrijp je nu dat je daarvoor niet begreep?"],tg:["psychodrama","perspectief"],tip:"Rolwisseling is geen empathie-oefening per se — het is een cognitieve operatie. Wie de antagonist speelt begrijpt zijn logica. Dat is harder en waardevoller.",bron:"Formaat",fase:"verdieping",niv:3,eng:"middel"},
  {b:"geheugen",n:"Surplus reality",t:"Psychodrama / verbeelding",d:"25–35 min",g:"4–15 p.",o:"Uitspelen wat in het werkelijke leven niet mogelijk was — het gesprek dat nooit plaatsvond.",s:["Protagonist beschrijft een situatie waarbij hij iets niet heeft kunnen zeggen of doen.","Joker: 'Als je het gesprek opnieuw mocht doen — wat zou je dan zeggen?'","De scène wordt gespeeld in de surplus reality: de ideale versie.","Nabespreking: hoe voelde dat anders? Wat is nu mogelijk in het echte leven?"],tg:["psychodrama","verlangen"],tip:"Surplus reality is geen wensdenken — het is een oefenruimte. Wie in de verbeelding uitgesproken heeft wat hij moest zeggen, draagt het lichter.",bron:"Formaat",fase:"verdieping",niv:3,eng:"middel"},
  {b:"lichaam",n:"De clown ontdekken",t:"Clown / buffo",d:"20–30 min",g:"6–20 p.",o:"De eigen clown ontdekken — niet door grappig te zijn, maar door écht aanwezig te zijn.",s:["Iedereen loopt in de ruimte. Joker: 'Loop alsof je het publiek niet ziet.'","Dan: 'Loop alsof je het publiek ziet — en weet niet wat je moet doen.'","Wie in verlegenheid raakt, staat stil en kijkt — dat is de clown.","Variatie: zet een rode neus op. Zie wat er verandert."],tg:["clown","aanwezigheid"],tip:"De clown is niet de grap — de clown is de mislukking die zichtbaar wordt. Wie dat durft te tonen, maakt theater.",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},
  {b:"lichaam",n:"Buffo-moment",t:"Clown / theatervorm",d:"15–20 min",g:"6–20 p.",o:"Een moment van totale mislukking als theater aanbieden — en het publiek meenemen.",s:["Een speler probeert iets simpels — een stoel neerzetten, een woord uitspreken.","Het gaat mis. De speler weet het. Het publiek weet het.","De speler blijft staan — kijkt het publiek aan — zonder het te verbergen.","Variatie: hoe lang kun je de mislukking vasthouden zonder hem op te lossen?"],tg:["clown","aanwezigheid"],tip:"De buffo staat bij de mislukking zoals anderen bij een succes staan. Die bereidheid is het theater. Wie vlucht voor de mislukking, verliest de clown.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"middel"},
  {b:"geheugen",n:"Verbatim monoloog",t:"Documentair / verhaal",d:"25–35 min",g:"4–20 p.",o:"De eigen woorden van een ander spelen — letterlijk, zonder interpretatie.",s:["Deelnemers interviewen elkaar kort over een concrete ervaring (5 minuten).","Ze leren de letterlijke woorden van de ander — geen parafrase, geen samenvatting.","Ze spelen die woorden aan de grote groep: de stem, het ritme, de aarzelingen.","Nabespreking: wie voelde je spelen? Jezelf of de ander?"],tg:["verhaal","stem"],tip:"Verbatim theater vraagt om nauwkeurigheid, niet om imitatie. Het gaat erom de ander te dragen — als een kostuum dat je met respect draagt.",bron:"Dreamers Beyond",fase:"verdieping",niv:2,eng:"middel"},
  {b:"geheugen",n:"Het interview als theater",t:"Documentair / methode",d:"20–30 min",g:"4–20 p.",o:"Een interview voeren dat direct bruikbaar is als theatertekst.",s:["Interviewer stelt alleen open vragen — nooit gesloten, nooit suggestief.","De geïnterviewde spreekt vrij — de interviewer noteer letterlijke zinnen die resoneren.","Na het interview: de interviewer leest de geselecteerde zinnen hardop voor.","De geïnterviewde luistert: klopt dit? Zijn dit mijn woorden?"],tg:["verhaal","taal"],tip:"De interviewer is de eerste dramaturgie — de keuze van welke zinnen hij noteert is al een artistieke daad. Maak dat bewust.",bron:"Dreamers Beyond",fase:"verdieping",niv:1,eng:"middel"},

  // Moshe Feldenkrais (1904–1984) / Awareness Through Movement (1972)

  // ═══════════════════════════════════════════════════════
  // DEEP RESEARCH AANVULLING — vijf domeinen
  // Playback Theatre · Geese/Masker · Lecoq · Rohd · Online
  // ═══════════════════════════════════════════════════════

  // ── PLAYBACK THEATRE ────────────────────────────────────
  {b:"beeld",n:"Fluid Sculptures",t:"Playback Theatre / korte vorm",d:"10–15 min",g:"4–20 p.",o:"Het wezen van een gevoel of moment belichamen via geluid, beweging en poëtische taal — als groep, organisch opgebouwd.",s:["Verteller deelt een kort gevoel of moment. De Joker herhaalt het in kernwoorden.","Spelers komen één voor één naar voren en voegen een herhalende beweging met geluid toe — elk bouwt voort op wat er al is.","De sculptuur groeit tot een levend, bewegend ensemble. De eerste speler bevriest als afsluiting.","Joker vraagt de verteller: 'Klopt dit?' Verteller beantwoordt non-verbaal of met één woord."],tg:["playback","ensemble","gevoel"],tip:"De sculptuur is geen illustratie — het is een resonantie. Spelers zoeken de essentie, niet de letterlijke weergave. Muziek op de achtergrond (live of opgenomen) ondersteunt enorm.",bron:"Playback Theatre",fase:"beeldentheater",niv:2,eng:"middel"},

  {b:"beeld",n:"Pairs — twee gevoelens tegelijk",t:"Playback Theatre / korte vorm",d:"8–12 min",g:"4–20 p.",o:"Het menselijke van ambivalentie zichtbaar maken — twee tegenstrijdige gevoelens tegelijk in het lichaam dragen.",s:["Verteller beschrijft twee tegenstrijdige gevoelens tegelijk. Joker selecteert twee spelers.","De spelers staan rug aan rug. De voorste verbeeldt gevoel A — met geluid, beweging, taal. Dan draaien ze: de achterste verbeeldt gevoel B.","Ze wisselen een paar keer — elke wissel laat het andere gevoel spreken. Nooit tegelijk.","Joker vraagt de verteller: 'Herken je dit?' Stilte. Dan verder."],tg:["playback","gevoel"],tip:"Pairs werkt het sterkst als de twee gevoelens écht tegenstrijdig zijn — niet complementair. Wees scherp in het bevragen van de verteller welke twee gevoelens het zijn.",bron:"Playback Theatre",fase:"beeldentheater",niv:2,eng:"middel"},

  {b:"beeld",n:"Chorus — een koor van stemmen",t:"Playback Theatre / middelvorm",d:"15–20 min",g:"6–20 p.",o:"Een collectief antwoord geven op een verhaal of gevoel — het ensemble beweegt als één organisme.",s:["Na een gedeeld verhaal of gevoel: alle spelers komen naar voren en clusteren dicht bij elkaar.","Één speler doet een aanbod — beweging, geluid, fragment van taal. De anderen nemen het direct over en bouwen erop voort.","Elk nieuw aanbod wordt onmiddellijk geaccepteerd. Er is geen regisseur — het koor reguleert zichzelf.","Afsluiting: het koor stilt organisch. Stilte. Joker vraagt de verteller of de reactie raak was."],tg:["playback","ensemble"],tip:"Het koor faalt als iemand probeert te regisseren. De kracht zit in de overgave aan het collectief. Oefen dit eerst zonder publiek, zodat spelers de reflex leren.",bron:"Playback Theatre",fase:"beeldentheater",niv:3,eng:"middel"},

  {b:"beeld",n:"Drie zinnen",t:"Playback Theatre / micro-vorm",d:"5–8 min",g:"4–20 p.",o:"Een verhaal of gevoel terugspelen in precies drie zinnen — economie als kunstgreep.",s:["Joker vraagt de verteller om de kern van zijn verhaal in drie zinnen samen te vatten — of kiest ze zelf na het luisteren.","Drie spelers, elk één zin. Elk belichaamt hun zin via beweging, stem en ruimte — dan bevriezen.","De drie beelden staan naast elkaar als een drieluik.","Joker vraagt: 'Klopt dit?' Verteller antwoordt."],tg:["playback","beweging","image theater"],tip:"De keuze van de drie zinnen is de dramaturgische daad. De Joker die goed luistert en de juiste drie zinnen kiest, maakt een klein kunstwerk van elk verhaal.",bron:"Playback Theatre",fase:"beeldentheater",niv:2,eng:"laag"},

  // ── GEESE THEATRE / MASKERWERK ──────────────────────────
  {b:"beeld",n:"De maskers die we dragen",t:"Geese Theatre / maskertherapie",d:"20–30 min",g:"6–20 p.",o:"Ontdekken welke sociale maskers iemand draagt — en wat er achter zit.",s:["Joker introduceert het concept: 'We dragen allemaal maskers — op het werk, bij vrienden, bij vreemden. Dat is niet slecht. Het is menselijk.'","Iedereen bedenkt één masker dat ze regelmatig dragen. Ze tonen het non-verbaal — houding, gezicht, energie.","Joker vraagt per persoon: 'Wat beschermt dit masker? Wat verbergt het?'","Variatie: masker oplichten — een moment tonen wat er achter zit. Niet verplicht."],tg:["masker","identiteit"],tip:"Het masker is nooit de vijand — het heeft een functie gehad. Behandel het met respect. De vraag is niet 'gooi het weg' maar 'wanneer helpt het je, wanneer hindert het je?'",bron:"Formaat",fase:"beeldentheater",niv:2,eng:"laag"},

  {b:"beeld",n:"Masker oplichten",t:"Geese Theatre / maskertherapie",d:"20–30 min",g:"4–15 p.",o:"In een veilige context het achterliggende gevoel of de kwetsbare realiteit tonen die normaal verborgen blijft.",s:["Na de vorige oefening of na een intensieve scène: iedereen staat met hun masker op (houding, uitdrukking).","Joker begeleidt rustig: 'Als je je masker een klein beetje oplicht — niet helemaal, alleen een spleet — wat zou er dan zichtbaar worden?'","Wie wil: een moment tonen. Geen woorden verplicht. De rest getuigt in stilte.","Afsluiting: masker terug op. Adem. We zijn terug."],tg:["masker","gevoel","identiteit","verhaal"],tip:"Dit is een van de krachtigste en gevaarlijkste oefeningen in dit arsenaal. Nooit inzetten zonder stevige groepsband. Altijd een derolling-oefening erop laten volgen.",bron:"Formaat",fase:"beeldentheater",niv:3,eng:"laag"},

  {b:"lichaam",n:"Neutraal masker — de ontdekking",t:"Lecoq / neutraal masker",d:"20–30 min",g:"4–16 p.",o:"Het lichaam ontdoen van gewoontes en maniertjes — tot een aanwezigheid die open staat voor alles wat er is.",s:["Eén persoon draagt een neutraal masker (of dekt het gezicht af met een lap). Ze beginnen liggend op de vloer — niets, stilte, geen intentie.","Joker begeleidt: 'Je wordt wakker voor de eerste keer. Je ontdekt je handen. Dan de ruimte. Dan de anderen.'","De gemaskerde persoon verkennt de ruimte als iemand die alles voor het eerst ziet — zonder oordeel, zonder doel.","De groep observeert in stilte. Joker stopt als de neutraalheid verloren gaat."],tg:["masker","aanwezigheid"],tip:"Het masker werkt alleen als het gezicht letterlijk bedekt is — anders speelt de acteur met zijn gezicht. Zonder masker of lap werkt de oefening niet. De neutrale staat is vóór het karakter, vóór de emotie.",bron:"Formaat",fase:"verdieping",niv:2,eng:"laag"},

  {b:"lichaam",n:"Identificatie met de natuur",t:"Lecoq / mimodynamiek",d:"15–20 min",g:"6–25 p.",o:"De bewegingskwaliteiten van natuur-elementen in het lichaam opnemen — als basis voor theatraal bewegen.",s:["Joker beschrijft langzaam: 'Je bent de zee. Niet de zee spelen — de zee zijn. Voel de herhaling, de massa, de trage energie.'","Iedereen beweegt als zee: ritme, gewicht, richting. Geen beslissingen — alleen volgen.","Wissel na enkele minuten naar: vuur, wind, aarde, rots. Elke overgang via stilstand.","Afsluiting: terug neutraal. Loop gewoon. Wat is er veranderd in het lopen?"],tg:["masker","ruimte","beweging"],tip:"Lecoq noemde dit 'identificatie' — niet imitatie. Het verschil: imitatie kopieert de vorm, identificatie probeert de ervaring van binnenuit te kennen. Vraag daarna: wat van de zee zit er nog in je lopen?",bron:"Formaat",fase:"opwarming",niv:1,eng:"middel"},

  {b:"lichaam",n:"Economie van beweging",t:"Lecoq / neutraal lichaam",d:"15–20 min",g:"6–20 p.",o:"Leren bewegen zonder overbodige energie — elke beweging heeft een doel, een richting, een einde.",s:["Iedereen loopt door de ruimte. Joker: 'Doe niets extra's. Geen maniertjes, geen versiering. Alleen wat nodig is om te lopen.'","Stop. Hef de rechterarm. Zo economisch mogelijk — geen extra spanning, geen gedraai in de schouder.","Wissel: arm optillen met onnodige energie (schouder omhoog, hoofd scheef, overademen). Voel het verschil.","Discussie: wanneer gebruik je onnodig veel energie? In welke sociale situaties?"],tg:["masker","beweging","aanwezigheid","reflectie"],tip:"De link naar TvO is direct: onderdrukking staat in het lichaam als overtollige spanning. Wie leert economisch bewegen, leert ook de lichamelijke last van sociale rollen zien.",bron:"Formaat",fase:"opwarming",niv:1,eng:"laag"},

  // ── ROHD — HOPE IS VITAL ────────────────────────────────
  {b:"vertrouwen",n:"Vul de Ruimte",t:"Rohd / energetica",d:"5–8 min",g:"8–30 p.",o:"De groep leren de ruimte gelijkmatig te vullen — als metafoor voor gelijkwaardigheid en collectieve verantwoordelijkheid.",s:["Iedereen loopt door de ruimte. Joker: 'Vul de ruimte gelijkmatig — elke plek even bezet. Geen klompen, geen lege hoeken.'","Joker roept namen: 'Als je naam valt, stop dan. De rest vult de leegte op.'","Variatie: de groep moet stilstaan als de ruimte perfect gevuld is — maar niemand geeft het teken. De groep beslist samen.","Nabespreking: wanneer zie je dit in het echte leven — wie vult de ruimte, wie trekt zich terug?"],tg:["ruimte","ensemble","opwarming"],tip:"Cover the Space is een politieke oefening verpakt als ruimtespel. De vraag 'wie vult de ruimte' is een vraag over macht. Benoem dat na de oefening als de groep er klaar voor is.",bron:"Rohd",fase:"opwarming",niv:1,eng:"hoog"},

  {b:"vertrouwen",n:"Twee Onthullingen",t:"Rohd / brug-activiteit",d:"15–20 min",g:"6–25 p.",o:"Van individuele ervaring naar gedeeld thema gaan — twee persoonlijke onthullingen als brug naar Forum-materiaal.",s:["Iedereen schrijft twee zinnen: 'Een moment waarop ik me machteloos voelde' en 'Een moment waarop ik macht had.'","In tweetallen: elk deelt één van de twee zinnen. Luisteren, geen reactie.","Groep: wie wil deelt met het geheel. Joker noteert thema's op flip-over — geen namen.","Welke thema's komen het meest voor? Dit wordt het materiaal voor de volgende fase."],tg:["gevoel","macht"],tip:"Two Revelations is Rohds meest elegante brug-oefening. Ze genereert materiaal voor Forum zonder dat deelnemers weten dat ze materiaal aan het genereren zijn. De flip-over is de dramaturgie.",bron:"Rohd",fase:"vertrouwen",niv:1,eng:"laag"},

  {b:"geheugen",n:"Rondleiding door een Plek",t:"Rohd / verbeelding",d:"15–20 min",g:"6–20 p.",o:"Een betekenisvolle plek uit het geheugen opnieuw bewonen — als voorbereiding op scène-materiaal.",s:["Iedereen sluit de ogen. Joker begeleidt: 'Ga naar een plek die belangrijk voor je is. Niet de mooiste — de meest betekenisvolle.'","Loop er doorheen: vloer, wanden, lucht, geur, geluid. Wie woont er? Wat staat er?","Open de ogen. Teken de plattegrond op papier — twee minuten.","Tweetallen: geef een rondleiding in de ruimte — als gids. De ander stelt alleen vragen."],tg:["geheugen","verbeelding","verhaal"],tip:"De plattegrond is geen doel — het is een geheugensteun. Wie de ruimte tekent voor hij hem beschrijft, herinnert details die anders verloren gaan. Die details worden scène-materiaal.",bron:"Rohd",fase:"verdieping",niv:2,eng:"laag"},


  // ── ONLINE / HYBRIDE FACILITATION ──────────────────────
  {b:"opening",n:"Online check-in — camera aan/uit",t:"Online facilitation / opening",d:"5–8 min",g:"4–30 p.",o:"Een bewust check-in-ritueel voor online sessies waarbij de camera als drempel wordt gebruikt.",s:["Alle camera's zijn uit. Joker: 'Camera aan betekent: ik ben er, ik ben aanwezig. Zet je camera aan als je er klaar voor bent.'","Geen haast. Wie klaar is, zet aan. Joker observeert rustig wie wanneer aansluit.","Als iedereen aan is: 'We zijn hier. Welkom.' Één korte ronde: naam + één woord over hoe je erbij zit.","Optioneel: camera's weer uit voor een moment stilte, dan samen aan."],tg:["online","check-in","aanwezigheid"],tip:"De camera is de drempel. Wie wacht op 'iedereen tegelijk' mist de kracht van dit ritueel. Laat de groep zelf de timing bepalen.",bron:"Dreamers Beyond",fase:"opening",niv:1,eng:"laag"},

  {b:"beeld",n:"Beeldenwerk via camera",t:"Online facilitation / Image Theater",d:"15–20 min",g:"4–20 p.",o:"Bevroren beelden maken op een videoscherm — de camera als theatrale ruimte.",s:["Joker geeft een opdracht: 'Maak een beeld van hoe jij je verhoudt tot macht. Gebruik alleen je lichaam, je gezicht en wat er achter je hangt.'","Iedereen maakt het beeld — camera aan, beeld bevriezen.","Joker neemt een screenshot of vraagt iedereen het beeld te beschrijven.","Dynamisch beeld: Joker vraagt één persoon het beeld te transformeren naar het ideaalbeeld. De rest volgt."],tg:["online","image theater","macht"],tip:"De camera snijdt het beeld af op schouderhoogte. Dat is een beperking én een kracht — alleen bovenlichaam en gezicht. De deelnemers leren met minder meer te zeggen.",bron:"Dreamers Beyond",fase:"beeldentheater",niv:2,eng:"laag"},

  {b:"lichaam",n:"Ruimtewandeling online",t:"Online facilitation / lichaamswerk",d:"8–12 min",g:"4–25 p.",o:"De klassieke Space Walk aanpassen voor de eigen woonruimte — beweging als aanwezigheid op afstand.",s:["Joker: 'Loop door je eigen ruimte. Elk scherm is een andere deelnemer. Groet wie je tegenkomt.'","Vijf minuten beweegvrij door de eigen kamer — tempostimuli via de Joker: snel, langzaam, als iemand die iets zoekt.","Optioneel: stop en kijk naar één scherm. Maak oogcontact. Houd het vast.","Terugkomen: ga zitten. Voel het verschil."],tg:["online","beweging","aanwezigheid"],tip:"De ruimte van elk scherm is ook theatraal materiaal. Wie achter een witte muur zit vertelt iets anders dan wie voor een rommelig bureau zit. Benoem dat later als het relevant is.",bron:"Dreamers Beyond",fase:"opwarming",niv:1,eng:"middel"},

  {b:"nabespreking",n:"Hybride nabespreking",t:"Online facilitation / nabespreking",d:"10–15 min",g:"4–30 p.",o:"Een nabespreking voeren die mensen in de zaal én online gelijkwaardig laat deelnemen.",s:["Joker benoemt expliciet: 'We doen dit nu samen — in de zaal en online. Ik wil van beide kanten horen.'","Eerste ronde: online deelnemers spreken. Zaal luistert, camera's op de online groep gericht.","Tweede ronde: zaal spreekt. Online deelnemers zetten microfoon aan als ze reageren.","Afsluiting: één woord per persoon — gelijktijdig, zaal en online samen."],tg:["online","nabespreking","ensemble","joker"],tip:"In hybride sessies heeft de zaal altijd meer energie en aandacht dan de online groep. De Joker compenseert dit actief door online stemmen explicieter uit te nodigen en de zaal meer naar hen te laten luisteren.",bron:"Dreamers Beyond",fase:"nabespreking",niv:2,eng:"middel"},

  {b:"jokertraining",n:"Techniek als Joker-instrument",t:"Online facilitation / jokertraining",d:"20–25 min",g:"4–12 p.",o:"Leren hoe je technische hulpmiddelen (breakout rooms, chat, polls) als dramaturgisch gereedschap inzet — niet als noodzakelijk kwaad.",s:["Drie gereedschappen verkennen: breakout rooms (tweetallen-werk), chat (anonieme bijdragen), whiteboard (gezamenlijk beeld).","Oefening: een Forum-probleemsituatie wordt online besproken via breakout rooms. Groepen van drie, vijf minuten.","Terugkomen: chat wordt gebruikt om interventie-ideeën te delen — iedereen typt tegelijk.","Nabespreking: welke tool opende het gesprek, welke sloot het?"],tg:["online"],tip:"De breakout room is de hedendaagse equivalent van de kleine kring. Vijf minuten in tweetallen doet meer dan twintig minuten plenair debat. Gebruik het bewust, niet als logistiek hulpmiddel.",bron:"Dreamers Beyond",fase:"jokertraining",niv:2,eng:"middel"},


  // ═══════════════════════════════════════════════════════
  // KRANTENTHEATER — 12 technieken van Augusto Boal
  // Bron: Theater der Unterdrückten (1979) / Games for Actors and Non-Actors (1992)
  // ═══════════════════════════════════════════════════════

  {b:"geheugen",n:"Ritmisch lezen",t:"Krantentheater / techniek",d:"10–15 min",g:"6–25 p.",o:"Een krantenartikel lezen op een muzikaal ritme — waardoor de verborgen inhoud zichtbaar wordt.",s:["Kies een artikel over een politiek of sociaal onderwerp. Lees het hardop voor — gewoon, neutraal.","Lees het opnieuw, maar nu op het ritme van een mars. Dan een wals. Dan een tango.","Bespreek: wat veranderde er? Welk ritme maakte de inhoud belachelijk? Welk maakte het gevaarlijker?","Variatie: twee lezers tegelijk, elk een ander ritme."],tg:["krantentheater","media","taal","macht","analyse"],tip:"Het ritme is een kritisch filter. Een politieke toespraak op walsmaat onthult iets wat de tekst zelf verbergt. Kies het ritme niet willekeurig — laat de groep kiezen en bespreek waarom.",bron:"Boal",fase:"verdieping",niv:2,eng:"middel"},

  {b:"geheugen",n:"Parallelle actie",t:"Krantentheater / techniek",d:"10–15 min",g:"6–20 p.",o:"Het nieuws hoorbaar maken terwijl de werkelijkheid erachter zichtbaar wordt — tekst en beeld tegelijk.",s:["Één persoon leest een nieuwsbericht hardop voor — kalm en neutraal.","Andere spelers beelden tegelijkertijd uit wat er werkelijk plaatsvond — zonder woorden.","Het publiek ziet beide tegelijk: de taal van het nieuws én de lichamelijke werkelijkheid.","Bespreek: wat zegt het beeld dat de tekst verzwijgt?"],tg:["krantentheater","media","onderdrukking","analyse","taal"],tip:"De kracht zit in het contrast. Kies een artikel waarin de officiële toon en de lichamelijke realiteit zo ver mogelijk uit elkaar liggen — dat maakt de oefening het scherpst.",bron:"Boal",fase:"verdieping",niv:2,eng:"middel"},

  {b:"geheugen",n:"Tekst uit context",t:"Krantentheater / techniek",d:"10–15 min",g:"6–20 p.",o:"Een nieuwsartikel presenteren buiten zijn originele context — waardoor de taal zelf het onderwerp wordt.",s:["Kies een tekst: een politieke speech, een grondwetsartikel, een advertentie.","Lees het voor in een compleet andere context: als huwelijksgeloften, als kindergebed, als overlijdensbericht.","De groep luistert en reageert op wat de tekst nu betekent.","Bespreek: wat onthult de nieuwe context dat de originele context verborg?"],tg:["krantentheater","taal","macht","analyse","media"],tip:"Dit werkt het best met teksten die zichzelf serieus nemen. Een wettekst als liefdesbrief voorgelezen onthult de menselijke kosten van abstracte taal.",bron:"Boal",fase:"verdieping",niv:1,eng:"laag"},

  {b:"geheugen",n:"Gemimed lezen",t:"Krantentheater / techniek",d:"10–15 min",g:"6–20 p.",o:"De kloof tussen tekst en presentatie zo groot maken dat het nieuws zijn eigen karikatuur wordt.",s:["Één persoon leest een serieus artikel voor — over crisis, armoede, oorlog.","Een andere speler zit aan tafel met veel eten, lacht, geniet — terwijl de tekst wordt gelezen.","Of: een speech over zuinigheid wordt gehouden vanuit een luxe stoel.","Bespreek: wat zegt het contrast? Wie zit er werkelijk in die stoel?"],tg:["krantentheater","media","karikatuur","macht","analyse"],tip:"De mime is geen grap — het is een politieke daad. De groep moet de ernst van de oefening voelen, niet er om lachen. Als ze lachen, is dat ook informatie.",bron:"Boal",fase:"verdieping",niv:2,eng:"middel"},

  {b:"geheugen",n:"Historisering",t:"Krantentheater / techniek",d:"15–20 min",g:"6–20 p.",o:"Het nieuws verbinden met historische momenten — om aan te tonen dat wat als nieuw wordt gepresenteerd al eerder is gebeurd.",s:["Lees een actueel nieuwsbericht voor.","Groep zoekt in geheugen en kennis: wanneer is dit eerder gebeurd? In welk land, welke tijd?","Speel beide naast elkaar: het heden en het historische moment.","Bespreek: wat leert de herhaling ons? Wat verandert er, wat niet?"],tg:["krantentheater","geheugen","analyse","macht","verhaal"],tip:"Historisering is geen intellectuele oefening — het is een vorm van collectief geheugen activeren. Laat de groep zelf de verbindingen maken. Jij hoeft de geschiedenis niet te kennen.",bron:"Boal",fase:"verdieping",niv:2,eng:"laag"},

  {b:"geheugen",n:"Versterking",t:"Krantentheater / techniek",d:"10–15 min",g:"6–20 p.",o:"Het artikel vergezeld laten gaan van liedjes, beelden of reclamemateriaal — om de ideologische lading te versterken of te ontkrachten.",s:["Kies een artikel. Kies ook een liedje — commercieel, nationalistisch, of protestlied.","Lees het artikel terwijl het liedje gespeeld of gezongen wordt.","Eerste ronde: liedje versterkt de boodschap. Tweede ronde: liedje ondermijnt de boodschap.","Bespreek: welke combinatie onthult meer?"],tg:["krantentheater","media","muziek","analyse","macht"],tip:"De keuze van het liedje is een politieke keuze. Laat de groep kiezen — en bespreek daarna waarom ze kozen wat ze kozen.",bron:"Boal",fase:"verdieping",niv:2,eng:"middel"},

  {b:"geheugen",n:"Herdefiniëring",t:"Krantentheater / techniek",d:"15–20 min",g:"6–20 p.",o:"Eufemismen en verhullend taalgebruik in het nieuws zichtbaar maken en herdefiniëren.",s:["Lees een artikel. Markeer de eufemismen: 'opvangcentrum', 'bijsturing', 'vrijwillig vertrek', 'collateral damage'.","Groep stelt voor elke term de werkelijke definitie op — zonder verhulling.","Lees het artikel opnieuw met de werkelijke termen in plaats van de eufemismen.","Bespreek: hoe verandert de betekenis van het artikel?"],tg:["krantentheater","taal","macht","media","analyse"],tip:"Dit is de meest analytische van de krantentheatertechnieken. Ze werkt het best als voorbereiding op een Forum-sessie over hetzelfde onderwerp.",bron:"Boal",fase:"verdieping",niv:2,eng:"laag"},

  {b:"geheugen",n:"Improvisatie op nieuws",t:"Krantentheater / techniek",d:"20–30 min",g:"6–20 p.",o:"Een nieuwsbericht omzetten in een geïmproviseerde scène — en zo alle varianten en mogelijkheden verkennen.",s:["Kies een artikel over een concrete situatie: ontslag, uitzetting, conflict op de werkvloer.","Kleine groepen van drie à vier spelen de scène spontaan — zonder voorbereiding.","Elke groep speelt een andere variant: een andere afloop, een andere protagonist.","Plenair: welke varianten bestaan er? Welke is het meest realistisch? Welke het meest gewenst?"],tg:["krantentheater","improvisatie","verhaal","analyse","forum theater"],tip:"Dit is de brug van krantentheater naar Forum Theater. Als één variant bijzonder resonant is voor de groep, is dat het materiaal voor een volgende Forum-sessie.",bron:"Boal",fase:"verdieping",niv:2,eng:"middel"},

  {b:"geheugen",n:"Empathie — wat het nieuws verzwijgt",t:"Krantentheater / techniek",d:"15–20 min",g:"6–20 p.",o:"Het nieuws aanvullen met wat er niet wordt afgedrukt: de gevoelens, het lijden, de menselijke ervaring.",s:["Lees een artikel over een ramp, een beslissing, een statistiek.","Groep stelt vast: wie staat er niet in dit artikel? Wiens gevoel ontbreekt?","Speel die stem: een monoloog, een brief, een lichamelijk beeld van wie niet geciteerd werd.","Bespreek: wat verandert er aan ons begrip van de situatie?"],tg:["krantentheater","empathie","media","verhaal","onderdrukking"],tip:"Dit is de menselijkste van de krantentheatertechnieken. Ze kan onverwacht diep gaan — zeker als iemand in de groep persoonlijk geraakt wordt door het onderwerp. Wees als Joker alert.",bron:"Boal",fase:"verdieping",niv:2,eng:"laag"},

  // ── DAVID DIAMOND / THEATRE FOR LIVING ────────────────────
  {b:"lichaam",n:"Snelle Gebaren",t:"Theatre for Living / lichaamswerk",d:"15–20 min",g:"6–20 p.",o:"Van non-verbaal naar gesproken theater via gefaseerde opbouw — perfect voor mensen die 'blokkeren' bij spreken.",s:["Groep in een rij aan één kant van de ruimte. Persoon A komt naar het midden en biedt een open-ended gebaar aan. Drie keer herhalen vanuit neutraal.","Eén voor één: persoon B rent naar binnen, A maakt gebaar, B reageert met ander gebaar, A reageert, B rent weg. Snelheid is essentieel.","Nieuwe A, nieuw gebaar. Tweede laag: gebaar + enkele woorden die direct uit de beweging ontstaan.","Derde laag: improvisatie — gebaar met woorden uitbouwen tot er een volledig gesprek ontstaat."],tg:["lichaam","improvisatie","taal","vertrouwen"],tip:"Het werkt omdat gesproken taal evolutionair uit lichaamsgebaar ontstond. Wie vastloopt in spreken kan via het lichaam de weg terug vinden. Hou het snel en onoordolend.",bron:"Theatre for Living",fase:"opwarming",niv:2,eng:"middel"},

  {b:"beeld",n:"Geluid en Gebaar Karakter",t:"Theatre for Living / karaktervorming",d:"20–30 min",g:"6–20 p.",o:"Van lichaamsbeeld naar diepgaande improvisatie via geluid, beweging en polariteit.",s:["Na beeldenwerk: één persoon toont hun vormbeeld opnieuw. 'Dit is het beeld van de onderdrukte. Maak er een gebaar van — van neutraal naar dit beeld.'","Voeg geluid toe — geen woorden, alleen klank die bij het gebaar hoort. Drie keer herhalen: neutraal-gebaar-geluid-neutraal.","Andere persoon leert het gebaar én geluid van de onderdrukker. Geen uitleg — alleen voorbeeld en nabootsing.","Geluidsconversatie: alleen met geluid en gebaar wisselend praten. Dan plotseling overgaan naar woorden — eerste spreker bepaalt de realiteit."],tg:["beeld","personage","improvisatie","geluid"],tip:"Diamond gebruikt bewust de onderdrukker/onderdrukte-dichotomie als laboratorium-instrument — om juist de complexiteit te vinden, niet om simpele antwoorden te krijgen. De eerste zin na geluid is cruciaal.",bron:"Theatre for Living",fase:"beeldentheater",niv:3,eng:"middel"},

  {b:"beeld",n:"Groepen van 4 — resonantie",t:"Theatre for Living / ensemble",d:"25–35 min",g:"12–40 p.",o:"Van individueel vormbeeld naar collectief verhaal via emotionele herkenning en groepering.",s:["Na individueel vormwerk (auto-sculpting): 'Blijf in je vorm en kijk rond. Zoek vormen die op de jouwe lijken — emotioneel of fysiek.'","Groepeer jezelf bij de vorm waar je resonantie mee voelt. Volg eventuele kettingreacties.","In kleine kringen: bespreek de emoties achter je vorm. Vind wat jullie verbindt — benoem dat als een vorm van strijd.","Één persoon per groep gaat naar voren met hun oorspronkelijke vorm. Sound and gesture-werk om karakters te creëren."],tg:["beeld","ensemble","verhaal","groepsgevoel"],tip:"De fysieke groepering is informatie — wie zoekt elkaar op? Wie blijft alleen? Diamond noemt dit 'de loners/outcasts' — ook dat wordt een groep. De resonantie is dramaturgisch materiaal.",bron:"Theatre for Living",fase:"beeldentheater",niv:2,eng:"middel"},

  {b:"beeld",n:"Orkest van Emoties",t:"Theatre for Living / animatie",d:"10–15 min",g:"6–25 p.",o:"Alle emoties in een beeld tegelijkertijd hoorbaar maken — een 'sound landscape' van het maatschappelijke moment.",s:["Een bebeeld is gemaakt en iedereen heeft zijn positie ingenomen.","Joker vraagt elke speler: 'Wat is de emotie van je karakter in dit moment? Maak daar een geluid bij — geen woorden.'","Op het teken van de joker: alle emoties tegelijk laten horen. Langzaam opbouwen, dan volledig.","Joker kan dirigeren: sommige luider, andere zachter. Wat ontstaat er voor geluidstapijt?"],tg:["beeld","geluid","groepsgevoel","animatie"],tip:"Dit ontstond spontaan in Diamonds workshop. De kracht zit niet in elk individueel geluid maar in de collectieve harmonie of dissonantie. Wat je hoort ís de sociale situatie.",bron:"Theatre for Living",fase:"beeldentheater",niv:1,eng:"middel"},

  {b:"beeld",n:"Beeld naar Dans",t:"Theatre for Living / ritueel",d:"30–45 min",g:"6–20 p.",o:"Van sociaal probleem naar dans/ritueel — abstractie die dieper kan reiken dan realisme.",s:["Kies een krachtig beeld uit eerdere werk. Spelers nemen posities in.","Innerlijke monoloog: 'Wat is je essentie in dit beeld? Ben je water, vuur, wind, een boom? Voel de klank van wat je bent.'","Laat het geluid en ritme van je essentie groeien. Dan beweging — ogen open of dicht, naar behoefte.","Choreografeer het resultaat tot dans die zowel abstract als herkenbaar is voor de community."],tg:["beeld","dans","ritueel","transformatie","beweging"],tip:"Ontwikkeld met Hal Blackwater (1998). Niet elke groep is klaar voor deze abstractie — gebruik alleen na meerdere dagen beeldenwerk. Het resultaat kan healing zijn voor communities.",bron:"Theatre for Living",fase:"verdieping",niv:3,eng:"hoog"},

  // Ubuntu — Arun Naicker (Umtapo Centre, Durban, 2019) + Wangari Maathai
  {b:"kennismaking",n:"Sawubona",t:"Icebreaker / kennismaking",d:"10–15 min",g:"10–40 p.",o:"Relationele aanwezigheid oefenen — niet 'ik ben er' maar 'ik besta doordat jij mij ziet'. Openen met een andere grondtoon dan het westerse 'hallo'.",s:["Deelnemers vormen paren. Eén is A, één is B.","A zegt tegen B: 'Sawubona' (Zoeloe: ik zie je). B antwoordt: 'Sikhona' (ik ben er, omdat jij mij ziet besta ik).","Oogcontact volhouden tijdens de uitwisseling — niet haastig.","Wissel van partner. Drie rondes in totaal.","Kort napraten: hoe voelde het anders ontvangen te zijn dan in 'hi, how are you'?"],tg:["kennismaking","ritueel","relatie"],tip:"Introduceer met de bron: dit is geen algemene Afrikaanse groet maar specifiek Zoeloe — opgenomen in Formaat-werk via Arun Naicker (Umtapo Centre, Durban, 2019). Voorbeeld-uitspraak vooraf doen. Dit is geen ceremonie; het is een oefening geïnspireerd door een groet. Geen mystificatie.",bron:"Umtapo 2019",fase:"opening",niv:1,eng:"laag"},
  {b:"beeld",n:"Ubuntu-beeld",t:"Image Theater",d:"15–25 min",g:"8–30 p.",o:"Het principe 'ik ben omdat jij bent' belichaamd maken — niet als idee, als spierherinnering. Onderscheid voelen tussen alleen-zijn, versmelting, en relationaliteit.",s:["Opdracht 1: bouw stil een beeld van 'ik ben alleen'. Iedereen boetseert zichzelf. Houden.","Kijk rond. Noteer wat je ziet — lichamen, hoogtes, gezichten.","Opdracht 2: 'ik ben met anderen, als één massa'. Opnieuw bouwen.","Opdracht 3: 'ik ben omdat jij bent — maar wij blijven twee'. Dit is het moeilijkste. Laat ze zoeken.","Kort gesprek: welk beeld voelde het waarst? Wat was het verschil tussen beeld 2 (versmelting) en beeld 3 (relationaliteit)?"],tg:["beeld","verbinding","identiteit"],tip:"Verwijs bij opdracht 3 naar Michael Eze: Ubuntu is niet 'ik ben omdat wij zijn' (versmelting) maar 'ik ben omdat jij bent' (relationaliteit, de ander blijft ander). Dit onderscheid is ethisch belangrijk — het distantieert Ubuntu van tribalisme. Geef deelnemers tijd om het derde beeld te zoeken; het is subtieler.",bron:"Umtapo 2019",fase:"verdieping",niv:2,eng:"middel"},
  {b:"afsluiting",n:"Hand-imprint",t:"Afsluiting / rites de passage",d:"15–20 min",g:"5–30 p.",o:"De sessie landen in een tastbaar persoonlijk document. Waarden, obstakel en concrete stap in één beeld.",s:["Elk krijgt een vel A4 en een pen.","Teken de omtrek van je eigen hand op het papier.","In elk van de vijf vingers: schrijf één waarde die je uit deze sessie meeneemt.","In de palm: de vraag 'Wat weerhoudt mij?' — schrijf je eerlijke antwoord.","Op de pols: één concrete stap die je deze week zet.","Optioneel: kort delen in de cirkel, of iemand leest alleen zijn pols-stap voor."],tg:["afsluiting","waarden","agency"],tip:"Directe vertaling uit Arun Naicker's draaiboek (Ubuntu Session, Umtapo Centre, 14 juli 2019). Geen heilig ritueel — een reflectiemiddel. Benoem de bron bij introductie. Het papier mag mee naar huis; zichtbaar op de werkplek werkt de pols-stap beter.",bron:"Umtapo 2019",fase:"afsluiting",niv:1,eng:"laag"},
  {b:"afsluiting",n:"Kolibrie-pledge",t:"Afsluiting / rites de passage",d:"10–15 min",g:"6–40 p.",o:"Individuele agency in een collectief ritueel plaatsen. Elk benoemt zijn 'druppel', de groep erkent hem.",s:["Vertel het kolibrie-verhaal: een bos staat in brand, de dieren kijken verlamd toe. De kolibrie vliegt heen en weer met één druppel water. De olifant lacht: 'Wat denk je dat je uitricht?' De kolibrie: 'I am doing the best I can.'","Stilte van 30 seconden. Iedereen denkt aan: wat is mijn druppel?","In de cirkel deelt elk in één zin: 'Mijn druppel is ___'.","Na elke zin herhaalt de groep in koor: '___ is jouw druppel'.","Sluit af zonder commentaar. De pledges hangen in de lucht."],tg:["afsluiting","agency","ritueel"],tip:"Het verhaal is oorspronkelijk Japans; door Wangari Maathai (Green Belt Movement, Kenia) omarmd en wereldwijd verspreid. Noem beide bronnen. De koorherhaling maakt het ritueel collectief — laat de groep niet commentariëren of aanmoedigen; alleen herhalen. Stilte na afloop is belangrijker dan een applaus.",bron:"Maathai",fase:"afsluiting",niv:1,eng:"middel"},

];

// ── STATE ──────────────────────────────────────────────
var sessie = [];
try { sessie = JSON.parse(localStorage.getItem('to-sessie') || '[]'); } catch(e) { sessie = []; }

var gef = [], h = 0, actFase = 'alle', actNiv = 'alle', actEng = 'alle', actBron = 'alle', zoekQ = '';

// ── SESSIE HELPERS ────────────────────────────────────
function inSessie(naam) {
  return sessie.some(function(s) { return s.naam === naam; });
}

function saveSessie() {
  try { localStorage.setItem('to-sessie', JSON.stringify(sessie)); } catch(e) {}
}

function parseDuur(d) {
  var nums = (d || '').match(/\d+/);
  return nums ? parseInt(nums[0]) : 15;
}

function addToSessie(naam) {
  if (inSessie(naam)) return;
  var o = D.find(function(x) { return x.n === naam; });
  if (!o) return;
  sessie.push({ naam: o.n, fase: o.fase || '', duur: parseDuur(o.d), eng: o.eng || 'middel', niv: o.niv || 1 });
  saveSessie();
  renderSessie();
  renderKaartKnop();
}

function removeNaam(naam) {
  var i = sessie.findIndex(function(s) { return s.naam === naam; });
  if (i >= 0) { sessie.splice(i, 1); saveSessie(); renderSessie(); renderKaartKnop(); }
}

function wisSessione() {
  if (!sessie.length) return;
  if (confirm('Sessie wissen?')) { sessie = []; saveSessie(); renderSessie(); renderKaartKnop(); }
}

function kopieerSessie() {
  if (!sessie.length) { alert('Sessie is leeg.'); return; }
  var tot = sessie.reduce(function(a, s) { return a + s.duur; }, 0);
  var txt = 'SESSIE — TO Archief\nTotale duur: ' + tot + ' min\n\n';
  sessie.forEach(function(s, i) { txt += (i+1) + '. ' + s.naam + ' (' + s.duur + ' min)\n'; });
  navigator.clipboard.writeText(txt).then(function() { alert('Gekopieerd!'); });
}

function toggleSB() {
  document.getElementById('sb-panel').classList.toggle('open');
  document.getElementById('sb-icon').classList.toggle('open');
}

var engKleuren = { hoog: '#b85a1e', middel: '#3a5a2e', laag: '#1e3a7c' };
var faseKleuren = { opening:'#2e5c3a', opwarming:'#3a4a1e', vertrouwen:'#1e3a5c', verdieping:'#5c2e4a', forum:'#5c3a1e', nabespreking:'#2e3a5c', afsluiting:'#4a3a1e', jokertraining:'#3a1e5c' };

function renderSessie() {
  var list = document.getElementById('sb-list');
  var n = sessie.length;
  document.getElementById('sb-n').textContent = n;
  var cntEl = document.getElementById('sb-cnt');
  cntEl.textContent = n;
  cntEl.style.display = n ? 'inline' : 'none';

  if (!n) {
    list.innerHTML = '<div class="sb-empty">Voeg oefeningen toe via de + knop op elke kaart</div>';
    document.getElementById('sb-tot').textContent = '0 min';
    document.getElementById('sb-uren').textContent = '';
    document.getElementById('sb-duur-tog').textContent = '';
    document.getElementById('sb-eng-lbl').textContent = '—';
    document.getElementById('sb-niv-lbl').textContent = '';
    document.getElementById('sb-arc').innerHTML = '';
    return;
  }

  var tot = sessie.reduce(function(a, s) { return a + s.duur; }, 0);
  document.getElementById('sb-tot').textContent = tot + ' min';
  var u = Math.floor(tot/60), m = tot % 60;
  document.getElementById('sb-uren').textContent = u > 0 ? u + 'u ' + m + 'm' : '';
  document.getElementById('sb-duur-tog').textContent = '· ' + tot + ' min';

  var engCount = { hoog:0, middel:0, laag:0 };
  sessie.forEach(function(s) { engCount[s.eng || 'middel']++; });
  var dom = Object.keys(engCount).sort(function(a,b){ return engCount[b]-engCount[a]; })[0];
  var engLabels = { hoog:'Actief', middel:'Gevarieerd', laag:'Rustig' };
  document.getElementById('sb-eng-lbl').textContent = engLabels[dom] || dom;

  var niv1 = sessie.filter(function(s){ return s.niv === 1; }).length;
  document.getElementById('sb-niv-lbl').textContent = niv1 === n ? 'Toegankelijk' : 'Gemengd';

  var arc = document.getElementById('sb-arc');
  arc.innerHTML = '';
  sessie.forEach(function(s) {
    var seg = document.createElement('div');
    seg.className = 'sb-arc-seg';
    seg.style.background = engKleuren[s.eng] || '#888';
    seg.style.flex = s.duur;
    seg.title = s.naam + ' (' + s.duur + ' min)';
    arc.appendChild(seg);
  });

  list.innerHTML = '';
  sessie.forEach(function(s, i) {
    var el = document.createElement('div');
    el.className = 'sb-item';
    el.draggable = true;
    el.dataset.index = i;
    var faseKleur = faseKleuren[s.fase] || '#888';
    var engKleur = engKleuren[s.eng] || '#888';
    var engPijl = s.eng === 'hoog' ? '↑' : s.eng === 'laag' ? '↓' : '→';
    el.innerHTML =
      '<div class="sb-nr">' + (i+1) + '</div>' +
      '<div class="sb-handle" title="Sleep om te verplaatsen">⋮⋮</div>' +
      '<div class="sb-controls">' +
        '<button class="sb-arrow" onclick="moveSessieItem(' + i + ', -1)" title="Omhoog" ' + (i === 0 ? 'disabled' : '') + '>▲</button>' +
        '<button class="sb-arrow" onclick="moveSessieItem(' + i + ', 1)" title="Omlaag" ' + (i === sessie.length-1 ? 'disabled' : '') + '>▼</button>' +
      '</div>' +
      '<div class="sb-info">' +
        '<div class="sb-name">' + s.naam + '</div>' +
        '<div class="sb-sub">' +
          '<span>' + s.duur + ' min</span>' +
          '<span style="color:' + faseKleur + '">' + (s.fase || '') + '</span>' +
          '<span style="color:' + engKleur + '">' + engPijl + ' ' + (s.eng || 'middel') + '</span>' +
        '</div>' +
      '</div>' +
      '<button class="sb-rm" onclick="removeNaam(\'' + s.naam.replace(/'/g,"\\'") + '\')" title="Verwijderen">×</button>';
    
    // Drag event listeners
    el.addEventListener('dragstart', handleDragStart);
    el.addEventListener('dragover', handleDragOver);
    el.addEventListener('dragleave', handleDragLeave);
    el.addEventListener('drop', handleDrop);
    el.addEventListener('dragend', handleDragEnd);
    
    list.appendChild(el);
  });
}

// ── SESSIE HERORDENING ────────────────────────────────────
function moveSessieItem(index, direction) {
  var newIndex = index + direction;
  if (newIndex < 0 || newIndex >= sessie.length) return;
  
  var item = sessie.splice(index, 1)[0];
  sessie.splice(newIndex, 0, item);
  saveSessie();
  renderSessie();
}

// Drag & Drop state
var draggedElement = null;

function handleDragStart(e) {
  draggedElement = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/html', this.outerHTML);
}

function handleDragOver(e) {
  if (e.preventDefault) e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.classList.add('drag-over');
  return false;
}

function handleDragLeave(e) {
  this.classList.remove('drag-over');
}

function handleDrop(e) {
  if (e.stopPropagation) e.stopPropagation();
  
  if (draggedElement !== this) {
    var draggedIndex = parseInt(draggedElement.dataset.index);
    var targetIndex = parseInt(this.dataset.index);
    
    // Move item in array
    var item = sessie.splice(draggedIndex, 1)[0];
    sessie.splice(targetIndex, 0, item);
    
    saveSessie();
    renderSessie();
  }
  
  return false;
}

function handleDragEnd(e) {
  var items = document.querySelectorAll('.sb-item');
  items.forEach(function(item) {
    item.classList.remove('dragging', 'drag-over');
  });
  draggedElement = null;
}

function renderKaartKnop() {
  var btn = document.getElementById('sb-kaart-btn');
  if (!btn) return;
  var naam = btn.dataset.naam;
  var isIn = inSessie(naam);
  btn.classList.toggle('in-sessie', isIn);
  btn.textContent = isIn ? '− Verwijder uit sessie' : '+ Voeg toe aan sessie';
}

// ── FILTER ────────────────────────────────────────────
function filterData() {
  var r = D.slice();
  if (actFase !== 'alle') r = r.filter(function(o){ return o.fase === actFase; });
  if (actNiv !== 'alle') r = r.filter(function(o){ return o.niv === parseInt(actNiv); });
  if (actEng !== 'alle') r = r.filter(function(o){ return o.eng === actEng; });
  if (actBron !== 'alle') r = r.filter(function(o){ return o.bron === actBron; });
  if (zoekQ) {
    var q = zoekQ.toLowerCase();
    r = r.filter(function(o){
      return o.n.toLowerCase().indexOf(q) >= 0 ||
             o.o.toLowerCase().indexOf(q) >= 0 ||
             (o.tg && o.tg.some(function(t){ return t.toLowerCase().indexOf(q) >= 0; }));
    });
  }
  return r;
}

function apply() {
  gef = filterData();
  h = 0;
  document.getElementById('hc').textContent = gef.length;
  dots();
  render();
}

function goRandom() {
  if (!gef.length) return;
  h = Math.floor(Math.random() * gef.length);
  render();
}

// ── BRONNEN ───────────────────────────────────────────
var brons = [];

// ── FASE TABS ─────────────────────────────────────────
document.querySelectorAll('.ptab').forEach(function(b) {
  b.onclick = function() {
    actFase = b.dataset.f;
    document.querySelectorAll('.ptab').forEach(function(x){ x.classList.toggle('on', x.dataset.f === b.dataset.f); });
    apply();
  };
});

// ── NIVEAU CHIPS ──────────────────────────────────────
document.querySelectorAll('#niv-chips .chip').forEach(function(b) {
  b.onclick = function() {
    actNiv = b.dataset.n;
    document.querySelectorAll('#niv-chips .chip').forEach(function(x){ x.classList.toggle('on', x.dataset.n === b.dataset.n); });
    apply();
  };
});

// ── ENERGIE CHIPS ─────────────────────────────────────
document.querySelectorAll('#eng-chips .chip').forEach(function(b) {
  b.onclick = function() {
    actEng = b.dataset.e;
    document.querySelectorAll('#eng-chips .chip').forEach(function(x){ x.classList.toggle('on', x.dataset.e === b.dataset.e); });
    apply();
  };
});

// ── ZOEKEN ────────────────────────────────────────────
var srch = document.getElementById('srch');
var clr = document.getElementById('clr');
srch.oninput = function() {
  zoekQ = srch.value.trim();
  clr.classList.toggle('show', zoekQ.length > 0);
  apply();
};
function clearSearch() { srch.value = ''; zoekQ = ''; clr.classList.remove('show'); srch.focus(); apply(); }

// ── LABELS ───────────────────────────────────────────
var catLabel = {lichaam:'Lichaam',zintuigen:'Zintuigen',vertrouwen:'Vertrouwen',beeld:'Beeld',geheugen:'Geheugen',forum:'Forum',kennismaking:'Kennismaking',afsluiting:'Afsluiting',opening:'Opening',stem:'Stem & adem',nabespreking:'Nabespreking',derolling:'Derolling',jokertraining:'Joker-training'};
var faseLabel = {alle:'Alle fases',opening:'Opening',opwarming:'Opwarming',vertrouwen:'Vertrouwen',verdieping:'Verdieping',beeldentheater:'Beeldentheater',repetitie:'Repetitie',forum:'Forum',nabespreking:'Nabespreking',afsluiting:'Afsluiting',jokertraining:'Joker-training'};

function nivBadge(n) {
  var labels = {1:'Toegankelijk',2:'Gevorderd',3:'Intensief'};
  var cls = {1:'niv1',2:'niv2',3:'niv3'};
  return '<span class="badge-niveau ' + (cls[n]||'niv1') + '">' + (labels[n]||'Toegankelijk') + '</span>';
}
function engBadge(e) {
  var labels = {hoog:'↑ Hoge energie',middel:'→ Middel',laag:'↓ Rustig'};
  var cls = {hoog:'eng-hoog',middel:'eng-middel',laag:'eng-laag'};
  return '<span class="badge-energie ' + (cls[e]||'eng-middel') + '">' + (labels[e]||'Middel') + '</span>';
}
function bronClass(b) {
  var map = {'Spolin':'tbron-spolin','Johnstone':'tbron-johnstone','Playback Theatre':'tbron-playback','Rohd':'tbron-rohd','Grotowski':'tbron-grotowski','Feldenkrais':'tbron-feldenkrais'};
  return 'tag-bron' + (map[b] ? ' ' + map[b] : '');
}

// ── DOTS ─────────────────────────────────────────────
function dots() {
  var ds = document.getElementById('ds');
  ds.innerHTML = '';
  gef.forEach(function(_, i) {
    var d = document.createElement('span');
    d.className = 'ndot' + (i === h ? ' on' : '');
    d.onclick = function() { h = i; render(); };
    ds.appendChild(d);
  });
}

// ── RENDER ───────────────────────────────────────────
function render() {
  var kw = document.getElementById('kw');
  if (!gef.length) {
    kw.innerHTML = '<div class="empty"><p>Geen oefeningen gevonden.<br>Pas de filters aan.</p></div>';
    document.getElementById('ct').textContent = '0 / 0';
    document.getElementById('pv').disabled = true;
    document.getElementById('nx').disabled = true;
    return;
  }
  var o = gef[h];
  document.getElementById('ct').textContent = (h+1) + ' / ' + gef.length;
  document.getElementById('pv').disabled = h === 0;
  document.getElementById('nx').disabled = h === gef.length - 1;
  document.querySelectorAll('.ndot').forEach(function(d, i) {
    d.className = 'ndot' + (i === h ? ' on' : '');
  });

  var catLbl = catLabel[o.b] || o.b;
  var faseLbl = faseLabel[o.fase] || o.fase;
  var stappen = o.s.map(function(s, i) {
    return '<div class="step"><span class="step-nr">' + (i+1) + '</span><span class="step-txt">' + s + '</span></div>';
  }).join('');
  var catTagMap = {lichaam:'lichaam',zintuigen:'zintuigen',vertrouwen:'vertrouwen',beeld:'image theater',geheugen:'geheugen',forum:'forum theater',kennismaking:'kennismaking',afsluiting:'afsluiting',opening:'check-in',stem:'stem',nabespreking:'nabespreking',derolling:'derolling',jokertraining:'joker'};
  var skipTags = new Set([o.b, catTagMap[o.b], o.fase]);
  var tags = o.tg.filter(function(t){ return !skipTags.has(t); }).map(function(t) {
    return '<span class="tag tag-kw">' + t + '</span>';
  }).join('');
  var isIn = inSessie(o.n);

  kw.innerHTML =
    '<div class="card">' +
    '<div class="card-head">' +
      '<div class="cat-stripe cs-' + o.b + '"></div>' +
      '<div class="card-badges">' +
        '<span class="badge-fase">' + faseLbl + '</span>' +
        nivBadge(o.niv) +
        engBadge(o.eng) +
      '</div>' +
      '<div class="card-type">' + o.t + '</div>' +
      '<h2 class="card-name">' + o.n + '</h2>' +
    '</div>' +
    '<div class="card-meta">' +
      '<div class="meta-cell"><div class="meta-lbl">Duur</div><div class="meta-val">' + o.d + '</div></div>' +
      '<div class="meta-cell"><div class="meta-lbl">Groep</div><div class="meta-val">' + o.g + '</div></div>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="section"><span class="section-lbl">Doel</span><p class="doel">' + o.o + '</p></div>' +
      '<div class="section"><span class="section-lbl">Stappen</span><div class="steps">' + stappen + '</div></div>' +
    '</div>' +
    '<div class="card-tags">' +
      
      '<span class="tag tag-cat">' + catLbl + '</span>' +
      tags +
    '</div>' +
    '<div class="card-tip"><span class="tip-lbl">Joker tip</span><p class="tip-txt">' + o.tip + '</p></div>' +
    '<button class="card-add-btn' + (isIn ? ' in-sessie' : '') + '" id="sb-kaart-btn" data-naam="">' +
      (isIn ? '− Verwijder uit sessie' : '+ Voeg toe aan sessie') +
    '</button>' +
    '</div>';

  var btn = document.getElementById('sb-kaart-btn');
  if (btn) {
    btn.dataset.naam = o.n;
    btn.onclick = function() {
      var naam = this.dataset.naam;
      if (inSessie(naam)) { removeNaam(naam); } else { addToSessie(naam); }
    };
  }
}

// ── NAV ──────────────────────────────────────────────
document.getElementById('pv').onclick = function() { if (h > 0) { h--; render(); } };
document.getElementById('nx').onclick = function() { if (h < gef.length - 1) { h++; render(); } };
// 'r' blijft via aparte listener; arrows via ArsenaalNav
document.addEventListener('keydown', function(e) {
  if (e.target === srch) return;
  if (e.altKey || e.ctrlKey || e.metaKey) return;
  if (e.key === 'r' || e.key === 'R') { goRandom(); }
});

window.addEventListener('DOMContentLoaded', () => {
  ArsenaalNav.init({
    horizontal: {
      next: () => { if (h < gef.length - 1) { h++; render(); } },
      prev: () => { if (h > 0) { h--; render(); } }
    }
  });
});

// ── START ─────────────────────────────────────────────
renderSessie();
apply();
</script>
