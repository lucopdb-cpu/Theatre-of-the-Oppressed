<script>
const D=[

  // ORIËNTATIE — BLOOTSTELLING
  {b:"oriëntatie",n:"Exposure (Blootstelling)",t:"Oriëntatiegame / podiumvrees",d:"10–15 min",g:"8–30 p.",o:"De ongemakkelijkheid van geobserveerd worden voelen — en ontdekken dat een taak die angst opheft. Direct toepasbaar voor dirigenten en performers die podiumvrees kennen.",s:["Groepen spelers staan voor het publiek. Geen opdracht — gewoon staan en geobserveerd worden.","Na een minuut: geef spelers een simpele taak, bijv. tel de stoelen in de ruimte.","Evaluatie: wie voelde ongemak bij het staan? Wat veranderde er bij de taak?","Bespreek: de aanwezigheid van een focus trekt de aandacht weg van zelfoordeel."],tg:["podiumvrees","focus","aanwezigheid","evaluatie"],tip:"Dit is het startpunt van bijna elk Spolin-traject. De ontdekking dat een taak podiumvrees opheft is de kern van haar pedagogiek: wie zich richt op de focus, vergeet beoordeeld te worden.",bron:"Spolin 1999, p.53"},

  // ORIËNTATIE — MIRROR SERIES
  {b:"oriëntatie",n:"Mirror (Spiegel)",t:"Oriëntatiegame / lichaamsbewustzijn",d:"15–20 min",g:"6–30 p.",o:"De verhouding tussen leiden en volgen ervaren via spiegeling — alle aspecten van de fysieke expressie van de ander overnemen: gebaren, houding, gezichtsuitdrukking.",s:["Tweetallen staan tegenover elkaar. Afspreken wie leider is, wie volger.","De volger spiegelt de leider zo precies mogelijk — alle ledematen, houding, gezichtsexpressie.","Na enkele minuten: rollen wisselen zonder dat de beweging stopt.","Variant: wie leidt en wie volgt wordt onduidelijk — beweging ontstaat simultaan."],tg:["leiden","volgen","simultaan","gezichtsexpressie"],tip:"De volger loopt altijd net achter de leider — precies zoals muzikanten achter de dirigent aanlopen. Een leider die te snel of te abrupt beweegt verliest de ander. Wie langzaam beweegt ontdekt aandacht voor detail en lichaamsbesef.",bron:"Spolin 1999, pp.61–63"},

  // ORIËNTATIE — NO MOTION
  {b:"oriëntatie",n:"No Motion Warm-Up",t:"Oriëntatiegame / bewegingsbewustzijn",d:"10–15 min",g:"8–30 p.",o:"Bewegen vanuit het concept 'geen beweging' — denk aan je motie als stilstaande beelden in een duimflipboekje. Bevrijdt spanning en maakt bewegingen moeiteloos.",s:["Iedereen loopt door de ruimte. De side coach roept: 'Focus op de momenten zonder beweging.'","Stel je voor dat je beweging een serie stilstaande foto's is — niet de vloeiende overgang, maar de stilstaande beelden.","Leg de nadruk op elk bevroren moment. Wat voelt er anders?","Nabespreking: welke spanning verdween? Wat werd lichter?"],tg:["spanning","moeiteloos","beweging","bewustzijn"],tip:"Dit gaat direct over hoe dirigenten leren: wie minder spanning in de arm heeft, communiceert helderder. De 'no motion'-focus heft onbewuste spierspanning op zonder dat je er direct op richt.",bron:"Spolin 1999, p.83"},

  // ORIËNTATIE — SPACE WALK
  {b:"oriëntatie",n:"Space Walk (Ruimtewandeling)",t:"Oriëntatiegame / fysicalisering",d:"15–20 min",g:"8–30 p.",o:"Bewegen door ruimtes met een andere substantie of sfeer — de verbeelding creëert een weerstand of stemming die het lichaam vanzelf uitdrukt.",s:["Iedereen loopt door de ruimte. Side coach: 'De ruimte is dik en stroperig — als honing.'","Volg de veranderende ruimte: water, magnetische vloer, bevroren lucht, drukke straat.","Variatie: verander niet de substantie maar de sfeer: lopen door de stad na slecht nieuws; door een feestmenigte.","Nabespreking: wat deed het lichaam vanzelf?"],tg:["verbeelding","weerstand","expressie","fysicalisering"],tip:"Dit is de eerste stap naar fysicalisering van emotie en karakter. Wie door 'honing' loopt hoeft niet te 'acteren' — het lichaam reageert vanzelf. Voor dirigenten: hetzelfde geldt voor hoe je de muziek voelt in je lichaam.",bron:"Spolin 1999, pp.83–84"},

  // SPACE SUBSTANCE — HANDEN
  {b:"ruimte",n:"Space Substance Introduction — Handen",t:"Ruimtespel / beginnersniveau",d:"10–15 min",g:"6–30 p.",o:"De ruimte tussen je handpalmen als echte substantie ervaren — en ontdekken dat denkbeeldige voorwerpen echt worden als je ze serieus behandelt.",s:["Sta rechtop. Houd beide handpalmen tegenover elkaar, 20–40 cm uit elkaar.","Focus op de ruimtesubstantie tussen je handen. Wat zit er tussen?","Verander de afstand — groter, kleiner — en observeer hoe de ruimte zich gedraagt.","Laat de hands vanzelf een vorm aannemen. Wat houd je vast?"],tg:["ruimtesubstantie","handen","verbeelding","beginners"],tip:"Dit is het startpunt voor alle space object-spelen. De ervaring van grootte, gewicht, temperatuur en dichtheid in de denkbeeldige ruimte maakt latere gebaren organisch. Wie dit overslaat gebaard altijd iets hoogs.",bron:"Spolin 1999, p.391"},

  // SPACE SHAPING — SOLO
  {b:"ruimte",n:"Space Shaping — Solo",t:"Ruimtespel / solo",d:"10–15 min",g:"6–30 p.",o:"De ruimtesubstantie laten uitharden tot een voorwerp — en dat voorwerp vervolgens op alle manieren manipuleren.",s:["Begin vanuit de Space Substance Introduction. Er is een vorm tussen je handen.","Laat de substantie uitvloeien naar de rest van je handen en armen. Wat neem je vast?","Manipuleer het voorwerp: draai het om, verander het formaat, breng het gewicht over.","Wissel van voorwerp. Dezelfde ruimte kan van een groot vel papier een zware steen worden."],tg:["ruimtesubstantie","solo","manipulatie","gewicht"],tip:"Het gaat erom dat de speler zélf gelooft in het voorwerp — niet dat het publiek het gelooft. Wie het zelf voelt, communiceert het vanzelf. Wie het simuleert, simuleert het ook voor het publiek.",bron:"Spolin 1999, pp.81–83"},

  // SPACE SHAPING — ENSEMBLE
  {b:"ruimte",n:"Space Shaping — Ensemble",t:"Ruimtespel / groep",d:"15–20 min",g:"8–30 p.",o:"Denkbeeldige voorwerpen samen creëren en doorgeven — de consistentie van het voorwerp wordt gedeeld door de groep.",s:["Kleine groepjes. Eén speler begint een ruimteobject te creëren en te manipuleren.","Een tweede speler treedt toe en neemt het object over of werkt eraan mee.","Let op: het object moet dezelfde grootte, gewicht en consistentie behouden.","Bouw verder: het object groeit, krimpt, verandert van eigenaar maar nooit van 'werkelijkheid'."],tg:["ruimtesubstantie","ensemble","consistentie","samenwerking"],tip:"De uitdaging zit in het bijhouden van de 'realiteit' van het voorwerp — als één speler het object groter maakt dan de ander verwacht breekt de illusie. Dat is communicatie, niet magie.",bron:"Spolin 1999, pp.81–83"},

  // SPACE OBJECTS — PLAY BALL
  {b:"ruimte",n:"Play Ball",t:"Ruimtespel / interactie",d:"10–15 min",g:"6–25 p.",o:"Een denkbeeldige bal gooien en vangen in tweetallen — de consistentie van de bal vereist nauwkeurig waarnemen en reageren.",s:["Tweetallen. Creëer samen een denkbeeldige bal: welk formaat? Welk gewicht? Welke textuur?","Gooi en vang de bal. Let op: de bal heeft een echte vliegboog — hij stuitert, rolt, valt.","Varieer: kleine tennisbal, grote beachbal, natte zware bal, vluchtige ballon.","Evaluatie: wanneer voelde de bal het meest echt?"],tg:["ruimteobject","bal","vangen","gooien"],tip:"De vanger geeft het meeste informatie over de realiteit van de bal — reageer op de bal die je ziet aankomen. Wie de bal 'wegklapt' voor hij aankomt gooit het hele spel overboord.",bron:"Spolin 1999, p.64"},

  // SPACE OBJECTS — TUG OF WAR
  {b:"ruimte",n:"Tug-of-War (Touwtrekken)",t:"Ruimtespel / spanning en weerstand",d:"10–15 min",g:"8–25 p.",o:"Touwtrekken met een denkbeeldig touw — het lichaam begint vanzelf spanning te tonen: gespannen spieren, gefronst gezicht, zware ademhaling.",s:["Twee teams staan tegenover elkaar. Schets samen de dikte en textuur van het touw.","Trek. Beide teams verzetten zich — gebruik lichaamsgewicht, coördineer in de groep.","Side coach: 'Voel het touw! Voelen jullie de weerstand?'","Na het spel: nabespreking over wat het lichaam vanzelf deed."],tg:["weerstand","spanning","lichaam","ensemble"],tip:"Dit is een van de krachtigste oefeningen voor lichaamsbewustzijn omdat de weerstand echt voelbaar wordt zonder dat je eraan denkt. De frustratie, de spanning, de uitputting — allemaal authentiek. Precies wat een dirigent nodig heeft bij zware muziek.",bron:"Spolin 1999, p.63"},

  // SPACE OBJECTS — JUMP ROPE
  {b:"ruimte",n:"Jump Rope (Springtouw)",t:"Ruimtespel / ritme",d:"10–15 min",g:"6–20 p.",o:"Springtouw draaien en inspringen met een denkbeeldig touw — ritme en timing worden lichaamstaal.",s:["Twee spelers draaien het denkbeeldige touw. Één persoon springt in.","Het touw heeft een consistente snelheid — de draaiers moeten op elkaar zijn afgestemd.","Meer springers kunnen erin. Stel je het gewicht en de snelheid van het touw voor.","Evaluatie: hoe communiceerden de draaiers zonder woorden over de snelheid?"],tg:["ritme","timing","samenwerking","ruimteobject"],tip:"Het ritme van het touw vraagt subtiele non-verbale communicatie — precies wat dirigenten leren. Wie de snelheid eenzijdig verandert gooit de springers eruit.",bron:"Spolin 1999, p.387"},

  // THE WHERE GAME
  {b:"ruimte",n:"The Where Game",t:"Ruimtespel / scènebouw",d:"15–20 min",g:"6–25 p.",o:"Een omgeving definiëren door ermee te interacteren — het publiek begrijpt 'waar' de scène speelt door wat de spelers doen, niet door wat ze zeggen.",s:["Eén speler betrekt de speelruimte en begint met een ruimteobject te interacteren. Geen woorden over de plek.","Publiek kijkt: waar zijn we? Wat doet de speler precies?","Als andere spelers begrijpen waar de scène speelt, treden ze in en interacteren met eigen ruimteobjecten.","Nabespreking: wanneer was de plek duidelijk? Welke actie maakte het zeker?"],tg:["omgeving","scènebouw","ruimteobject","waar"],tip:"'Waar' wordt nooit gezegd — alleen gedaan. Wie binnenkomt en vraagt 'Ben je hier de dokter?' vernietigt het spel. De omgeving leeft in de objecten en acties, nergens anders.",bron:"Spolin 1999, p.98"},

  // GIBBERISH
  {b:"expressie",n:"Gibberish — Onzinlezing",t:"Expressiespel / non-verbale communicatie",d:"10–15 min",g:"6–25 p.",o:"Een lezing houden in volslagen onzintaal — en toch begrijpelijk maken door actie, expressie en stemtoon. Direct verwant aan dirigeren: de handen moeten spreken, niet de mond.",s:["Één speler houdt een korte lezing over een zelfgekozen onderwerp — volledig in onzintaal.","Het publiek luistert: waarover gaat de lezing? Welk gevoel straalt de spreker uit?","Variatie: één speler spreekt gibberish, een andere tolkt live voor het publiek.","Evaluatie: wanneer begreep het publiek iets? Wat maakte het duidelijk?"],tg:["gibberish","non-verbaal","communicatie","expressie"],tip:"Wie gibberish spreekt begint vanzelf te gebaren — en die gebaren zijn universeel menselijk. Dat zijn ook de gebaren die een dirigent nodig heeft. Spolin: 'De betekenis van een geluid in gibberish wordt alleen begrepen als de acteur het door actie, expressie of stemtoon overbrengt.'",bron:"Spolin 1999, pp.114–118"},

  // GIBBERISH — SCENE
  {b:"expressie",n:"Gibberish — Scène",t:"Expressiespel / karakter",d:"15–20 min",g:"4–20 p.",o:"Een volledige scène spelen in gibberish — plot, conflict, emotie — zonder ook maar één woord van de eigen taal.",s:["Tweetallen of kleine groepjes. Kies een 'wie' en een 'waar' — maar niet 'hoe'.","Speel de scène volledig in gibberish. Stem, houding, gezichtsexpressie dragen de betekenis.","Publiek evalueert: welk conflict zagen we? Wat voelde elk personage?","Nabespreking: welke momenten waren het helderst? Waarom?"],tg:["gibberish","karakter","conflict","scène"],tip:"Gibberish-scènes onthullen wat spelers normaal verbergen achter woorden — de lichaamstaal en emotie kunnen niet meer worden gemaskeerd. Dat is zowel de kracht als het ongemak.",bron:"Spolin 1999, pp.114–118"},

  // EXPLORE AND HEIGHTEN
  {b:"expressie",n:"Explore and Heighten",t:"Expressiespel / overtraining",d:"20–25 min",g:"4–20 p.",o:"Een aspect van een scène uitvergroten tot het extreme — om daarna te ontdekken dat 'normaal spelen' een veelvoud expressiever is geworden.",s:["Kleine groepjes spelen een simpele scène. Side coach observeert.","Side coach roept: 'Explore and heighten!' — de groep vergroot een aspect tot het absurde: stiltes, objecten, bewegingen, emoties.","Zolang de coach geen stop roept: alles mag groter.","Terug naar normale speel. Evaluatie: wat is er veranderd?"],tg:["expressie","overdrijving","overtraining","evaluatie"],tip:"Overtraining werkt: wie gewend is om extreem te spelen vindt 'normaal expressief spelen' daarna moeiteloos. Dit is hetzelfde principe als met een zware veer lopen vóór een sprint.",bron:"Spolin 1999, p.217"},

  // HOW OLD AM I
  {b:"karakter",n:"How Old Am I? (Hoe oud ben ik?)",t:"Karakterspel / lichaamstaal",d:"15–20 min",g:"8–30 p.",o:"Een bushalte — iedereen arriveert met een ander leeftijdskarakter. Niet imiteren maar werkelijk belichamen: houding, tempo, gelaatsuitdrukking.",s:["Bouw een bushalte neer (één stoel of punt in de ruimte).","Eén voor één arriveert elk speler als een personage van een specifieke leeftijd — naar eigen keuze, niet aangekondigd.","Publiek raadt: hoe oud is dit personage? Op grond waarvan?","Evaluatie: wie 'toonde' en wie 'vertelde'? Wat was het verschil in lichaamstaal?"],tg:["karakter","leeftijd","lichaamstaal","houding"],tip:"Spolin: 'Show, don't tell.' Wie een jong personage speelt door met een jojomaak te doen 'vertelt' in plaats van 'toont'. Het echte karakter zit in hoe het lichaam de ruimte inneemt, loopt, ademt.",bron:"Spolin 1999, p.69"},

  // ANIMAL IMAGES
  {b:"karakter",n:"Animal Images (Dierbeelden)",t:"Karakterspel / karakter-exploratie",d:"20–25 min",g:"8–30 p.",o:"Volledig in een dier kruipen — beweging, klank, houding — en dat dan omzetten naar een menselijk karakter in een sociale context.",s:["Iedereen kiest in stilte een dier. Zonder aankondiging: belichaam het volledig — houding, beweging, geluid.","Side coach: verdiep. Voeg de persoonlijkheid van het dier toe — aarzelend, agressief, nieuwsgierig.","Op teken: blijf mens worden, maar behoud de persoonlijkheid en energie van het dier.","Interacteer met anderen. Zet de dierenergie in een menselijke sociale situatie."],tg:["dier","karakter","energie","persoonlijkheid"],tip:"Het doel is niet het dier imiteren maar de essentiële energie van het dier meebrengen als mens. Een dirigent die 'adelaar' heeft gespeeld communiceert anders dan iemand die 'muis' was. Dat is karakterontwerp.",bron:"Spolin 1999, p.241"},

  // TRADITIONAL GAMES — RED LIGHT GREEN LIGHT
  {b:"traditioneel",n:"Red Light / Green Light",t:"Traditioneel spel / ontspanning",d:"10–15 min",g:"8–40 p.",o:"Het klassieke kleurlicht-spel — bewegen bij groen, bevriezen bij rood. Speelplezier zonder druk van winnen of verliezen. Opent de intuïtie.",s:["Één persoon staat vooraan met rug naar de groep. Roept 'Groen licht!' — iedereen loopt naar voren.","'Rood licht!' — de roeper draait zich om. Wie nog beweegt gaat terug.","Doel: als eerste de roeper bereiken zonder betrapt te worden.","Variatie: speel het met bewegingsstijlen — lopen in slow motion, op één been, enz."],tg:["traditioneel","ontspanning","intuïtie","plezier"],tip:"Spolin en Paul Sills begonnen workshops altijd met traditionele kinderspelen — om spelers in een onbevannen, speelse staat te brengen. Wie heeft gelachen is open voor de diepere oefeningen.",bron:"Spolin 1999, p.408"},

  // TRADITIONAL GAMES — WHO STARTED THE MOTION
  {b:"traditioneel",n:"Who Started the Motion?",t:"Traditioneel spel / observatie",d:"10–15 min",g:"8–30 p.",o:"Eén persoon verlaat de kring, de rest kiest een leider die subtle bewegingen initieert — de guesser moet ontdekken wie het is.",s:["Kring. Eén persoon verlaat de ruimte of draait zich om.","De kring kiest een leider. De leider begint een herhalende beweging — de rest volgt zo subtiel mogelijk.","De guesser komt terug: wie is de leider?","De leider wisselt subtiel van beweging — de volgers reageren direct."],tg:["observatie","leider","volgen","subtiliteit"],tip:"Dit spel traint perifeer waarnemen en subtiel volgen — essentiele vaardigheden voor ensemble-muzikanten én voor het lezen van kleine signaaltjes van de dirigent. De kunst is om de leider niet direct aan te kijken.",bron:"Spolin 1999, p.68"},

];

let gef=[...D],h=0,actief="alle";
const cats=[["alle","Alle ("+D.length+")"],["oriëntatie","Oriëntatie"],["ruimte","Ruimte & Objecten"],["expressie","Expressie"],["karakter","Karakter"],["traditioneel","Traditioneel"]];
const fr=document.getElementById("fr");
cats.forEach(([f,l])=>{
  const b=document.createElement("button");
  b.className="fb"+(f==="alle"?" on":"");b.dataset.f=f;b.textContent=l;
  b.onclick=()=>{actief=f;gef=f==="alle"?[...D]:D.filter(o=>o.b===f);h=0;dots();render();fr.querySelectorAll(".fb").forEach(x=>x.classList.toggle("on",x.dataset.f===f));};
  fr.appendChild(b);
});

function badgeClass(b){return b==="oriëntatie"?"tb":b==="ruimte"?"ti":b==="expressie"?"ts":b==="karakter"?"tf":b==="traditioneel"?"tl":"te";}
function badgeLabel(b){return b==="oriëntatie"?"Oriëntatie":b==="ruimte"?"Ruimte & Objecten":b==="expressie"?"Expressie":b==="karakter"?"Karakter":b==="traditioneel"?"Traditioneel":b;}

function dots(){const ds=document.getElementById("ds");ds.innerHTML="";gef.forEach((_,i)=>{const d=document.createElement("span");d.className="dot"+(i===0?" on":"");d.onclick=()=>{h=i;render();};ds.appendChild(d);});}

function render(){
  const o=gef[h];
  document.getElementById("ct").textContent=(h+1)+" / "+gef.length;
  document.getElementById("pv").disabled=h===0;
  document.getElementById("nx").disabled=h===gef.length-1;
  document.querySelectorAll(".dot").forEach((d,i)=>d.className="dot"+(i===h?" on":""));
  document.getElementById("kw").innerHTML=`<div class="card"><div class="ch"><div class="ct">${o.t}</div><div class="cn">${o.n}</div></div><div class="cm"><div class="cmi"><div class="cml">Duur</div><div class="cmv">${o.d}</div></div><div class="cmi"><div class="cml">Groep</div><div class="cmv">${o.g}</div></div></div><div class="cb"><div class="cs"><div class="csl">Doel</div><div class="cd">${o.o}</div></div><div class="cs"><div class="csl">Stappen</div><div class="steps">${o.s.map((s,i)=>`<div class="step"><span class="snr">${i+1}</span><span class="stx">${s}</span></div>`).join("")}</div></div><div class="cs"><div class="csl">Tags</div><div class="tags">${o.bron?`<span class="tag tbron">${o.bron}</span>`:""}<span class="tag ${badgeClass(o.b)}">${badgeLabel(o.b)}</span>${o.tg.map(t=>`<span class="tag te">${t}</span>`).join("")}</div></div></div><div class="tip"><div class="tipl">Let op voor de Joker / facilitator</div><div class="tipt">${o.tip}</div></div></div>`;
}

document.getElementById("pv").onclick=()=>{if(h>0){h--;render();}};
document.getElementById("nx").onclick=()=>{if(h<gef.length-1){h++;render();}};
dots();render();
</script>
</body>
</html>
